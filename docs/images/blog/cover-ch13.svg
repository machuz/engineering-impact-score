<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="1000" height="420" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="1000" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="1000" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="500" y="20" text-anchor="middle" fill="#928374" font-size="12">Engineering Impact Score — Chapter 13</text>

  <!-- Left side: Text content -->
  <text x="30" y="75" fill="#928374" font-size="12">Chapter 13 — Final</text>
  <text x="30" y="115" fill="#fabd2f" font-size="24" font-weight="700">Cosmology of Code</text>
  <text x="30" y="148" fill="#928374" font-size="14">The Grand Unified Theory</text>

  <!-- Left side: Software cosmology -->
  <text x="30" y="195" fill="#8ec07c" font-size="11" font-weight="700">Software Cosmology</text>
  <text y="220" font-size="11"><tspan x="30" fill="#ebdbb2">Git          </tspan><tspan fill="#928374">— the telescope</tspan></text>
  <text y="240" font-size="11"><tspan x="30" fill="#ebdbb2">Commits      </tspan><tspan fill="#928374">— starlight</tspan></text>
  <text y="260" font-size="11"><tspan x="30" fill="#ebdbb2">Dependencies </tspan><tspan fill="#928374">— gravity</tspan></text>
  <text y="280" font-size="11"><tspan x="30" fill="#ebdbb2">Design       </tspan><tspan fill="#928374">— cosmic structure</tspan></text>
  <text y="300" font-size="11"><tspan x="30" fill="#ebdbb2">EIS          </tspan><tspan fill="#928374">— the instrument</tspan></text>

  <!-- Bottom -->
  <text x="30" y="370" fill="#928374" font-size="11">git archaeology is the astronomy of code universes.</text>

  <!-- Bottom prompt -->
  <text x="30" y="395" fill="#8ec07c" font-size="12">$ eis --help</text>
  <rect x="118" y="383" width="7" height="14" fill="#ebdbb2" opacity="0.7"/>

  <!-- Right side: Large chapter number -->

  <!-- Right side: Star map with constellation lines -->
  <g opacity="0.9">
    <!-- Cosmic orbital rings -->
    <circle cx="760" cy="200" r="140" fill="none" stroke="#504945" stroke-width="1" stroke-dasharray="4" opacity="0.3"/>
    <circle cx="760" cy="200" r="90" fill="none" stroke="#504945" stroke-width="1" stroke-dasharray="4" opacity="0.25"/>
    <circle cx="760" cy="200" r="45" fill="none" stroke="#504945" stroke-width="1" stroke-dasharray="3" opacity="0.2"/>

    <!-- Central star (EIS core) -->
    <circle cx="760" cy="200" r="8" fill="#ebdbb2" opacity="0.9"/>

    <!-- Stars/commits (constellation points) -->
    <circle cx="700" cy="130" r="5" fill="#fabd2f" opacity="0.8"/>
    <circle cx="790" cy="110" r="4" fill="#b8bb26" opacity="0.7"/>
    <circle cx="850" cy="160" r="6" fill="#d3869b" opacity="0.8"/>
    <circle cx="830" cy="250" r="4" fill="#83a598" opacity="0.7"/>
    <circle cx="760" cy="300" r="5" fill="#8ec07c" opacity="0.8"/>
    <circle cx="680" cy="260" r="4" fill="#fabd2f" opacity="0.6"/>
    <circle cx="650" cy="180" r="5" fill="#fb4934" opacity="0.5"/>
    <circle cx="720" cy="240" r="3" fill="#b8bb26" opacity="0.6"/>
    <circle cx="810" cy="200" r="4" fill="#83a598" opacity="0.7"/>
    <circle cx="870" cy="110" r="3" fill="#d3869b" opacity="0.5"/>
    <circle cx="640" cy="130" r="3" fill="#8ec07c" opacity="0.4"/>
    <circle cx="890" cy="220" r="3" fill="#fabd2f" opacity="0.4"/>
    <circle cx="680" cy="310" r="3" fill="#b8bb26" opacity="0.4"/>
    <circle cx="860" cy="290" r="3" fill="#fb4934" opacity="0.4"/>

    <!-- Constellation lines (connecting the stars) -->
    <line x1="700" y1="130" x2="790" y2="110" stroke="#fabd2f" stroke-width="1" opacity="0.4"/>
    <line x1="790" y1="110" x2="850" y2="160" stroke="#d3869b" stroke-width="1" opacity="0.4"/>
    <line x1="850" y1="160" x2="830" y2="250" stroke="#83a598" stroke-width="1" opacity="0.3"/>
    <line x1="830" y1="250" x2="760" y2="300" stroke="#8ec07c" stroke-width="1" opacity="0.3"/>
    <line x1="760" y1="300" x2="680" y2="260" stroke="#fabd2f" stroke-width="1" opacity="0.3"/>
    <line x1="680" y1="260" x2="650" y2="180" stroke="#fb4934" stroke-width="1" opacity="0.3"/>
    <line x1="650" y1="180" x2="700" y2="130" stroke="#fabd2f" stroke-width="1" opacity="0.4"/>

    <!-- Inner constellation -->
    <line x1="760" y1="200" x2="700" y2="130" stroke="#ebdbb2" stroke-width="0.5" opacity="0.3"/>
    <line x1="760" y1="200" x2="850" y2="160" stroke="#ebdbb2" stroke-width="0.5" opacity="0.3"/>
    <line x1="760" y1="200" x2="760" y2="300" stroke="#ebdbb2" stroke-width="0.5" opacity="0.3"/>
    <line x1="760" y1="200" x2="650" y2="180" stroke="#ebdbb2" stroke-width="0.5" opacity="0.3"/>
    <line x1="760" y1="200" x2="830" y2="250" stroke="#ebdbb2" stroke-width="0.5" opacity="0.3"/>

    <!-- Outer label fragments -->
    <text x="628" y="115" fill="#665c54" font-size="8" opacity="0.6">Git</text>
    <text x="880" y="100" fill="#665c54" font-size="8" opacity="0.6">Commits</text>
    <text x="895" y="230" fill="#665c54" font-size="8" opacity="0.6">Gravity</text>
    <text x="625" y="320" fill="#665c54" font-size="8" opacity="0.6">Structure</text>

    <!-- Tiny sparkle dots (background stars) -->
    <circle cx="620" cy="100" r="1" fill="#ebdbb2" opacity="0.3"/>
    <circle cx="920" cy="140" r="1" fill="#ebdbb2" opacity="0.3"/>
    <circle cx="910" cy="280" r="1" fill="#ebdbb2" opacity="0.2"/>
    <circle cx="630" cy="290" r="1" fill="#ebdbb2" opacity="0.2"/>
    <circle cx="750" cy="70" r="1" fill="#ebdbb2" opacity="0.3"/>
    <circle cx="940" cy="190" r="1" fill="#ebdbb2" opacity="0.2"/>
    <circle cx="600" cy="210" r="1" fill="#ebdbb2" opacity="0.2"/>
    <circle cx="780" cy="340" r="1" fill="#ebdbb2" opacity="0.2"/>
  </g>
</svg>