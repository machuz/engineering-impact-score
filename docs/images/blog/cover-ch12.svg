<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="1000" height="420" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="1000" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="1000" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="500" y="20" text-anchor="middle" fill="#928374" font-size="12">Engineering Impact Score — Chapter 12</text>

  <!-- Left side: Text content -->
  <text x="30" y="75" fill="#928374" font-size="12">Chapter 12</text>
  <text x="30" y="115" fill="#fabd2f" font-size="24" font-weight="700">Collapse</text>
  <text x="30" y="148" fill="#928374" font-size="14">Good Architects and Black Hole Engineers</text>

  <!-- Left side: Comparison -->
  <text x="30" y="195" fill="#8ec07c" font-size="11" font-weight="700">Good Architect vs Black Hole</text>
  <text y="220" font-size="11"><tspan x="30" fill="#b8bb26">Good Architect </tspan><tspan fill="#928374">— Distributes gravity, survives</tspan></text>
  <text y="244" font-size="11"><tspan x="30" fill="#fb4934">Black Hole     </tspan><tspan fill="#928374">— Concentrates gravity, collapse</tspan></text>
  <text y="278" font-size="11"><tspan x="30" fill="#d3869b">Departure: </tspan><tspan fill="#b8bb26">Structure remains</tspan><tspan fill="#928374"> vs </tspan><tspan fill="#fb4934">Void</tspan></text>

  <!-- Bottom -->
  <text x="30" y="370" fill="#928374" font-size="11">Stars are not forever. That's why structure matters.</text>

  <!-- Right side: Large chapter number -->

  <!-- Right side: Good Architect (green star) vs Black Hole (red collapse) -->
  <g opacity="0.9">
    <!-- Good Architect (left side of right area) -->
    <text x="660" y="80" text-anchor="middle" fill="#8ec07c" font-size="10" font-weight="700">Good Architect</text>

    <!-- Star shape -->
    <circle cx="660" cy="160" r="35" fill="none" stroke="#8ec07c" stroke-width="2" opacity="0.5"/>
    <circle cx="660" cy="160" r="12" fill="#8ec07c" opacity="0.8"/>

    <!-- Radiating outward (distributing gravity) -->
    <line x1="660" y1="123" x2="660" y2="92" stroke="#8ec07c" stroke-width="1.5" opacity="0.5"/>
    <line x1="695" y1="160" x2="726" y2="160" stroke="#8ec07c" stroke-width="1.5" opacity="0.5"/>
    <line x1="625" y1="160" x2="594" y2="160" stroke="#8ec07c" stroke-width="1.5" opacity="0.5"/>
    <line x1="660" y1="197" x2="660" y2="228" stroke="#8ec07c" stroke-width="1.5" opacity="0.5"/>
    <line x1="685" y1="135" x2="710" y2="110" stroke="#8ec07c" stroke-width="1" opacity="0.4"/>
    <line x1="635" y1="135" x2="610" y2="110" stroke="#8ec07c" stroke-width="1" opacity="0.4"/>

    <!-- Distributed nodes -->
    <circle cx="660" cy="88" r="5" fill="#b8bb26" opacity="0.6"/>
    <circle cx="730" cy="160" r="5" fill="#b8bb26" opacity="0.6"/>
    <circle cx="590" cy="160" r="5" fill="#b8bb26" opacity="0.6"/>
    <circle cx="660" cy="232" r="5" fill="#b8bb26" opacity="0.6"/>
    <circle cx="714" cy="106" r="4" fill="#b8bb26" opacity="0.5"/>
    <circle cx="606" cy="106" r="4" fill="#b8bb26" opacity="0.5"/>

    <!-- VS -->
    <text x="760" y="165" text-anchor="middle" fill="#665c54" font-size="13">vs</text>

    <!-- Black Hole (right side) -->
    <text x="870" y="80" text-anchor="middle" fill="#fb4934" font-size="10" font-weight="700">Black Hole</text>

    <!-- Black hole core -->
    <circle cx="870" cy="160" r="35" fill="#1d2021" stroke="#fb4934" stroke-width="2"/>
    <circle cx="870" cy="160" r="15" fill="#fb4934" opacity="0.3"/>
    <circle cx="870" cy="160" r="6" fill="#fb4934" opacity="0.6"/>

    <!-- Spiral pull inward -->
    <path d="M 820,110 Q 840,130 858,148" fill="none" stroke="#fb4934" stroke-width="1.5" opacity="0.5"/>
    <path d="M 920,110 Q 900,130 882,148" fill="none" stroke="#fb4934" stroke-width="1.5" opacity="0.5"/>
    <path d="M 820,210 Q 840,190 858,172" fill="none" stroke="#fb4934" stroke-width="1.5" opacity="0.5"/>
    <path d="M 920,210 Q 900,190 882,172" fill="none" stroke="#fb4934" stroke-width="1.5" opacity="0.5"/>

    <!-- Doomed particles being pulled in -->
    <circle cx="815" cy="105" r="4" fill="#fb4934" opacity="0.4"/>
    <circle cx="925" cy="105" r="4" fill="#fb4934" opacity="0.4"/>
    <circle cx="815" cy="215" r="4" fill="#fb4934" opacity="0.4"/>
    <circle cx="925" cy="215" r="4" fill="#fb4934" opacity="0.4"/>

    <!-- Event horizon glow -->
    <circle cx="870" cy="160" r="45" fill="none" stroke="#fb4934" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Bottom label -->
  <text x="760" y="280" text-anchor="middle" fill="#665c54" font-size="10">Gravity that nurtures vs gravity that consumes</text>
</svg>