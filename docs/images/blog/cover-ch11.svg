<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="1000" height="420" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="1000" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="1000" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="500" y="20" text-anchor="middle" fill="#928374" font-size="12">Engineering Impact Score — Chapter 11</text>

  <!-- Left side: Text content -->
  <text x="30" y="75" fill="#928374" font-size="12">Chapter 11</text>
  <text x="30" y="115" fill="#fabd2f" font-size="24" font-weight="700">Entropy</text>
  <text x="30" y="148" fill="#928374" font-size="14">The Universe Always Tends Toward Disorder</text>

  <!-- Left side: Entropy bars -->
  <text x="30" y="195" fill="#8ec07c" font-size="11" font-weight="700">The Second Law of Code</text>
  <text y="220" font-size="11"><tspan x="30" fill="#928374">Q1 </tspan><tspan fill="#b8bb26">████████████████████</tspan><tspan fill="#b8bb26"> Order</tspan></text>
  <text y="242" font-size="11"><tspan x="30" fill="#928374">Q2 </tspan><tspan fill="#b8bb26">██████████████████</tspan><tspan fill="#fabd2f">   Drift</tspan></text>
  <text y="264" font-size="11"><tspan x="30" fill="#928374">Q3 </tspan><tspan fill="#fabd2f">█████████████</tspan><tspan fill="#fabd2f">        Decay</tspan></text>
  <text y="286" font-size="11"><tspan x="30" fill="#928374">Q4 </tspan><tspan fill="#fb4934">████████</tspan><tspan fill="#fb4934">             Disorder</tspan></text>

  <!-- Bottom -->
  <text x="30" y="370" fill="#928374" font-size="11">Entropy always increases. Engineers fight it.</text>

  <!-- Right side: Large chapter number -->
  <text x="750" y="320" text-anchor="middle" fill="#3c3836" font-size="200" font-weight="700">11</text>

  <!-- Right side: Ordered grid transforming to scattered blocks -->
  <g opacity="0.9">
    <!-- Ordered side (left portion of right area) -->
    <text x="630" y="85" text-anchor="middle" fill="#8ec07c" font-size="10" font-weight="700">Low Entropy</text>
    <rect x="590" y="95" width="18" height="18" rx="2" fill="#b8bb26" opacity="0.7"/>
    <rect x="613" y="95" width="18" height="18" rx="2" fill="#b8bb26" opacity="0.7"/>
    <rect x="636" y="95" width="18" height="18" rx="2" fill="#b8bb26" opacity="0.7"/>
    <rect x="659" y="95" width="18" height="18" rx="2" fill="#b8bb26" opacity="0.7"/>
    <rect x="590" y="118" width="18" height="18" rx="2" fill="#b8bb26" opacity="0.7"/>
    <rect x="613" y="118" width="18" height="18" rx="2" fill="#b8bb26" opacity="0.7"/>
    <rect x="636" y="118" width="18" height="18" rx="2" fill="#b8bb26" opacity="0.7"/>
    <rect x="659" y="118" width="18" height="18" rx="2" fill="#b8bb26" opacity="0.7"/>
    <rect x="590" y="141" width="18" height="18" rx="2" fill="#b8bb26" opacity="0.7"/>
    <rect x="613" y="141" width="18" height="18" rx="2" fill="#b8bb26" opacity="0.7"/>
    <rect x="636" y="141" width="18" height="18" rx="2" fill="#b8bb26" opacity="0.7"/>
    <rect x="659" y="141" width="18" height="18" rx="2" fill="#b8bb26" opacity="0.7"/>

    <!-- Arrow -->
    <line x1="695" y1="130" x2="780" y2="130" stroke="#665c54" stroke-width="2"/>
    <polygon points="780,125 792,130 780,135" fill="#665c54"/>
    <text x="738" y="118" text-anchor="middle" fill="#fb4934" font-size="9">time</text>

    <!-- Disordered side (right portion) -->
    <text x="870" y="85" text-anchor="middle" fill="#fb4934" font-size="10" font-weight="700">High Entropy</text>
    <rect x="800" y="92" width="18" height="18" rx="2" fill="#fb4934" opacity="0.5" transform="rotate(15,809,101)"/>
    <rect x="835" y="105" width="18" height="18" rx="2" fill="#fabd2f" opacity="0.5" transform="rotate(-8,844,114)"/>
    <rect x="870" y="90" width="18" height="18" rx="2" fill="#d3869b" opacity="0.5" transform="rotate(25,879,99)"/>
    <rect x="910" y="100" width="18" height="18" rx="2" fill="#83a598" opacity="0.5" transform="rotate(-18,919,109)"/>
    <rect x="810" y="128" width="18" height="18" rx="2" fill="#83a598" opacity="0.5" transform="rotate(-20,819,137)"/>
    <rect x="855" y="138" width="18" height="18" rx="2" fill="#fb4934" opacity="0.5" transform="rotate(10,864,147)"/>
    <rect x="895" y="125" width="18" height="18" rx="2" fill="#fabd2f" opacity="0.5" transform="rotate(-30,904,134)"/>
    <rect x="820" y="155" width="18" height="18" rx="2" fill="#b8bb26" opacity="0.5" transform="rotate(35,829,164)"/>
    <rect x="865" y="160" width="18" height="18" rx="2" fill="#d3869b" opacity="0.5" transform="rotate(-5,874,169)"/>
    <rect x="905" y="150" width="18" height="18" rx="2" fill="#83a598" opacity="0.5" transform="rotate(20,914,159)"/>
    <rect x="840" y="175" width="18" height="18" rx="2" fill="#fb4934" opacity="0.4" transform="rotate(12,849,184)"/>
    <rect x="885" y="178" width="18" height="18" rx="2" fill="#fabd2f" opacity="0.4" transform="rotate(-15,894,187)"/>
  </g>

  <!-- Boltzmann formula -->
  <text x="760" y="380" text-anchor="middle" fill="#665c54" font-size="11">S = k * log(W)</text>
</svg>