<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
    <radialGradient id="gravity-field" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ebdbb2" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ebdbb2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="420" rx="10" fill="#282828"/>

  <rect width="1000" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="1000" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="500" y="20" text-anchor="middle" fill="#928374" font-size="12">Engineering Impact Score — Chapter 16 — Final</text>

  <text x="30" y="75" fill="#928374" font-size="12">Chapter 16 — Final</text>
  <text x="30" y="115" fill="#fabd2f" font-size="22" font-weight="700">The Engineers Who Shape Gravity</text>
  <text x="30" y="148" fill="#928374" font-size="14">重力を作るエンジニアたち</text>

  <text x="30" y="200" fill="#ebdbb2" font-size="11">Git remembers the past.</text>
  <text x="30" y="220" fill="#ebdbb2" font-size="11">AI imagines the future.</text>
  <text x="30" y="250" fill="#fabd2f" font-size="11">Between them,</text>
  <text x="30" y="270" fill="#fabd2f" font-size="11">engineers shape gravity.</text>

  <text x="30" y="310" fill="#928374" font-size="11">And from that gravity,</text>
  <text x="30" y="330" fill="#928374" font-size="11">software civilizations emerge.</text>

  <text x="30" y="395" fill="#8ec07c" font-size="12">$ eis analyze --recursive</text>
  <rect x="258" y="383" width="7" height="14" fill="#ebdbb2" opacity="0.7"/>

  <!-- Right side: gravity field with central engineer star -->
  <g opacity="0.9">
    <circle cx="760" cy="210" r="150" fill="url(#gravity-field)"/>

    <!-- Orbital rings (gravity) -->
    <circle cx="760" cy="210" r="120" fill="none" stroke="#504945" stroke-width="0.8" opacity="0.3"/>
    <circle cx="760" cy="210" r="80" fill="none" stroke="#504945" stroke-width="0.8" opacity="0.35"/>
    <circle cx="760" cy="210" r="40" fill="none" stroke="#504945" stroke-width="0.8" opacity="0.4"/>

    <!-- Central: the engineer (gravity source) -->
    <circle cx="760" cy="210" r="10" fill="#fabd2f" opacity="0.9"/>

    <!-- Stars held in orbit (structured code) -->
    <circle cx="720" cy="150" r="4" fill="#b8bb26" opacity="0.8"/>
    <circle cx="810" cy="140" r="3" fill="#83a598" opacity="0.7"/>
    <circle cx="850" cy="190" r="4" fill="#d3869b" opacity="0.7"/>
    <circle cx="840" cy="260" r="3" fill="#b8bb26" opacity="0.7"/>
    <circle cx="790" cy="300" r="4" fill="#83a598" opacity="0.8"/>
    <circle cx="720" cy="290" r="3" fill="#d3869b" opacity="0.7"/>
    <circle cx="680" cy="240" r="4" fill="#b8bb26" opacity="0.7"/>
    <circle cx="680" cy="170" r="3" fill="#83a598" opacity="0.7"/>

    <!-- Gravity lines (subtle, connecting to center) -->
    <line x1="760" y1="210" x2="720" y2="150" stroke="#fabd2f" stroke-width="0.4" opacity="0.2"/>
    <line x1="760" y1="210" x2="850" y2="190" stroke="#fabd2f" stroke-width="0.4" opacity="0.2"/>
    <line x1="760" y1="210" x2="790" y2="300" stroke="#fabd2f" stroke-width="0.4" opacity="0.2"/>
    <line x1="760" y1="210" x2="680" y2="240" stroke="#fabd2f" stroke-width="0.4" opacity="0.2"/>

    <!-- Background sparkles -->
    <circle cx="620" cy="100" r="1" fill="#ebdbb2" opacity="0.2"/>
    <circle cx="920" cy="120" r="1" fill="#ebdbb2" opacity="0.2"/>
    <circle cx="900" cy="310" r="1" fill="#ebdbb2" opacity="0.15"/>
    <circle cx="630" cy="320" r="1" fill="#ebdbb2" opacity="0.15"/>
    <circle cx="760" cy="70" r="1" fill="#ebdbb2" opacity="0.2"/>
    <circle cx="940" cy="210" r="1" fill="#ebdbb2" opacity="0.15"/>
    <circle cx="600" cy="200" r="1" fill="#ebdbb2" opacity="0.15"/>
  </g>
</svg>