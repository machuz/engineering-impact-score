<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Noto+Sans+JP:wght@400;700;800&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
      .jp   { font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', -apple-system, 'Segoe UI', sans-serif; }
    </style>
    <marker id="arrShift" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ebdbb2"/>
    </marker>
  </defs>

  <rect width="960" height="520" rx="12" fill="#1d2021"/>
  <rect x="0" y="0" width="4" height="520" rx="2" fill="#ebdbb2"/>
  <text x="936" y="24" text-anchor="end" class="mono" fill="#504945" font-size="10">EM Role Shift · ch10</text>

  <text x="480" y="46" text-anchor="middle" class="jp" fill="#ebdbb2" font-size="22" font-weight="800" letter-spacing="1.5">EM の仕事が変わる — 5 つの遷移</text>
  <text x="480" y="68" text-anchor="middle" class="jp" fill="#928374" font-size="12">人を見る仕事から、構造を設計する仕事へ</text>

  <!-- Column headers -->
  <rect x="60" y="100" width="380" height="32" rx="6" fill="#282828" stroke="#928374" stroke-width="1"/>
  <text x="250" y="122" text-anchor="middle" class="jp" fill="#928374" font-size="13" font-weight="700">従来の EM</text>

  <rect x="520" y="100" width="380" height="32" rx="6" fill="#282828" stroke="#ebdbb2" stroke-width="1.5"/>
  <text x="710" y="122" text-anchor="middle" class="jp" fill="#ebdbb2" font-size="13" font-weight="800">構造駆動の EM</text>

  <!-- Row 1 -->
  <rect x="60" y="148" width="380" height="54" rx="6" fill="#1d2021" stroke="#504945" stroke-width="1"/>
  <text x="250" y="172" text-anchor="middle" class="jp" fill="#928374" font-size="14" font-weight="700">人を見る</text>
  <text x="250" y="192" text-anchor="middle" class="mono" fill="#665c54" font-size="10">watch people</text>

  <rect x="520" y="148" width="380" height="54" rx="6" fill="#1d2021" stroke="#d3869b" stroke-width="1.5"/>
  <text x="710" y="172" text-anchor="middle" class="jp" fill="#d3869b" font-size="14" font-weight="800">構造を設計する</text>
  <text x="710" y="192" text-anchor="middle" class="mono" fill="#7c6f64" font-size="10">design structure</text>

  <line x1="440" y1="175" x2="520" y2="175" stroke="#ebdbb2" stroke-width="2" marker-end="url(#arrShift)"/>

  <!-- Row 2 -->
  <rect x="60" y="214" width="380" height="54" rx="6" fill="#1d2021" stroke="#504945" stroke-width="1"/>
  <text x="250" y="238" text-anchor="middle" class="jp" fill="#928374" font-size="14" font-weight="700">頑張らせる</text>
  <text x="250" y="258" text-anchor="middle" class="mono" fill="#665c54" font-size="10">drive harder</text>

  <rect x="520" y="214" width="380" height="54" rx="6" fill="#1d2021" stroke="#d3869b" stroke-width="1.5"/>
  <text x="710" y="238" text-anchor="middle" class="jp" fill="#d3869b" font-size="14" font-weight="800">正しいレイヤーに配置する</text>
  <text x="710" y="258" text-anchor="middle" class="mono" fill="#7c6f64" font-size="10">place in the right layer</text>

  <line x1="440" y1="241" x2="520" y2="241" stroke="#ebdbb2" stroke-width="2" marker-end="url(#arrShift)"/>

  <!-- Row 3 -->
  <rect x="60" y="280" width="380" height="54" rx="6" fill="#1d2021" stroke="#504945" stroke-width="1"/>
  <text x="250" y="304" text-anchor="middle" class="jp" fill="#928374" font-size="14" font-weight="700">評価する</text>
  <text x="250" y="324" text-anchor="middle" class="mono" fill="#665c54" font-size="10">evaluate</text>

  <rect x="520" y="280" width="380" height="54" rx="6" fill="#1d2021" stroke="#d3869b" stroke-width="1.5"/>
  <text x="710" y="304" text-anchor="middle" class="jp" fill="#d3869b" font-size="14" font-weight="800">観測結果を共有する</text>
  <text x="710" y="324" text-anchor="middle" class="mono" fill="#7c6f64" font-size="10">share observations</text>

  <line x1="440" y1="307" x2="520" y2="307" stroke="#ebdbb2" stroke-width="2" marker-end="url(#arrShift)"/>

  <!-- Row 4 -->
  <rect x="60" y="346" width="380" height="54" rx="6" fill="#1d2021" stroke="#504945" stroke-width="1"/>
  <text x="250" y="370" text-anchor="middle" class="jp" fill="#928374" font-size="14" font-weight="700">カバーする</text>
  <text x="250" y="390" text-anchor="middle" class="mono" fill="#665c54" font-size="10">cover gaps</text>

  <rect x="520" y="346" width="380" height="54" rx="6" fill="#1d2021" stroke="#d3869b" stroke-width="1.5"/>
  <text x="710" y="370" text-anchor="middle" class="jp" fill="#d3869b" font-size="14" font-weight="800">変換者を育てる</text>
  <text x="710" y="390" text-anchor="middle" class="mono" fill="#7c6f64" font-size="10">develop transformers</text>

  <line x1="440" y1="373" x2="520" y2="373" stroke="#ebdbb2" stroke-width="2" marker-end="url(#arrShift)"/>

  <!-- Row 5 -->
  <rect x="60" y="412" width="380" height="54" rx="6" fill="#1d2021" stroke="#504945" stroke-width="1"/>
  <text x="250" y="436" text-anchor="middle" class="jp" fill="#928374" font-size="14" font-weight="700">統率する</text>
  <text x="250" y="456" text-anchor="middle" class="mono" fill="#665c54" font-size="10">lead</text>

  <rect x="520" y="412" width="380" height="54" rx="6" fill="#1d2021" stroke="#d3869b" stroke-width="1.5"/>
  <text x="710" y="436" text-anchor="middle" class="jp" fill="#d3869b" font-size="14" font-weight="800">語彙を整える</text>
  <text x="710" y="456" text-anchor="middle" class="mono" fill="#7c6f64" font-size="10">curate the vocabulary</text>

  <line x1="440" y1="439" x2="520" y2="439" stroke="#ebdbb2" stroke-width="2" marker-end="url(#arrShift)"/>

  <!-- Bottom band -->
  <rect x="40" y="484" width="880" height="26" rx="6" fill="#1d2021" stroke="#504945" stroke-width="1"/>
  <text x="480" y="502" text-anchor="middle" class="jp" fill="#ebdbb2" font-size="12" font-weight="700">EM は、組織の OS エンジニアになる</text>
</svg>
