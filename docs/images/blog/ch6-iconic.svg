<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="800" height="300" rx="8" fill="#282828"/>
  <rect width="800" height="28" rx="8" fill="#1d2021"/>
  <rect y="20" width="800" height="8" fill="#1d2021"/>
  <circle cx="18" cy="14" r="5" fill="#cc241d"/>
  <circle cx="36" cy="14" r="5" fill="#d79921"/>
  <circle cx="54" cy="14" r="5" fill="#98971a"/>

  <!-- Four evolution stages -->
  <!-- Stage 1: Formation -->
  <rect x="40" y="60" width="150" height="140" rx="6" fill="none" stroke="#fb4934" stroke-width="2" opacity="0.7"/>
  <text x="115" y="85" text-anchor="middle" fill="#fb4934" font-size="13" font-weight="700">Formation</text>
  <!-- 1-2 dots -->
  <circle cx="95" cy="130" r="8" fill="#fb4934" opacity="0.6"/>
  <circle cx="135" cy="130" r="8" fill="#fb4934" opacity="0.4"/>
  <text x="115" y="175" text-anchor="middle" fill="#665c54" font-size="10">1-2 members</text>

  <!-- Arrow 1-2 -->
  <line x1="195" y1="130" x2="225" y2="130" stroke="#665c54" stroke-width="1.5" stroke-dasharray="4"/>
  <polygon points="225,127 232,130 225,133" fill="#665c54"/>

  <!-- Stage 2: Growth -->
  <rect x="235" y="60" width="150" height="140" rx="6" fill="none" stroke="#fabd2f" stroke-width="2" opacity="0.7"/>
  <text x="310" y="85" text-anchor="middle" fill="#fabd2f" font-size="13" font-weight="700">Growth</text>
  <!-- 3-5 dots -->
  <circle cx="275" cy="120" r="7" fill="#fabd2f" opacity="0.6"/>
  <circle cx="310" cy="115" r="7" fill="#fabd2f" opacity="0.7"/>
  <circle cx="345" cy="120" r="7" fill="#fabd2f" opacity="0.5"/>
  <circle cx="290" cy="145" r="7" fill="#fabd2f" opacity="0.4"/>
  <circle cx="330" cy="148" r="7" fill="#fabd2f" opacity="0.5"/>
  <text x="310" y="175" text-anchor="middle" fill="#665c54" font-size="10">3-5 members</text>

  <!-- Arrow 2-3 -->
  <line x1="390" y1="130" x2="420" y2="130" stroke="#665c54" stroke-width="1.5" stroke-dasharray="4"/>
  <polygon points="420,127 427,130 420,133" fill="#665c54"/>

  <!-- Stage 3: Maturity -->
  <rect x="430" y="60" width="150" height="140" rx="6" fill="none" stroke="#b8bb26" stroke-width="2" opacity="0.7"/>
  <text x="505" y="85" text-anchor="middle" fill="#b8bb26" font-size="13" font-weight="700">Maturity</text>
  <!-- 6-8 dots organized -->
  <circle cx="465" cy="115" r="6" fill="#b8bb26" opacity="0.5"/>
  <circle cx="495" cy="110" r="7" fill="#b8bb26" opacity="0.7"/>
  <circle cx="525" cy="115" r="6" fill="#b8bb26" opacity="0.5"/>
  <circle cx="555" cy="118" r="6" fill="#b8bb26" opacity="0.4"/>
  <circle cx="470" cy="142" r="6" fill="#b8bb26" opacity="0.6"/>
  <circle cx="500" cy="140" r="7" fill="#b8bb26" opacity="0.8"/>
  <circle cx="530" cy="142" r="6" fill="#b8bb26" opacity="0.5"/>
  <text x="505" y="175" text-anchor="middle" fill="#665c54" font-size="10">6-8 members</text>

  <!-- Arrow 3-4 -->
  <line x1="585" y1="130" x2="615" y2="130" stroke="#665c54" stroke-width="1.5" stroke-dasharray="4"/>
  <polygon points="615,127 622,130 615,133" fill="#665c54"/>

  <!-- Stage 4: Scaling -->
  <rect x="625" y="60" width="150" height="140" rx="6" fill="none" stroke="#8ec07c" stroke-width="2" opacity="0.7"/>
  <text x="700" y="85" text-anchor="middle" fill="#8ec07c" font-size="13" font-weight="700">Scaling</text>
  <!-- 9+ dots dense -->
  <circle cx="655" cy="110" r="5" fill="#8ec07c" opacity="0.4"/>
  <circle cx="675" cy="108" r="6" fill="#8ec07c" opacity="0.5"/>
  <circle cx="698" cy="112" r="5" fill="#8ec07c" opacity="0.6"/>
  <circle cx="720" cy="108" r="6" fill="#8ec07c" opacity="0.5"/>
  <circle cx="745" cy="112" r="5" fill="#8ec07c" opacity="0.4"/>
  <circle cx="660" cy="132" r="5" fill="#8ec07c" opacity="0.5"/>
  <circle cx="682" cy="130" r="6" fill="#8ec07c" opacity="0.7"/>
  <circle cx="705" cy="133" r="6" fill="#8ec07c" opacity="0.8"/>
  <circle cx="728" cy="130" r="5" fill="#8ec07c" opacity="0.6"/>
  <circle cx="750" cy="134" r="5" fill="#8ec07c" opacity="0.4"/>
  <text x="700" y="175" text-anchor="middle" fill="#665c54" font-size="10">9+ members</text>

  <!-- Health bar -->
  <text x="400" y="230" text-anchor="middle" fill="#8ec07c" font-size="12" font-weight="700">Team Health</text>
  <rect x="150" y="240" width="500" height="10" rx="5" fill="#3c3836"/>
  <rect x="150" y="240" width="375" height="10" rx="5" fill="#b8bb26" opacity="0.8"/>
  <text x="535" y="250" fill="#b8bb26" font-size="11" font-weight="700">75</text>

  <text x="30" y="282" fill="#8ec07c" font-size="11">$ eis team --timeline quarterly</text>
</svg>