<svg xmlns="http://www.w3.org/2000/svg" width="620" height="228" viewBox="0 0 620 228">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Card background -->
  <rect width="620" height="228" rx="8" fill="#1d2021"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="228" rx="2" fill="#b8bb26"/>

  <!-- Category label -->
  <text x="592" y="18" text-anchor="end" fill="#504945" font-size="10">Python</text>

  <text y="28" font-size="12"><tspan x="24" fill="#fb4934">for</tspan><tspan x="45.599999999999994" fill="#ebdbb2"> fix_commit </tspan><tspan x="132.0" fill="#fb4934">in</tspan><tspan x="146.4" fill="#ebdbb2"> fix_commits:</tspan></text>
  <text y="46" font-size="12"><tspan x="24" fill="#83a598">    fixer</tspan><tspan x="88.8" fill="#928374"> = </tspan><tspan x="110.39999999999999" fill="#ebdbb2">fix_commit.author</tspan></text>
  <text y="64" font-size="12"><tspan x="24" fill="#ebdbb2">    </tspan><tspan x="52.8" fill="#fb4934">for</tspan><tspan x="74.39999999999999" fill="#ebdbb2"> changed_line </tspan><tspan x="175.2" fill="#fb4934">in</tspan><tspan x="189.6" fill="#ebdbb2"> fix_commit.changed_lines:</tspan></text>
  <text y="82" font-size="12"><tspan x="24" fill="#83a598">        original_author</tspan><tspan x="189.6" fill="#928374"> = </tspan><tspan x="211.2" fill="#fabd2f">git_blame</tspan><tspan x="276.0" fill="#ebdbb2">(file, at=parent_commit)</tspan></text>
  <text y="100" font-size="12"><tspan x="24" fill="#ebdbb2">        </tspan><tspan x="81.6" fill="#fb4934">if</tspan><tspan x="96.0" fill="#ebdbb2"> original_author != fixer:</tspan></text>
  <text y="118" font-size="12"><tspan x="24" fill="#ebdbb2">            debt_generated</tspan><tspan x="211.2" fill="#ebdbb2">[original_author]</tspan><tspan x="333.59999999999997" fill="#928374"> += </tspan><tspan x="362.4" fill="#d3869b">1</tspan></text>
  <text y="136" font-size="12"><tspan x="24" fill="#ebdbb2">            debt_cleaned</tspan><tspan x="196.79999999999998" fill="#ebdbb2">[fixer]</tspan><tspan x="247.2" fill="#928374"> += </tspan><tspan x="276.0" fill="#d3869b">1</tspan></text>
  <text y="172" font-size="12"><tspan x="24" fill="#83a598">debt_ratio</tspan><tspan x="96.0" fill="#928374"> = </tspan><tspan x="117.6" fill="#ebdbb2">debt_cleaned</tspan><tspan x="204.0" fill="#928374"> / </tspan><tspan x="225.6" fill="#fabd2f">max</tspan><tspan x="247.2" fill="#ebdbb2">(debt_generated, </tspan><tspan x="369.59999999999997" fill="#d3869b">1</tspan><tspan x="376.79999999999995" fill="#928374">)</tspan></text>
  <text x="24" y="190" fill="#928374" font-size="12"># &gt; 1 = Cleaner  |  &lt; 1 = Debt creator</text>
</svg>