<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fabd2f" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#282828" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="#282828"/>

  <!-- Central glow -->
  <circle cx="400" cy="260" r="200" fill="url(#glow)"/>

  <!-- === Software Cosmology Map === -->

  <!-- Layer 1 (bottom): Git Telescope -->
  <rect x="350" y="430" width="100" height="8" rx="2" fill="#504945" opacity="0.6"/>
  <line x1="400" y1="430" x2="400" y2="400" stroke="#504945" stroke-width="1.5"/>
  <rect x="370" y="388" width="60" height="16" rx="3" fill="#504945" opacity="0.4" stroke="#665c54" stroke-width="0.5"/>
  <circle cx="400" cy="396" r="3" fill="#fabd2f" opacity="0.6"/>
  <text x="400" y="468" text-anchor="middle" fill="#665c54" font-size="10">the Git Telescope</text>

  <!-- Connection: Telescope → Timeline -->
  <line x1="400" y1="388" x2="400" y2="370" stroke="#504945" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- Layer 2: Timeline -->
  <circle cx="400" cy="358" r="10" fill="#504945" opacity="0.4" stroke="#928374" stroke-width="0.8"/>
  <text x="400" y="362" text-anchor="middle" fill="#928374" font-size="7">T</text>
  <text x="440" y="362" fill="#665c54" font-size="9">Timeline</text>

  <!-- Connection: Timeline → Code Universe -->
  <line x1="400" y1="348" x2="400" y2="320" stroke="#504945" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- Layer 3: Code Universe (central hub) -->
  <circle cx="400" cy="300" r="18" fill="#1d2021" stroke="#fabd2f" stroke-width="1" opacity="0.8"/>
  <circle cx="400" cy="300" r="8" fill="#fabd2f" opacity="0.4"/>
  <text x="400" y="304" text-anchor="middle" fill="#ebdbb2" font-size="8" font-weight="700">✦</text>

  <!-- Label: Code Universe -->
  <text x="400" y="335" text-anchor="middle" fill="#ebdbb2" font-size="10">Code Universe</text>

  <!-- Branches from Code Universe -->

  <!-- Left branch: Origin -->
  <line x1="385" y1="290" x2="310" y2="270" stroke="#928374" stroke-width="0.6" opacity="0.5"/>
  <circle cx="305" cy="268" r="6" fill="#fe8019" opacity="0.5"/>
  <text x="270" y="260" fill="#fe8019" font-size="9" opacity="0.8">Origin</text>

  <!-- Right branch: Relativity -->
  <line x1="415" y1="290" x2="490" y2="270" stroke="#928374" stroke-width="0.6" opacity="0.5"/>
  <circle cx="495" cy="268" r="6" fill="#83a598" opacity="0.5"/>
  <text x="510" y="272" fill="#83a598" font-size="9" opacity="0.8">Relativity</text>

  <!-- Connection: Code Universe → Gravity & Dark Matter -->
  <line x1="380" y1="285" x2="310" y2="230" stroke="#fabd2f" stroke-width="0.8" opacity="0.4"/>
  <line x1="420" y1="285" x2="490" y2="230" stroke="#83a598" stroke-width="0.8" opacity="0.4"/>

  <!-- Layer 4 Left: Gravity -->
  <circle cx="300" cy="220" r="14" fill="#1d2021" stroke="#fabd2f" stroke-width="1" opacity="0.7"/>
  <text x="300" y="224" text-anchor="middle" fill="#fabd2f" font-size="8" font-weight="700">G</text>
  <text x="255" y="210" fill="#fabd2f" font-size="10">Gravity</text>

  <!-- Layer 4 Right: Dark Matter -->
  <circle cx="500" cy="220" r="14" fill="#1d2021" stroke="#83a598" stroke-width="1" opacity="0.7"/>
  <text x="500" y="224" text-anchor="middle" fill="#83a598" font-size="8" font-weight="700">DM</text>
  <text x="530" y="210" fill="#83a598" font-size="10">Dark Matter</text>

  <!-- Entropy & Collapse (between/below Gravity and Dark Matter) -->
  <line x1="340" y1="230" x2="370" y2="250" stroke="#fb4934" stroke-width="0.5" opacity="0.3"/>
  <line x1="460" y1="230" x2="430" y2="250" stroke="#fb4934" stroke-width="0.5" opacity="0.3"/>
  <text x="400" y="256" text-anchor="middle" fill="#fb4934" font-size="8" opacity="0.5">Entropy → Collapse</text>

  <!-- Connection: Gravity & Dark Matter → Civilization -->
  <line x1="310" y1="207" x2="360" y2="165" stroke="#fabd2f" stroke-width="0.8" opacity="0.4"/>
  <line x1="490" y1="207" x2="440" y2="165" stroke="#83a598" stroke-width="0.8" opacity="0.4"/>

  <!-- Layer 5: Civilization -->
  <circle cx="400" cy="150" r="18" fill="#1d2021" stroke="#b8bb26" stroke-width="1.2" opacity="0.8"/>
  <text x="400" y="155" text-anchor="middle" fill="#b8bb26" font-size="9" font-weight="700">Civ</text>

  <!-- Architect / Anchor / Producer labels around Civilization -->
  <circle cx="350" cy="140" r="5" fill="#fabd2f" opacity="0.5"/>
  <circle cx="450" cy="140" r="5" fill="#83a598" opacity="0.5"/>
  <circle cx="400" cy="125" r="5" fill="#b8bb26" opacity="0.5"/>
  <text x="320" y="130" fill="#928374" font-size="7">Architect</text>
  <text x="460" y="130" fill="#928374" font-size="7">Anchor</text>
  <text x="400" y="115" text-anchor="middle" fill="#928374" font-size="7">Producer</text>

  <text x="400" y="180" text-anchor="middle" fill="#b8bb26" font-size="10">Civilization</text>

  <!-- Connection: Civilization → Culture & AI Era -->
  <line x1="380" y1="135" x2="330" y2="90" stroke="#d3869b" stroke-width="0.8" opacity="0.4"/>
  <line x1="420" y1="135" x2="470" y2="90" stroke="#fabd2f" stroke-width="0.8" opacity="0.4"/>

  <!-- Layer 6 Left: Culture -->
  <circle cx="320" cy="80" r="12" fill="#1d2021" stroke="#d3869b" stroke-width="1" opacity="0.7"/>
  <text x="320" y="84" text-anchor="middle" fill="#d3869b" font-size="8" font-weight="700">C</text>
  <text x="275" y="68" fill="#d3869b" font-size="10">Culture</text>

  <!-- Layer 6 Right: AI Era (Stars) -->
  <circle cx="480" cy="80" r="12" fill="#1d2021" stroke="#fabd2f" stroke-width="1" opacity="0.7"/>
  <text x="480" y="84" text-anchor="middle" fill="#fabd2f" font-size="8" font-weight="700">✦</text>
  <text x="510" y="68" fill="#fabd2f" font-size="10">AI Era</text>
  <text x="510" y="80" fill="#928374" font-size="8">Stars, not Gravity</text>

  <!-- Top: convergence point -->
  <line x1="330" y1="68" x2="390" y2="38" stroke="#d3869b" stroke-width="0.6" opacity="0.3"/>
  <line x1="470" y1="68" x2="410" y2="38" stroke="#fabd2f" stroke-width="0.6" opacity="0.3"/>
  <circle cx="400" cy="32" r="6" fill="#fabd2f" opacity="0.6"/>
  <text x="400" y="20" text-anchor="middle" fill="#ebdbb2" font-size="10" font-weight="700">Engineers shape gravity</text>

  <!-- Ambient sparkles -->
  <circle cx="120" cy="80" r="1" fill="#ebdbb2" opacity="0.2"/>
  <circle cx="680" cy="120" r="1.2" fill="#ebdbb2" opacity="0.25"/>
  <circle cx="150" cy="300" r="1" fill="#ebdbb2" opacity="0.15"/>
  <circle cx="650" cy="350" r="1" fill="#ebdbb2" opacity="0.2"/>
  <circle cx="100" cy="200" r="0.8" fill="#ebdbb2" opacity="0.15"/>
  <circle cx="700" cy="250" r="1" fill="#ebdbb2" opacity="0.2"/>
  <circle cx="200" cy="420" r="0.8" fill="#ebdbb2" opacity="0.1"/>
  <circle cx="600" cy="440" r="0.8" fill="#ebdbb2" opacity="0.1"/>
  <circle cx="730" cy="60" r="1" fill="#fabd2f" opacity="0.15"/>
  <circle cx="70" cy="150" r="1" fill="#d3869b" opacity="0.15"/>
  <circle cx="180" cy="50" r="0.8" fill="#83a598" opacity="0.15"/>
  <circle cx="620" cy="30" r="0.8" fill="#b8bb26" opacity="0.15"/>

  <!-- Title -->
  <text x="680" y="470" text-anchor="middle" fill="#504945" font-size="9">Software Cosmology</text>
</svg>
