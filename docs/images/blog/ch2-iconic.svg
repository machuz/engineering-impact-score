<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="800" height="300" rx="8" fill="#282828"/>
  <rect width="800" height="28" rx="8" fill="#1d2021"/>
  <rect y="20" width="800" height="8" fill="#1d2021"/>
  <circle cx="18" cy="14" r="5" fill="#cc241d"/>
  <circle cx="36" cy="14" r="5" fill="#d79921"/>
  <circle cx="54" cy="14" r="5" fill="#98971a"/>

  <!-- Team structure tree (left) -->
  <text x="180" y="65" text-anchor="middle" fill="#8ec07c" font-size="13" font-weight="700">Team Structure</text>

  <!-- Root -->
  <circle cx="180" cy="100" r="14" fill="none" stroke="#8ec07c" stroke-width="2" opacity="0.7"/>
  <circle cx="180" cy="100" r="5" fill="#8ec07c"/>
  <text x="180" y="104" text-anchor="middle" fill="#282828" font-size="8" font-weight="700">L</text>

  <!-- Level 2 -->
  <line x1="180" y1="114" x2="110" y2="155" stroke="#665c54" stroke-width="1.5"/>
  <line x1="180" y1="114" x2="250" y2="155" stroke="#665c54" stroke-width="1.5"/>
  <circle cx="110" cy="160" r="11" fill="none" stroke="#83a598" stroke-width="2" opacity="0.7"/>
  <circle cx="110" cy="160" r="4" fill="#83a598"/>
  <circle cx="250" cy="160" r="11" fill="none" stroke="#83a598" stroke-width="2" opacity="0.7"/>
  <circle cx="250" cy="160" r="4" fill="#83a598"/>

  <!-- Level 3 -->
  <line x1="110" y1="171" x2="70" y2="210" stroke="#665c54" stroke-width="1"/>
  <line x1="110" y1="171" x2="150" y2="210" stroke="#665c54" stroke-width="1"/>
  <line x1="250" y1="171" x2="210" y2="210" stroke="#665c54" stroke-width="1"/>
  <line x1="250" y1="171" x2="290" y2="210" stroke="#665c54" stroke-width="1"/>
  <circle cx="70" cy="215" r="8" fill="none" stroke="#d3869b" stroke-width="1.5" opacity="0.6"/>
  <circle cx="70" cy="215" r="3" fill="#d3869b"/>
  <circle cx="150" cy="215" r="8" fill="none" stroke="#d3869b" stroke-width="1.5" opacity="0.6"/>
  <circle cx="150" cy="215" r="3" fill="#d3869b"/>
  <circle cx="210" cy="215" r="8" fill="none" stroke="#d3869b" stroke-width="1.5" opacity="0.6"/>
  <circle cx="210" cy="215" r="3" fill="#d3869b"/>
  <circle cx="290" cy="215" r="8" fill="none" stroke="#d3869b" stroke-width="1.5" opacity="0.6"/>
  <circle cx="290" cy="215" r="3" fill="#d3869b"/>

  <!-- Divider -->
  <line x1="390" y1="55" x2="390" y2="260" stroke="#504945" stroke-width="1" stroke-dasharray="4"/>

  <!-- Team health radar (right) -->
  <text x="590" y="65" text-anchor="middle" fill="#fabd2f" font-size="13" font-weight="700">Team Health</text>

  <!-- Radar pentagon -->
  <polygon points="590,90 660,135 640,205 540,205 520,135" fill="none" stroke="#504945" stroke-width="1" opacity="0.4"/>
  <polygon points="590,110 640,140 628,190 552,190 540,140" fill="none" stroke="#504945" stroke-width="1" opacity="0.3"/>
  <polygon points="590,130 620,148 614,178 566,178 560,148" fill="none" stroke="#504945" stroke-width="1" opacity="0.2"/>

  <!-- Radar fill -->
  <polygon points="590,100 650,140 620,200 555,195 530,138" fill="#8ec07c" opacity="0.15" stroke="#8ec07c" stroke-width="2"/>

  <!-- Radar dots -->
  <circle cx="590" cy="100" r="3" fill="#8ec07c"/>
  <circle cx="650" cy="140" r="3" fill="#8ec07c"/>
  <circle cx="620" cy="200" r="3" fill="#8ec07c"/>
  <circle cx="555" cy="195" r="3" fill="#8ec07c"/>
  <circle cx="530" cy="138" r="3" fill="#8ec07c"/>

  <!-- Radar labels -->
  <text x="590" y="85" text-anchor="middle" fill="#928374" font-size="9">Productivity</text>
  <text x="670" y="138" fill="#928374" font-size="9">Quality</text>
  <text x="635" y="218" fill="#928374" font-size="9">Growth</text>
  <text x="520" y="218" fill="#928374" font-size="9" text-anchor="end">Risk</text>
  <text x="510" y="138" fill="#928374" font-size="9" text-anchor="end">Balance</text>

  <!-- Health score -->
  <text x="590" y="255" text-anchor="middle" fill="#b8bb26" font-size="14" font-weight="700">Health: 82</text>

  <text x="30" y="282" fill="#8ec07c" font-size="11">$ eis team --config teams.yaml</text>
</svg>