<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="1000" height="420" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="1000" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="1000" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="500" y="20" text-anchor="middle" fill="#928374" font-size="12">Engineering Impact Score — Chapter 8</text>

  <!-- Left side: Text content -->
  <text x="30" y="75" fill="#928374" font-size="12">Chapter 8</text>
  <text x="30" y="115" fill="#fabd2f" font-size="24" font-weight="700">Engineering Relativity</text>
  <text x="30" y="148" fill="#928374" font-size="14">Why the Same Engineer Gets Different Scores</text>

  <!-- Left side: Relativity examples -->
  <text x="30" y="195" fill="#8ec07c" font-size="11" font-weight="700">Same engineer, different universes:</text>
  <text y="224" font-size="11"><tspan x="30" fill="#928374">Repo A </tspan><tspan fill="#d3869b">Architectural Engine </tspan><tspan fill="#928374">Total: </tspan><tspan fill="#fabd2f" font-weight="700">35</tspan></text>
  <text y="248" font-size="11"><tspan x="30" fill="#928374">Repo B </tspan><tspan fill="#fb4934">Unstructured        </tspan><tspan fill="#928374">Total: </tspan><tspan fill="#b8bb26" font-weight="700">60</tspan></text>

  <!-- Formula -->
  <text x="30" y="300" fill="#d3869b" font-size="14" font-weight="700">Score = f(engineer, context)</text>

  <!-- Bottom -->
  <text x="30" y="370" fill="#928374" font-size="11">The gravity depends on the space it exists in.</text>

  <!-- Right side: Large chapter number -->

  <!-- Right side: Same engineer branching into different repo scores -->
  <g opacity="0.9">
    <!-- Central engineer node -->
    <circle cx="750" cy="100" r="14" fill="#ebdbb2" opacity="0.9"/>
    <text x="750" y="80" text-anchor="middle" fill="#ebdbb2" font-size="9">Engineer</text>

    <!-- Branch lines -->
    <line x1="740" y1="114" x2="640" y2="210" stroke="#b8bb26" stroke-width="2" opacity="0.7"/>
    <line x1="750" y1="114" x2="750" y2="210" stroke="#fabd2f" stroke-width="2" opacity="0.7"/>
    <line x1="760" y1="114" x2="860" y2="210" stroke="#d3869b" stroke-width="2" opacity="0.7"/>

    <!-- Repo A -->
    <rect x="595" y="210" width="90" height="40" rx="5" fill="#3c3836"/>
    <rect x="595" y="210" width="70" height="40" rx="5" fill="#b8bb26" opacity="0.4"/>
    <text x="640" y="235" text-anchor="middle" fill="#b8bb26" font-size="12" font-weight="700">78</text>
    <text x="640" y="265" text-anchor="middle" fill="#8ec07c" font-size="9">Repo A</text>

    <!-- Repo B -->
    <rect x="705" y="210" width="90" height="40" rx="5" fill="#3c3836"/>
    <rect x="705" y="210" width="38" height="40" rx="5" fill="#fabd2f" opacity="0.4"/>
    <text x="750" y="235" text-anchor="middle" fill="#fabd2f" font-size="12" font-weight="700">42</text>
    <text x="750" y="265" text-anchor="middle" fill="#8ec07c" font-size="9">Repo B</text>

    <!-- Repo C -->
    <rect x="815" y="210" width="90" height="40" rx="5" fill="#3c3836"/>
    <rect x="815" y="210" width="82" height="40" rx="5" fill="#d3869b" opacity="0.4"/>
    <text x="860" y="235" text-anchor="middle" fill="#d3869b" font-size="12" font-weight="700">91</text>
    <text x="860" y="265" text-anchor="middle" fill="#8ec07c" font-size="9">Repo C</text>

    <!-- Different contexts text -->
    <text x="750" y="300" text-anchor="middle" fill="#665c54" font-size="10">Same engineer, different contexts</text>
  </g>
</svg>