<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="1000" height="420" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="1000" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="1000" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="500" y="20" text-anchor="middle" fill="#928374" font-size="12">Engineering Impact Score — Chapter 2</text>

  <!-- Left side: Text content -->
  <text x="30" y="75" fill="#928374" font-size="12">Chapter 2</text>
  <text x="30" y="115" fill="#fabd2f" font-size="24" font-weight="700">Beyond Individual Scores</text>
  <text x="30" y="148" fill="#928374" font-size="14">Measuring Team Health from Git History</text>

  <!-- Left side: Team health metrics -->
  <text x="30" y="190" fill="#8ec07c" font-size="11" font-weight="700">Team Health Radar</text>
  <text y="214" font-size="11"><tspan x="30" fill="#ebdbb2">Complementarity  </tspan><tspan fill="#b8bb26">███████░░░</tspan><tspan fill="#b8bb26" font-weight="700"> 72</tspan></text>
  <text y="230" font-size="11"><tspan x="30" fill="#ebdbb2">Growth Potential  </tspan><tspan fill="#b8bb26">██████░░░░</tspan><tspan fill="#b8bb26" font-weight="700"> 58</tspan></text>
  <text y="246" font-size="11"><tspan x="30" fill="#ebdbb2">Sustainability   </tspan><tspan fill="#fabd2f">█████░░░░░</tspan><tspan fill="#fabd2f" font-weight="700"> 45</tspan></text>
  <text y="262" font-size="11"><tspan x="30" fill="#ebdbb2">Productivity     </tspan><tspan fill="#b8bb26">███████░░░</tspan><tspan fill="#b8bb26" font-weight="700"> 67</tspan></text>
  <text y="278" font-size="11"><tspan x="30" fill="#ebdbb2">Quality          </tspan><tspan fill="#d3869b">████████░░</tspan><tspan fill="#d3869b" font-weight="700"> 81</tspan></text>
  <text y="294" font-size="11"><tspan x="30" fill="#ebdbb2">Bus Factor       </tspan><tspan fill="#fb4934">████░░░░░░</tspan><tspan fill="#fb4934" font-weight="700"> 35</tspan></text>
  <text y="310" font-size="11"><tspan x="30" fill="#ebdbb2">Gravity Health   </tspan><tspan fill="#b8bb26">██████░░░░</tspan><tspan fill="#b8bb26" font-weight="700"> 62</tspan></text>

  <!-- Bottom prompt -->
  <text x="30" y="390" fill="#8ec07c" font-size="12">$ eis team --config teams.yaml</text>
  <rect x="290" y="378" width="7" height="14" fill="#ebdbb2" opacity="0.7"/>

  <!-- Right side: Large chapter number -->
  <text x="750" y="320" text-anchor="middle" fill="#3c3836" font-size="200" font-weight="700">02</text>

  <!-- Right side: Team health pentagon/radar chart -->
  <g transform="translate(740, 200)" opacity="0.9">
    <!-- Pentagon outline -->
    <polygon points="0,-85 81,-26 50,69 -50,69 -81,-26" fill="none" stroke="#504945" stroke-width="1.5"/>
    <polygon points="0,-55 53,-17 33,45 -33,45 -53,-17" fill="none" stroke="#504945" stroke-width="1" opacity="0.5"/>
    <polygon points="0,-28 26,-8 16,23 -16,23 -26,-8" fill="none" stroke="#504945" stroke-width="0.5" opacity="0.3"/>

    <!-- Radar fill (team health shape) -->
    <polygon points="0,-61 69,-18 25,55 -35,48 -65,-10" fill="#8ec07c" opacity="0.15" stroke="#8ec07c" stroke-width="2"/>

    <!-- Axis lines -->
    <line x1="0" y1="0" x2="0" y2="-85" stroke="#504945" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="81" y2="-26" stroke="#504945" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="50" y2="69" stroke="#504945" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="-50" y2="69" stroke="#504945" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="-81" y2="-26" stroke="#504945" stroke-width="0.5"/>

    <!-- Data points -->
    <circle cx="0" cy="-61" r="4" fill="#b8bb26"/>
    <circle cx="69" cy="-18" r="4" fill="#b8bb26"/>
    <circle cx="25" cy="55" r="4" fill="#d3869b"/>
    <circle cx="-35" cy="48" r="4" fill="#fb4934"/>
    <circle cx="-65" cy="-10" r="4" fill="#fabd2f"/>

    <!-- Labels -->
    <text x="0" y="-95" text-anchor="middle" fill="#b8bb26" font-size="9">Comp</text>
    <text x="95" y="-22" text-anchor="start" fill="#b8bb26" font-size="9">Grow</text>
    <text x="35" y="75" fill="#d3869b" font-size="9">Qual</text>
    <text x="-65" y="75" fill="#fb4934" font-size="9">Bus</text>
    <text x="-105" y="-6" fill="#fabd2f" font-size="9">Sust</text>
  </g>

  <!-- Team member dots orbiting -->
  <circle cx="640" cy="120" r="5" fill="#8ec07c" opacity="0.6"/>
  <circle cx="860" cy="130" r="4" fill="#83a598" opacity="0.5"/>
  <circle cx="680" cy="370" r="4" fill="#d3869b" opacity="0.5"/>
  <circle cx="830" cy="360" r="5" fill="#b8bb26" opacity="0.6"/>
</svg>