  <text x="604" y="198" class="jp" fill="#ebdbb2" font-size="13" font-weight="700">テーマ、UX プリンシパル</text>
  <text x="604" y="214" class="jp" fill="#7c6f64" font-size="10">何を作らないか／誰のために</text>

