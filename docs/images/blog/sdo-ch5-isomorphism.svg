  <rect x="584" y="500" width="336" height="72" rx="10" fill="#282828" stroke="#83a598" stroke-width="1.5"/>
  <rect x="584" y="500" width="6" height="72" rx="3" fill="#83a598"/>
  <text x="604" y="532" class="jp" fill="#83a598" font-size="18" font-weight="800">実装層</text>
  <text x="604" y="550" class="jp" fill="#ebdbb2" font-size="13" font-weight="700">画面、操作、API</text>
