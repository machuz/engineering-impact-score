  <!-- Footer note -->
  <text x="480" y="608" text-anchor="middle" class="jp" fill="#a89984" font-size="12">対称に壊れ、対称に直る。片側だけの修復は半年後に同じ崩れを生む。</text>
  <text x="480" y="628" text-anchor="middle" class="mono" fill="#7c6f64" font-size="10">Conway's Law を 3 層 + 2 変換のレベルに強化した主張</text>
