    <line x1="380" y1="536" x2="580" y2="536" stroke="#83a598" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
    <polygon points="384,532 376,536 384,540" fill="#83a598" opacity="0.8"/>
