    <rect x="437" y="525" width="86" height="22" rx="11" fill="#1d2021" stroke="#83a598" stroke-width="1" opacity="0.9"/>
    <text x="480" y="541" text-anchor="middle" class="jp" fill="#83a598" font-size="11" font-weight="700">≅ 同型</text>
