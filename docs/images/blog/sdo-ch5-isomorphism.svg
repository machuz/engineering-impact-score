  <text x="752" y="484" text-anchor="middle" class="jp" fill="#7c6f64" font-size="10">情報設計を画面・API に／挙動を情報設計に</text>

  <!-- ═══════════════ IMPLEMENTATION ROW ═══════════════ -->
  <!-- Org Implementation -->
  <rect x="40" y="500" width="336" height="72" rx="10" fill="#282828" stroke="#83a598" stroke-width="1.5"/>
