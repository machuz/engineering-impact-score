      .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
      .jp   { font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', -apple-system, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="640" rx="12" fill="#1d2021"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="640" rx="2" fill="#8ec07c"/>

  <!-- Category label -->
  <text x="936" y="24" text-anchor="end" class="mono" fill="#504945" font-size="10">Isomorphism · ch5</text>

  <!-- Title -->
  <text x="480" y="46" text-anchor="middle" class="jp" fill="#ebdbb2" font-size="22" font-weight="800" letter-spacing="1.5">プロダクト ⇄ 組織 の同型性</text>
  <text x="480" y="68" text-anchor="middle" class="mono" fill="#928374" font-size="12">3 層 + 2 変換 は、プロダクト側と組織側で鏡像として立つ</text>

  <!-- Column headers -->
  <text x="208" y="108" text-anchor="middle" class="jp" fill="#ebdbb2" font-size="18" font-weight="800">組織</text>
  <text x="208" y="128" text-anchor="middle" class="mono" fill="#7c6f64" font-size="11">Organization</text>
  <text x="752" y="108" text-anchor="middle" class="jp" fill="#ebdbb2" font-size="18" font-weight="800">プロダクト</text>
  <text x="752" y="128" text-anchor="middle" class="mono" fill="#7c6f64" font-size="11">Product</text>

  <!-- ═══════════════ PRINCIPLE ROW ═══════════════ -->
