  <text y="28" font-size="14"><tspan x="24" fill="#83a598">weight</tspan><tspan x="74.4" fill="#928374"> = </tspan><tspan x="99.60000000000001" fill="#ebdbb2">member.Total</tspan><tspan x="200.40000000000003" fill="#928374"> / </tspan><tspan x="225.60000000000002" fill="#d3869b">100</tspan><tspan x="250.8" fill="#ebdbb2">  </tspan><tspan x="267.6" fill="#928374">(minimum 0.1)</tspan></text>
