<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="800" height="300" rx="8" fill="#282828"/>
  <rect width="800" height="28" rx="8" fill="#1d2021"/>
  <rect y="20" width="800" height="8" fill="#1d2021"/>
  <circle cx="18" cy="14" r="5" fill="#cc241d"/>
  <circle cx="36" cy="14" r="5" fill="#d79921"/>
  <circle cx="54" cy="14" r="5" fill="#98971a"/>

  <!-- Cosmic star map -->
  <!-- Orbital rings -->
  <circle cx="400" cy="155" r="120" fill="none" stroke="#504945" stroke-width="0.8" stroke-dasharray="6 4" opacity="0.3"/>
  <circle cx="400" cy="155" r="85" fill="none" stroke="#504945" stroke-width="0.8" stroke-dasharray="4 4" opacity="0.25"/>
  <circle cx="400" cy="155" r="50" fill="none" stroke="#504945" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.2"/>

  <!-- Central bright star -->
  <circle cx="400" cy="155" r="8" fill="#ebdbb2" opacity="0.9"/>
  <circle cx="400" cy="155" r="14" fill="#ebdbb2" opacity="0.1"/>

  <!-- Stars/commits scattered across the cosmos -->
  <!-- Inner ring -->
  <circle cx="360" cy="115" r="5" fill="#fabd2f" opacity="0.85"/>
  <circle cx="440" cy="125" r="4" fill="#b8bb26" opacity="0.8"/>
  <circle cx="430" cy="190" r="5" fill="#d3869b" opacity="0.85"/>
  <circle cx="355" cy="185" r="4" fill="#83a598" opacity="0.75"/>

  <!-- Middle ring -->
  <circle cx="320" cy="90" r="4" fill="#8ec07c" opacity="0.7"/>
  <circle cx="490" cy="110" r="3.5" fill="#fabd2f" opacity="0.65"/>
  <circle cx="500" cy="175" r="4" fill="#b8bb26" opacity="0.7"/>
  <circle cx="310" cy="190" r="3.5" fill="#fb4934" opacity="0.55"/>
  <circle cx="460" cy="220" r="4" fill="#83a598" opacity="0.7"/>
  <circle cx="340" cy="225" r="3.5" fill="#fabd2f" opacity="0.6"/>

  <!-- Outer ring -->
  <circle cx="280" cy="65" r="3" fill="#83a598" opacity="0.5"/>
  <circle cx="520" cy="70" r="3.5" fill="#d3869b" opacity="0.5"/>
  <circle cx="540" cy="155" r="3" fill="#b8bb26" opacity="0.45"/>
  <circle cx="260" cy="155" r="3" fill="#8ec07c" opacity="0.45"/>
  <circle cx="520" cy="240" r="3" fill="#fb4934" opacity="0.4"/>
  <circle cx="280" cy="245" r="3.5" fill="#fabd2f" opacity="0.45"/>

  <!-- Constellation lines (connecting some stars) -->
  <line x1="360" y1="115" x2="440" y2="125" stroke="#665c54" stroke-width="0.6" opacity="0.3"/>
  <line x1="440" y1="125" x2="430" y2="190" stroke="#665c54" stroke-width="0.6" opacity="0.3"/>
  <line x1="355" y1="185" x2="360" y2="115" stroke="#665c54" stroke-width="0.6" opacity="0.3"/>
  <line x1="320" y1="90" x2="360" y2="115" stroke="#665c54" stroke-width="0.6" opacity="0.25"/>
  <line x1="490" y1="110" x2="440" y2="125" stroke="#665c54" stroke-width="0.6" opacity="0.25"/>

  <!-- Labels around the cosmos -->
  <text x="100" y="75" fill="#665c54" font-size="10">Git = telescope</text>
  <text x="620" y="70" fill="#665c54" font-size="10">Commits = starlight</text>
  <text x="80" y="240" fill="#665c54" font-size="10">Dependencies = gravity</text>
  <text x="610" y="245" fill="#665c54" font-size="10">Design = structure</text>

  <text x="400" y="285" text-anchor="middle" fill="#ebdbb2" font-size="11">git archaeology is the astronomy of code universes</text>
</svg>