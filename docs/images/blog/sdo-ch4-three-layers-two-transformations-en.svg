<svg xmlns="http://www.w3.org/2000/svg" width="720" height="640" viewBox="0 0 720 640">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="720" height="640" rx="12" fill="#1d2021"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="640" rx="2" fill="#8ec07c"/>

  <!-- Category label -->
  <text x="696" y="24" text-anchor="end" class="mono" fill="#504945" font-size="10">Model · ch4</text>

  <!-- Title -->
  <text x="360" y="46" text-anchor="middle" class="sans" fill="#ebdbb2" font-size="22" font-weight="800" letter-spacing="1.2">3 Layers + 2 Transformations</text>
  <text x="360" y="68" text-anchor="middle" class="mono" fill="#928374" font-size="12">Principle ── transformation ── Structure ── transformation ── Implementation</text>

  <!-- ================== Principle Layer ================== -->
  <rect x="48" y="98" width="624" height="72" rx="10" fill="#282828" stroke="#fabd2f" stroke-width="1.5"/>
  <rect x="48" y="98" width="6" height="72" rx="3" fill="#fabd2f"/>
  <text x="74" y="131" class="sans" fill="#fabd2f" font-size="22" font-weight="800">Principle</text>
  <text x="74" y="152" class="mono" fill="#7c6f64" font-size="11">thought / strategy / worldview</text>
  <text x="320" y="128" class="sans" fill="#ebdbb2" font-size="14" font-weight="700">Strategy · worldview · thinking</text>
  <text x="320" y="149" class="sans" fill="#928374" font-size="12">why we build / what we won't / for whom / where we bet</text>

  <!-- ================== Transformation 1 (Principle ↔ Structure) ================== -->
  <g transform="translate(360, 188)">
    <line x1="0" y1="0" x2="0" y2="62" stroke="#8ec07c" stroke-width="2"/>
    <polygon points="-6,6 6,6 0,-2" fill="#8ec07c"/>
    <polygon points="-6,56 6,56 0,64" fill="#8ec07c"/>
  </g>
  <text x="346" y="208" text-anchor="end" class="sans" fill="#928374" font-size="11">↓ translate thought into form</text>
  <text x="346" y="224" text-anchor="end" class="sans" fill="#7c6f64" font-size="10">(architecture · org design · IA)</text>
  <text x="374" y="208" class="sans" fill="#928374" font-size="11">↑ walk structural reality back</text>
  <text x="374" y="224" class="sans" fill="#7c6f64" font-size="10">(re-evaluate / revise principles)</text>
  <rect x="268" y="238" width="184" height="22" rx="11" fill="#1d2021" stroke="#8ec07c" stroke-width="1"/>
  <text x="360" y="254" text-anchor="middle" class="sans" fill="#8ec07c" font-size="12" font-weight="700">transformation · Principle ↔ Structure</text>

  <!-- ================== Structure Layer ================== -->
  <rect x="48" y="278" width="624" height="84" rx="10" fill="#282828" stroke="#d3869b" stroke-width="1.5"/>
  <rect x="48" y="278" width="6" height="84" rx="3" fill="#d3869b"/>
  <text x="74" y="311" class="sans" fill="#d3869b" font-size="22" font-weight="800">Structure</text>
  <text x="74" y="332" class="mono" fill="#7c6f64" font-size="11">thought-given-form</text>
  <text x="320" y="308" class="sans" fill="#ebdbb2" font-size="14" font-weight="700">Architecture · org design · information architecture</text>
  <text x="320" y="329" class="sans" fill="#928374" font-size="12">RFCs · org charts · IA — referenced, cited, revised</text>
  <text x="320" y="349" class="sans" fill="#7c6f64" font-size="10">landing point of transformation · thin here = Principle ⊥ Implementation</text>

  <!-- ================== Transformation 2 (Structure ↔ Implementation) ================== -->
  <g transform="translate(360, 380)">
    <line x1="0" y1="0" x2="0" y2="62" stroke="#8ec07c" stroke-width="2"/>
    <polygon points="-6,6 6,6 0,-2" fill="#8ec07c"/>
    <polygon points="-6,56 6,56 0,64" fill="#8ec07c"/>
  </g>
  <text x="346" y="400" text-anchor="end" class="sans" fill="#928374" font-size="11">↓ translate form into code / screens</text>
  <text x="346" y="416" text-anchor="end" class="sans" fill="#7c6f64" font-size="10">(granularity hands can engage)</text>
  <text x="374" y="400" class="sans" fill="#928374" font-size="11">↑ walk implementation texture back</text>
  <text x="374" y="416" class="sans" fill="#7c6f64" font-size="10">(constraints · edge cases · reality)</text>
  <rect x="256" y="430" width="208" height="22" rx="11" fill="#1d2021" stroke="#8ec07c" stroke-width="1"/>
  <text x="360" y="446" text-anchor="middle" class="sans" fill="#8ec07c" font-size="12" font-weight="700">transformation · Structure ↔ Implementation</text>

  <!-- ================== Implementation Layer ================== -->
  <rect x="48" y="470" width="624" height="72" rx="10" fill="#282828" stroke="#83a598" stroke-width="1.5"/>
  <rect x="48" y="470" width="6" height="72" rx="3" fill="#83a598"/>
  <text x="74" y="503" class="sans" fill="#83a598" font-size="22" font-weight="800">Implementation</text>
  <text x="74" y="524" class="mono" fill="#7c6f64" font-size="11">substance / what actually runs</text>
  <text x="320" y="500" class="sans" fill="#ebdbb2" font-size="14" font-weight="700">Code · features · operations · screens · APIs</text>
  <text x="320" y="521" class="sans" fill="#928374" font-size="12">evaluated by: does it work · can it be used</text>

  <!-- ================== Footer note ================== -->
  <text x="360" y="578" text-anchor="middle" class="sans" fill="#a89984" font-size="12">Structure appears as the result of transformation.</text>
  <text x="360" y="598" text-anchor="middle" class="sans" fill="#928374" font-size="11">When transformation stalls, Principle disconnects from Structure, Structure from Implementation.</text>
  <text x="360" y="618" text-anchor="middle" class="sans" fill="#7c6f64" font-size="10">"Structure-Driven" = designing organizations where these transformations keep running.</text>
</svg>
