<svg xmlns="http://www.w3.org/2000/svg" width="960" height="680" viewBox="0 0 960 680">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Noto+Sans+JP:wght@400;700;800&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
      .jp   { font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', -apple-system, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <rect width="960" height="680" rx="12" fill="#1d2021"/>
  <rect x="0" y="0" width="4" height="680" rx="2" fill="#fe8019"/>
  <text x="936" y="24" text-anchor="end" class="mono" fill="#504945" font-size="10">Transformation Coach · ch4</text>

  <!-- Title -->
  <text x="480" y="46" text-anchor="middle" class="jp" fill="#ebdbb2" font-size="22" font-weight="800" letter-spacing="1.5">Bill Campbell — 最強の変換コーチ</text>
  <text x="480" y="68" text-anchor="middle" class="jp" fill="#928374" font-size="12">自分で変換を実行する人ではなく、他者の変換能力を拡張する人</text>

  <!-- Column headers -->
  <text x="244" y="102" text-anchor="middle" class="jp" fill="#cc241d" font-size="18" font-weight="800">✕  CEO のみ（技術背景）</text>
  <text x="244" y="120" text-anchor="middle" class="mono" fill="#7c6f64" font-size="11">without the coach</text>
  <text x="716" y="102" text-anchor="middle" class="jp" fill="#fe8019" font-size="18" font-weight="800">✓  Bill Campbell がコーチング</text>
  <text x="716" y="120" text-anchor="middle" class="mono" fill="#7c6f64" font-size="11">transformation coach present</text>

  <!-- Divider -->
  <line x1="480" y1="140" x2="480" y2="600" stroke="#3c3836" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ============ PANEL A: No Coach ============ -->

  <!-- Principle Layer -->
  <rect x="40" y="140" width="408" height="68" rx="10" fill="#282828" stroke="#fabd2f" stroke-width="1.5"/>
  <rect x="40" y="140" width="6" height="68" rx="3" fill="#fabd2f"/>
  <text x="62" y="172" class="jp" fill="#fabd2f" font-size="16" font-weight="800">原理層</text>
  <text x="62" y="192" class="jp" fill="#928374" font-size="10">戦略・世界観・思想</text>

  <!-- T1 zone: STUCK -->
  <g>
    <line x1="244" y1="220" x2="244" y2="264" stroke="#cc241d" stroke-width="2" stroke-dasharray="5 3"/>
    <polygon points="238,260 250,260 244,270" fill="#cc241d"/>
  </g>
  <text x="180" y="236" text-anchor="end" class="jp" fill="#cc241d" font-size="12" font-weight="700">✕ 詰まる</text>
  <text x="180" y="252" text-anchor="end" class="jp" fill="#7c6f64" font-size="10">原理 ↔ 構造 の変換</text>
  <text x="308" y="236" class="jp" fill="#cc241d" font-size="11" font-weight="700">CEO の習得が困難</text>
  <text x="308" y="252" class="jp" fill="#7c6f64" font-size="10">思想を組織の形に落とせない</text>

  <!-- Structure Layer -->
  <rect x="40" y="282" width="408" height="68" rx="10" fill="#282828" stroke="#d3869b" stroke-width="1.5"/>
  <rect x="40" y="282" width="6" height="68" rx="3" fill="#d3869b"/>
  <text x="62" y="314" class="jp" fill="#d3869b" font-size="16" font-weight="800">構造層</text>
  <text x="62" y="334" class="jp" fill="#928374" font-size="10">アーキテクチャ・組織設計</text>

  <!-- T2 zone: ACTIVE (green pair) -->
  <g>
    <line x1="132" y1="362" x2="132" y2="406" stroke="#8ec07c" stroke-width="2.5"/>
    <polygon points="126,402 138,402 132,414" fill="#8ec07c"/>
  </g>
  <g>
    <line x1="356" y1="362" x2="356" y2="406" stroke="#8ec07c" stroke-width="2"/>
    <polygon points="350,366 362,366 356,356" fill="#8ec07c"/>
  </g>
  <text x="244" y="382" text-anchor="middle" class="jp" fill="#8ec07c" font-size="12" font-weight="700">✓ できる</text>
  <text x="244" y="398" text-anchor="middle" class="jp" fill="#928374" font-size="10">構造 ↔ 実装 の変換（技術背景で到達）</text>

  <!-- Implementation Layer -->
  <rect x="40" y="424" width="408" height="68" rx="10" fill="#282828" stroke="#83a598" stroke-width="1.5"/>
  <rect x="40" y="424" width="6" height="68" rx="3" fill="#83a598"/>
  <text x="62" y="456" class="jp" fill="#83a598" font-size="16" font-weight="800">実装層</text>
  <text x="62" y="476" class="jp" fill="#928374" font-size="10">コード・機能・運用</text>

  <!-- Panel A summary -->
  <rect x="60" y="518" width="368" height="62" rx="8" fill="#1d2021" stroke="#cc241d" stroke-width="1"/>
  <text x="244" y="540" text-anchor="middle" class="jp" fill="#fb4934" font-size="12" font-weight="700">CEO は下側の変換しか持っていない</text>
  <text x="244" y="558" text-anchor="middle" class="jp" fill="#928374" font-size="10">技術リーダー出身の多くが、この状態で CEO 職に就く</text>
  <text x="244" y="572" text-anchor="middle" class="jp" fill="#7c6f64" font-size="10">原理を語るが、組織の形に落ちない</text>

  <!-- ============ PANEL B: With Bill ============ -->

  <!-- Principle Layer -->
  <rect x="512" y="140" width="408" height="68" rx="10" fill="#282828" stroke="#fabd2f" stroke-width="1.5"/>
  <rect x="512" y="140" width="6" height="68" rx="3" fill="#fabd2f"/>
  <text x="534" y="172" class="jp" fill="#fabd2f" font-size="16" font-weight="800">原理層</text>
  <text x="534" y="192" class="jp" fill="#928374" font-size="10">戦略・世界観・思想</text>

  <!-- T1 zone: NOW ACTIVE, coached by Bill -->
  <g>
    <line x1="548" y1="220" x2="548" y2="264" stroke="#8ec07c" stroke-width="2.5"/>
    <polygon points="542,260 554,260 548,272" fill="#8ec07c"/>
  </g>
  <g>
    <line x1="678" y1="220" x2="678" y2="264" stroke="#8ec07c" stroke-width="2"/>
    <polygon points="672,224 684,224 678,214" fill="#8ec07c"/>
  </g>
  <text x="613" y="238" text-anchor="middle" class="jp" fill="#8ec07c" font-size="12" font-weight="700">✓ 開通</text>
  <text x="613" y="254" text-anchor="middle" class="jp" fill="#928374" font-size="10">原理 ↔ 構造 の変換</text>

  <!-- Bill card - right side of T1 zone -->
  <rect x="716" y="216" width="196" height="52" rx="10" fill="#282828" stroke="#fe8019" stroke-width="2"/>
  <rect x="716" y="216" width="6" height="52" rx="3" fill="#fe8019"/>
  <text x="736" y="238" class="jp" fill="#fe8019" font-size="13" font-weight="800">Bill Campbell</text>
  <text x="736" y="254" class="jp" fill="#a89984" font-size="10">変換コーチ（変換は行わない）</text>

  <!-- Arrow from Bill card pointing LEFT toward T1 arrows -->
  <g>
    <line x1="716" y1="242" x2="690" y2="242" stroke="#fe8019" stroke-width="1.5" stroke-dasharray="3 2"/>
    <polygon points="694,238 694,246 686,242" fill="#fe8019"/>
  </g>

  <!-- Structure Layer -->
  <rect x="512" y="282" width="408" height="68" rx="10" fill="#282828" stroke="#d3869b" stroke-width="1.5"/>
  <rect x="512" y="282" width="6" height="68" rx="3" fill="#d3869b"/>
  <text x="534" y="314" class="jp" fill="#d3869b" font-size="16" font-weight="800">構造層</text>
  <text x="534" y="334" class="jp" fill="#928374" font-size="10">アーキテクチャ・組織設計</text>

  <!-- T2 zone: ACTIVE (still) -->
  <g>
    <line x1="604" y1="362" x2="604" y2="406" stroke="#8ec07c" stroke-width="2.5"/>
    <polygon points="598,402 610,402 604,414" fill="#8ec07c"/>
  </g>
  <g>
    <line x1="828" y1="362" x2="828" y2="406" stroke="#8ec07c" stroke-width="2"/>
    <polygon points="822,366 834,366 828,356" fill="#8ec07c"/>
  </g>
  <text x="716" y="382" text-anchor="middle" class="jp" fill="#8ec07c" font-size="12" font-weight="700">✓ できる</text>
  <text x="716" y="398" text-anchor="middle" class="jp" fill="#928374" font-size="10">構造 ↔ 実装 の変換（元々できる）</text>

  <!-- Implementation Layer -->
  <rect x="512" y="424" width="408" height="68" rx="10" fill="#282828" stroke="#83a598" stroke-width="1.5"/>
  <rect x="512" y="424" width="6" height="68" rx="3" fill="#83a598"/>
  <text x="534" y="456" class="jp" fill="#83a598" font-size="16" font-weight="800">実装層</text>
  <text x="534" y="476" class="jp" fill="#928374" font-size="10">コード・機能・運用</text>

  <!-- Panel B summary -->
  <rect x="532" y="518" width="368" height="62" rx="8" fill="#1d2021" stroke="#fe8019" stroke-width="1"/>
  <text x="716" y="540" text-anchor="middle" class="jp" fill="#fe8019" font-size="12" font-weight="700">Bill は変換を実行しない — CEO の変換能力を install する</text>
  <text x="716" y="558" text-anchor="middle" class="jp" fill="#928374" font-size="10">詰まりを取り除き、CEO 自身が上側の変換を回せるように整える</text>
  <text x="716" y="572" text-anchor="middle" class="jp" fill="#7c6f64" font-size="10">CEO の 3 層が貫通し、桁違いの価値が出始める</text>

  <!-- Footer -->
  <text x="480" y="628" text-anchor="middle" class="jp" fill="#a89984" font-size="12">変換を実行する人（変換者） と、変換能力を育てる人（変換コーチ） は別の役割。</text>
  <text x="480" y="648" text-anchor="middle" class="jp" fill="#7c6f64" font-size="10">Bill Campbell は後者の典型例 — 本書のフレームで初めて正当に評価できる最強の変換コーチ。</text>
</svg>
