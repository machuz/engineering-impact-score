  <text x="716" y="382" text-anchor="middle" class="sans" fill="#8ec07c" font-size="12" font-weight="700">✓ capable</text>
  <text x="716" y="398" text-anchor="middle" class="sans" fill="#928374" font-size="10">Structure ↔ Implementation (already had this)</text>

  <rect x="512" y="424" width="408" height="68" rx="10" fill="#282828" stroke="#83a598" stroke-width="1.5"/>
  <rect x="512" y="424" width="6" height="68" rx="3" fill="#83a598"/>
  <text x="534" y="456" class="sans" fill="#83a598" font-size="16" font-weight="800">Implementation</text>
  <text x="534" y="476" class="sans" fill="#928374" font-size="10">code · features · operations</text>

  <rect x="532" y="518" width="368" height="62" rx="8" fill="#1d2021" stroke="#fe8019" stroke-width="1"/>
  <text x="716" y="540" text-anchor="middle" class="sans" fill="#fe8019" font-size="12" font-weight="700">Bill doesn't perform the transformation — he installs the capability</text>
  <text x="716" y="558" text-anchor="middle" class="sans" fill="#928374" font-size="10">removes the blockage so the CEO can run the upper transformation themselves</text>
  <text x="716" y="572" text-anchor="middle" class="sans" fill="#7c6f64" font-size="10">the CEO's three layers connect vertically — outsized value starts to emerge</text>

  <!-- Footer -->
  <text x="480" y="628" text-anchor="middle" class="sans" fill="#a89984" font-size="12">A transformer (who performs transformation) and a transformation coach (who grows others' capability) are different roles.</text>
  <text x="480" y="648" text-anchor="middle" class="sans" fill="#7c6f64" font-size="10">Bill Campbell is the paradigmatic latter — the strongest transformation coach, finally namable under this book's frame.</text>
