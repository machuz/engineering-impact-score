  <text x="62" y="192" class="sans" fill="#928374" font-size="10">strategy · worldview · thinking</text>

  <!-- T1: STUCK -->
  <g>
    <line x1="244" y1="220" x2="244" y2="264" stroke="#cc241d" stroke-width="2" stroke-dasharray="5 3"/>
