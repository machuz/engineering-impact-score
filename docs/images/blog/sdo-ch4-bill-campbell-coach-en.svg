  <text x="480" y="46" text-anchor="middle" class="sans" fill="#ebdbb2" font-size="22" font-weight="800" letter-spacing="1.2">Bill Campbell — The Strongest Transformation Coach</text>
  <text x="480" y="68" text-anchor="middle" class="sans" fill="#928374" font-size="12">Not someone who performs transformation — someone who expands others' transformation capability</text>

