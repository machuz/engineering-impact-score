  <text x="244" y="558" text-anchor="middle" class="sans" fill="#928374" font-size="10">many tech-background leaders take CEO seats in this state</text>
  <text x="244" y="572" text-anchor="middle" class="sans" fill="#7c6f64" font-size="10">they speak at Principle, but it doesn't fold into organizational form</text>

