<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="800" height="300" rx="8" fill="#282828"/>
  <rect width="800" height="28" rx="8" fill="#1d2021"/>
  <rect y="20" width="800" height="8" fill="#1d2021"/>
  <circle cx="18" cy="14" r="5" fill="#cc241d"/>
  <circle cx="36" cy="14" r="5" fill="#d79921"/>
  <circle cx="54" cy="14" r="5" fill="#98971a"/>

  <!-- Big Bang - expanding concentric circles from center -->
  <!-- Outermost rings (faint) -->
  <circle cx="400" cy="160" r="130" fill="none" stroke="#928374" stroke-width="0.8" opacity="0.12"/>
  <circle cx="400" cy="160" r="110" fill="none" stroke="#928374" stroke-width="0.8" opacity="0.18"/>
  <circle cx="400" cy="160" r="90" fill="none" stroke="#d79921" stroke-width="1" opacity="0.2"/>
  <circle cx="400" cy="160" r="70" fill="none" stroke="#d79921" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="160" r="50" fill="none" stroke="#fabd2f" stroke-width="1.2" opacity="0.4"/>
  <circle cx="400" cy="160" r="30" fill="none" stroke="#fabd2f" stroke-width="1.5" opacity="0.6"/>
  <circle cx="400" cy="160" r="14" fill="#fabd2f" opacity="0.3"/>
  <circle cx="400" cy="160" r="6" fill="#fabd2f" opacity="0.9"/>

  <!-- Scattered initial commits (particles flying out) -->
  <circle cx="320" cy="100" r="3" fill="#b8bb26" opacity="0.8"/>
  <circle cx="470" cy="90" r="2.5" fill="#83a598" opacity="0.7"/>
  <circle cx="510" cy="130" r="3" fill="#d3869b" opacity="0.8"/>
  <circle cx="290" cy="150" r="2" fill="#8ec07c" opacity="0.7"/>
  <circle cx="530" cy="170" r="2.5" fill="#fabd2f" opacity="0.6"/>
  <circle cx="280" cy="200" r="3" fill="#fb4934" opacity="0.5"/>
  <circle cx="340" cy="220" r="2" fill="#83a598" opacity="0.6"/>
  <circle cx="480" cy="210" r="2.5" fill="#b8bb26" opacity="0.5"/>
  <circle cx="510" cy="200" r="2" fill="#d3869b" opacity="0.6"/>
  <circle cx="300" cy="120" r="2" fill="#fabd2f" opacity="0.5"/>
  <circle cx="490" cy="160" r="2.5" fill="#8ec07c" opacity="0.7"/>
  <circle cx="350" cy="190" r="2" fill="#fb4934" opacity="0.4"/>

  <!-- Expansion arrows (subtle) -->
  <line x1="406" y1="154" x2="450" y2="110" stroke="#fabd2f" stroke-width="0.8" opacity="0.3"/>
  <line x1="394" y1="154" x2="340" y2="100" stroke="#fabd2f" stroke-width="0.8" opacity="0.3"/>
  <line x1="406" y1="166" x2="480" y2="210" stroke="#fabd2f" stroke-width="0.8" opacity="0.3"/>
  <line x1="394" y1="166" x2="310" y2="210" stroke="#fabd2f" stroke-width="0.8" opacity="0.3"/>

  <!-- Labels -->
  <text x="140" y="80" fill="#665c54" font-size="11">git init</text>
  <text x="600" y="80" fill="#665c54" font-size="11">first commit</text>
  <text x="400" y="275" text-anchor="middle" fill="#665c54" font-size="11">The moment a codebase begins to exist</text>
</svg>