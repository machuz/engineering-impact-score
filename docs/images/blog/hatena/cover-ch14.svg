<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="800" height="800" rx="10" fill="#282828"/>

  <rect width="800" height="36" rx="10" fill="#1d2021"/>
  <rect y="26" width="800" height="10" fill="#1d2021"/>
  <circle cx="22" cy="18" r="7" fill="#cc241d"/>
  <circle cx="44" cy="18" r="7" fill="#d79921"/>
  <circle cx="66" cy="18" r="7" fill="#98971a"/>
  <text x="400" y="23" text-anchor="middle" fill="#928374" font-size="13">git考古学 — Chapter 14</text>

  <text x="400" y="200" text-anchor="middle" fill="#3c3836" font-size="200" font-weight="700">14</text>

  <text x="400" y="330" text-anchor="middle" fill="#fabd2f" font-size="30" font-weight="700">Civilization</text>
  <text x="400" y="380" text-anchor="middle" fill="#928374" font-size="18">なぜ一部のコードベースだけが文明になるのか</text>

  <!-- Civilization pyramid -->
  <!-- Foundation -->
  <rect x="200" y="620" width="400" height="35" rx="3" fill="#504945" opacity="0.4"/>
  <text x="400" y="642" text-anchor="middle" fill="#665c54" font-size="11">Foundation</text>

  <!-- Anchor layer -->
  <rect x="260" y="570" width="280" height="35" rx="3" fill="#458588" opacity="0.3"/>
  <circle cx="340" cy="587" r="10" fill="#83a598" opacity="0.7"/>
  <circle cx="460" cy="587" r="10" fill="#83a598" opacity="0.7"/>
  <text x="400" y="592" text-anchor="middle" fill="#83a598" font-size="10">Anchor × 2</text>

  <!-- Architect layer -->
  <rect x="330" y="520" width="140" height="35" rx="3" fill="#b57614" opacity="0.3"/>
  <circle cx="400" cy="537" r="12" fill="#fabd2f" opacity="0.8"/>
  <text x="400" y="542" text-anchor="middle" fill="#282828" font-size="9" font-weight="700">A/B</text>

  <!-- Producer stars -->
  <circle cx="300" cy="480" r="5" fill="#b8bb26" opacity="0.7"/>
  <circle cx="500" cy="480" r="5" fill="#b8bb26" opacity="0.7"/>
  <circle cx="350" cy="460" r="4" fill="#b8bb26" opacity="0.5"/>
  <circle cx="450" cy="460" r="4" fill="#b8bb26" opacity="0.5"/>
  <circle cx="400" cy="440" r="4" fill="#b8bb26" opacity="0.6"/>

  <!-- Gravity lines -->
  <line x1="400" y1="537" x2="300" y2="480" stroke="#fabd2f" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="537" x2="500" y2="480" stroke="#fabd2f" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="537" x2="350" y2="460" stroke="#fabd2f" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="537" x2="450" y2="460" stroke="#fabd2f" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="537" x2="400" y2="440" stroke="#fabd2f" stroke-width="0.5" opacity="0.3"/>

  <!-- Sparkles -->
  <circle cx="220" cy="430" r="1" fill="#ebdbb2" opacity="0.3"/>
  <circle cx="580" cy="440" r="1" fill="#ebdbb2" opacity="0.3"/>
  <circle cx="190" cy="580" r="1" fill="#ebdbb2" opacity="0.2"/>
  <circle cx="610" cy="600" r="1" fill="#ebdbb2" opacity="0.2"/>

  <text x="400" y="720" text-anchor="middle" fill="#ebdbb2" font-size="13">most code universes die. only a few become civilizations.</text>

  <text x="30" y="760" fill="#8ec07c" font-size="13">$ eis analyze --recursive</text>
  <rect x="280" y="747" width="8" height="16" fill="#ebdbb2" opacity="0.7"/>
