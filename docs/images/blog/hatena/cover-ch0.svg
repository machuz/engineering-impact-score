<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fabd2f" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#282828" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Terminal background -->
  <rect width="800" height="800" fill="#282828"/>

  <!-- Title bar -->
  <rect width="800" height="36" fill="#1d2021"/>
  <rect y="26" width="800" height="10" fill="#1d2021"/>
  <circle cx="22" cy="18" r="7" fill="#cc241d"/>
  <circle cx="44" cy="18" r="7" fill="#d79921"/>
  <circle cx="66" cy="18" r="7" fill="#98971a"/>
  <text x="400" y="23" text-anchor="middle" fill="#928374" font-size="13">git考古学 — Chapter 0</text>

  <!-- Chapter number -->
  <text x="400" y="200" text-anchor="middle" fill="#3c3836" font-size="200" font-weight="700">00</text>

  <!-- Japanese title -->
  <text x="400" y="320" text-anchor="middle" fill="#fabd2f" font-size="26" font-weight="700">The Git Telescope</text>
  <text x="400" y="362" text-anchor="middle" fill="#8ec07c" font-size="22" font-weight="700">構造を科学する</text>

  <!-- English subtitle -->
  <text x="400" y="415" text-anchor="middle" fill="#928374" font-size="16">Making Architecture a Science</text>

  <!-- Telescope illustration -->
  <g opacity="0.9">
    <!-- Glow -->
    <circle cx="400" cy="580" r="100" fill="url(#glow)"/>

    <!-- Stars around telescope -->
    <text x="250" y="480" fill="#fabd2f" font-size="12" opacity="0.5">*</text>
    <text x="350" y="470" fill="#ebdbb2" font-size="8" opacity="0.3">.</text>
    <text x="550" y="475" fill="#d3869b" font-size="12" opacity="0.5">*</text>
    <text x="480" y="460" fill="#ebdbb2" font-size="8" opacity="0.3">.</text>
    <text x="300" y="500" fill="#8ec07c" font-size="8" opacity="0.4">.</text>
    <text x="510" y="490" fill="#ebdbb2" font-size="10" opacity="0.3">.</text>

    <!-- Lens -->
    <rect x="370" y="495" width="60" height="8" rx="4" fill="#665c54"/>
    <rect x="375" y="490" width="50" height="5" rx="2" fill="#504945"/>

    <!-- Tube -->
    <rect x="385" y="503" width="30" height="80" rx="3" fill="#504945"/>
    <rect x="388" y="503" width="24" height="80" rx="2" fill="#3c3836"/>

    <!-- Eyepiece -->
    <rect x="380" y="583" width="40" height="12" rx="3" fill="#665c54"/>

    <!-- Tripod -->
    <line x1="400" y1="595" x2="340" y2="680" stroke="#665c54" stroke-width="3"/>
    <line x1="400" y1="595" x2="460" y2="680" stroke="#665c54" stroke-width="3"/>
    <line x1="400" y1="595" x2="400" y2="685" stroke="#665c54" stroke-width="3"/>

    <!-- Light rays -->
    <line x1="350" y1="460" x2="385" y2="498" stroke="#fabd2f" stroke-width="1" opacity="0.25"/>
    <line x1="400" y1="450" x2="400" y2="490" stroke="#fabd2f" stroke-width="1" opacity="0.25"/>
    <line x1="450" y1="460" x2="415" y2="498" stroke="#fabd2f" stroke-width="1" opacity="0.25"/>

    <!-- 7 axis labels orbiting -->
    <text x="270" y="545" fill="#b8bb26" font-size="10" opacity="0.6">Production</text>
    <text x="270" y="575" fill="#b8bb26" font-size="10" opacity="0.6">Debt</text>
    <text x="270" y="605" fill="#b8bb26" font-size="10" opacity="0.6">Breadth</text>
    <text x="490" y="535" fill="#b8bb26" font-size="10" opacity="0.6">Quality</text>
    <text x="490" y="565" fill="#d3869b" font-size="10" font-weight="700" opacity="0.8">Survival</text>
    <text x="490" y="595" fill="#d3869b" font-size="10" opacity="0.6">Design</text>
    <text x="490" y="625" fill="#fabd2f" font-size="10" opacity="0.6">Indispensable</text>
  </g>

  <!-- Bottom prompt -->
  <text x="30" y="760" fill="#8ec07c" font-size="13">$ brew tap machuz/tap &amp;&amp; brew install eis</text>
  <rect x="440" y="747" width="8" height="16" fill="#ebdbb2" opacity="0.7"/>
</svg>