<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
    <radialGradient id="burst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fabd2f" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fabd2f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="800" rx="10" fill="#282828"/>

  <rect width="800" height="36" rx="10" fill="#1d2021"/>
  <rect y="26" width="800" height="10" fill="#1d2021"/>
  <circle cx="22" cy="18" r="7" fill="#cc241d"/>
  <circle cx="44" cy="18" r="7" fill="#d79921"/>
  <circle cx="66" cy="18" r="7" fill="#98971a"/>
  <text x="400" y="23" text-anchor="middle" fill="#928374" font-size="13">git考古学 — Chapter 15</text>

  <text x="400" y="200" text-anchor="middle" fill="#3c3836" font-size="200" font-weight="700">15</text>

  <text x="400" y="330" text-anchor="middle" fill="#fabd2f" font-size="30" font-weight="700">AI Creates Stars, Not Gravity</text>
  <text x="400" y="380" text-anchor="middle" fill="#928374" font-size="18">AIがもたらす星の爆発</text>

  <!-- Starburst visualization -->
  <circle cx="400" cy="560" r="140" fill="url(#burst)"/>

  <!-- Central mass -->
  <circle cx="400" cy="560" r="6" fill="#ebdbb2" opacity="0.9"/>

  <!-- Inner ring: bright AI-generated stars -->
  <circle cx="370" cy="520" r="4" fill="#b8bb26" opacity="0.9"/>
  <circle cx="430" cy="510" r="5" fill="#b8bb26" opacity="0.8"/>
  <circle cx="450" cy="550" r="4" fill="#b8bb26" opacity="0.9"/>
  <circle cx="440" cy="590" r="3" fill="#b8bb26" opacity="0.8"/>
  <circle cx="400" cy="610" r="4" fill="#b8bb26" opacity="0.9"/>
  <circle cx="360" cy="590" r="3" fill="#b8bb26" opacity="0.8"/>
  <circle cx="350" cy="550" r="4" fill="#b8bb26" opacity="0.9"/>
  <circle cx="380" cy="600" r="3" fill="#b8bb26" opacity="0.7"/>

  <!-- Outer ring: scattering stars -->
  <circle cx="310" cy="480" r="3" fill="#fabd2f" opacity="0.6"/>
  <circle cx="480" cy="470" r="3" fill="#fabd2f" opacity="0.5"/>
  <circle cx="530" cy="520" r="3" fill="#fabd2f" opacity="0.5"/>
  <circle cx="540" cy="600" r="3" fill="#fabd2f" opacity="0.4"/>
  <circle cx="500" cy="660" r="3" fill="#fabd2f" opacity="0.4"/>
  <circle cx="400" cy="700" r="3" fill="#fabd2f" opacity="0.5"/>
  <circle cx="300" cy="650" r="3" fill="#fabd2f" opacity="0.4"/>
  <circle cx="270" cy="570" r="3" fill="#fabd2f" opacity="0.4"/>
  <circle cx="290" cy="510" r="3" fill="#fabd2f" opacity="0.5"/>

  <!-- Outermost: fading (entropy) -->
  <circle cx="250" cy="440" r="2" fill="#fb4934" opacity="0.3"/>
  <circle cx="560" cy="460" r="2" fill="#fb4934" opacity="0.3"/>
  <circle cx="580" cy="630" r="2" fill="#fb4934" opacity="0.2"/>
  <circle cx="510" cy="710" r="2" fill="#fb4934" opacity="0.2"/>
  <circle cx="290" cy="700" r="2" fill="#fb4934" opacity="0.2"/>
  <circle cx="240" cy="610" r="2" fill="#fb4934" opacity="0.2"/>

  <!-- Motion lines -->
  <line x1="310" y1="480" x2="280" y2="460" stroke="#fabd2f" stroke-width="0.5" opacity="0.3"/>
  <line x1="480" y1="470" x2="500" y2="450" stroke="#fabd2f" stroke-width="0.5" opacity="0.3"/>
  <line x1="540" y1="600" x2="560" y2="610" stroke="#fabd2f" stroke-width="0.5" opacity="0.2"/>
  <line x1="300" y1="650" x2="280" y2="670" stroke="#fabd2f" stroke-width="0.5" opacity="0.2"/>

  <!-- Broken gravity circle -->
  <circle cx="400" cy="560" r="90" fill="none" stroke="#fb4934" stroke-width="1" stroke-dasharray="3,6" opacity="0.25"/>

  <text x="400" y="420" text-anchor="middle" fill="#665c54" font-size="10">stars scatter without gravity</text>

  <text x="400" y="760" text-anchor="middle" fill="#ebdbb2" font-size="13">AI creates stars. but it doesn't create gravity.</text>

  <text x="30" y="780" fill="#8ec07c" font-size="13">$ eis analyze --recursive</text>
  <rect x="280" y="767" width="8" height="16" fill="#ebdbb2" opacity="0.7"/>
</svg>