<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="800" height="800" fill="#282828"/>

  <rect width="800" height="36" fill="#1d2021"/>
  <rect y="26" width="800" height="10" fill="#1d2021"/>
  <circle cx="22" cy="18" r="7" fill="#cc241d"/>
  <circle cx="44" cy="18" r="7" fill="#d79921"/>
  <circle cx="66" cy="18" r="7" fill="#98971a"/>
  <text x="400" y="23" text-anchor="middle" fill="#928374" font-size="13">git考古学 — Chapter 8</text>

  <text x="400" y="200" text-anchor="middle" fill="#3c3836" font-size="200" font-weight="700">08</text>

  <text x="400" y="330" text-anchor="middle" fill="#fabd2f" font-size="26" font-weight="700">Engineering Relativity</text>
  <text x="400" y="378" text-anchor="middle" fill="#928374" font-size="16">なぜ同じエンジニアでも</text>
  <text x="400" y="402" text-anchor="middle" fill="#928374" font-size="16">スコアが変わるのか</text>

  <!-- Decorative: same person, different signals in different repos -->
  <text x="200" y="490" text-anchor="middle" fill="#8ec07c" font-size="12" font-weight="700">Repo A</text>
  <rect x="130" y="505" width="140" height="30" rx="4" fill="#3c3836"/>
  <rect x="130" y="505" width="110" height="30" rx="4" fill="#b8bb26" opacity="0.6"/>
  <text x="250" y="525" fill="#b8bb26" font-size="12" font-weight="700">78</text>

  <text x="400" y="490" text-anchor="middle" fill="#8ec07c" font-size="12" font-weight="700">Repo B</text>
  <rect x="330" y="505" width="140" height="30" rx="4" fill="#3c3836"/>
  <rect x="330" y="505" width="60" height="30" rx="4" fill="#fabd2f" opacity="0.6"/>
  <text x="400" y="525" fill="#fabd2f" font-size="12" font-weight="700">42</text>

  <text x="600" y="490" text-anchor="middle" fill="#8ec07c" font-size="12" font-weight="700">Repo C</text>
  <rect x="530" y="505" width="140" height="30" rx="4" fill="#3c3836"/>
  <rect x="530" y="505" width="130" height="30" rx="4" fill="#d3869b" opacity="0.6"/>
  <text x="670" y="525" fill="#d3869b" font-size="12" font-weight="700">91</text>

  <!-- Same engineer icon -->
  <text x="400" y="600" text-anchor="middle" fill="#ebdbb2" font-size="14">Same engineer, different contexts</text>

  <!-- E = mc^2 style formula -->
  <text x="400" y="670" text-anchor="middle" fill="#d3869b" font-size="18" font-weight="700">Impact = f(engineer, context)</text>

  <text x="30" y="760" fill="#8ec07c" font-size="13">$ eis analyze --per-repo --author machuz</text>
  <rect x="428" y="747" width="8" height="16" fill="#ebdbb2" opacity="0.7"/>
