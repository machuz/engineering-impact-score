<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
    <radialGradient id="gfield" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ebdbb2" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ebdbb2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="800" rx="10" fill="#282828"/>

  <rect width="800" height="36" rx="10" fill="#1d2021"/>
  <rect y="26" width="800" height="10" fill="#1d2021"/>
  <circle cx="22" cy="18" r="7" fill="#cc241d"/>
  <circle cx="44" cy="18" r="7" fill="#d79921"/>
  <circle cx="66" cy="18" r="7" fill="#98971a"/>
  <text x="400" y="23" text-anchor="middle" fill="#928374" font-size="13">git考古学 — Chapter 16 — Final</text>

  <text x="400" y="200" text-anchor="middle" fill="#3c3836" font-size="200" font-weight="700">16</text>

  <text x="400" y="320" text-anchor="middle" fill="#fabd2f" font-size="26" font-weight="700">The Engineers Who Shape Gravity</text>
  <text x="400" y="365" text-anchor="middle" fill="#928374" font-size="18">重力を作るエンジニアたち</text>

  <!-- Gravity field -->
  <circle cx="400" cy="560" r="140" fill="url(#gfield)"/>
  <circle cx="400" cy="560" r="110" fill="none" stroke="#504945" stroke-width="0.8" opacity="0.3"/>
  <circle cx="400" cy="560" r="70" fill="none" stroke="#504945" stroke-width="0.8" opacity="0.35"/>
  <circle cx="400" cy="560" r="35" fill="none" stroke="#504945" stroke-width="0.8" opacity="0.4"/>

  <!-- Central engineer -->
  <circle cx="400" cy="560" r="10" fill="#fabd2f" opacity="0.9"/>

  <!-- Orbiting stars -->
  <circle cx="355" cy="500" r="4" fill="#b8bb26" opacity="0.8"/>
  <circle cx="450" cy="490" r="3" fill="#83a598" opacity="0.7"/>
  <circle cx="480" cy="540" r="4" fill="#d3869b" opacity="0.7"/>
  <circle cx="460" cy="610" r="3" fill="#b8bb26" opacity="0.7"/>
  <circle cx="400" cy="640" r="4" fill="#83a598" opacity="0.8"/>
  <circle cx="340" cy="610" r="3" fill="#d3869b" opacity="0.7"/>
  <circle cx="320" cy="550" r="4" fill="#b8bb26" opacity="0.7"/>
  <circle cx="340" cy="500" r="3" fill="#83a598" opacity="0.7"/>

  <!-- Sparkles -->
  <circle cx="250" cy="440" r="1" fill="#ebdbb2" opacity="0.2"/>
  <circle cx="550" cy="450" r="1" fill="#ebdbb2" opacity="0.2"/>
  <circle cx="560" cy="650" r="1" fill="#ebdbb2" opacity="0.15"/>
  <circle cx="240" cy="640" r="1" fill="#ebdbb2" opacity="0.15"/>

  <text x="400" y="730" text-anchor="middle" fill="#ebdbb2" font-size="12">Git remembers the past. AI imagines the future.</text>
  <text x="400" y="752" text-anchor="middle" fill="#fabd2f" font-size="12">Between them, engineers shape gravity.</text>
</svg>