<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="1000" height="420" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="1000" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="1000" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="500" y="20" text-anchor="middle" fill="#928374" font-size="12">Engineering Impact Signal — Chapter 5</text>

  <!-- Left side: Text content -->
  <text x="30" y="75" fill="#928374" font-size="12">Chapter 5</text>
  <text x="30" y="115" fill="#fabd2f" font-size="24" font-weight="700">Timeline: Signals</text>
  <text x="30" y="148" fill="#fabd2f" font-size="24" font-weight="700">Don't Lie</text>
  <text x="30" y="178" fill="#928374" font-size="14">And They Capture Hesitation Too</text>

  <!-- Left side: Signal timeline -->
  <text x="30" y="215" fill="#8ec07c" font-size="11" font-weight="700">Timeline</text>
  <text y="238" font-size="11"><tspan x="30" fill="#928374">Q1 </tspan><tspan fill="#d3869b">████████████████████</tspan><tspan fill="#d3869b"> 90 Architect</tspan></text>
  <text y="256" font-size="11"><tspan x="30" fill="#928374">Q2 </tspan><tspan fill="#b8bb26">██████████████████</tspan><tspan fill="#fabd2f">   73 Producer</tspan></text>
  <text y="274" font-size="11"><tspan x="30" fill="#928374">Q3 </tspan><tspan fill="#fabd2f">█████████████</tspan><tspan fill="#83a598">        49 Anchor</tspan></text>
  <text y="292" font-size="11"><tspan x="30" fill="#928374">Q4 </tspan><tspan fill="#fb4934">███████</tspan><tspan fill="#fb4934">              31 Fragile</tspan></text>
  <text y="310" font-size="11"><tspan x="30" fill="#928374">Q5 </tspan><tspan fill="#928374">███</tspan><tspan fill="#928374">                  11 Former</tspan></text>

  <!-- Bottom -->
  <text x="30" y="370" fill="#928374" font-size="11">Hesitation leaves traces in the data.</text>

  <!-- Right side: Large chapter number -->

  <!-- Right side: Timeline with role transition markers -->
  <g opacity="0.9">
    <!-- Main timeline horizontal line -->
    <line x1="570" y1="210" x2="950" y2="210" stroke="#665c54" stroke-width="2"/>

    <!-- Timeline markers -->
    <circle cx="610" cy="210" r="8" fill="#b8bb26"/>
    <line x1="610" y1="175" x2="610" y2="202" stroke="#b8bb26" stroke-width="1.5"/>
    <text x="610" y="165" text-anchor="middle" fill="#b8bb26" font-size="10">Q1</text>

    <circle cx="700" cy="210" r="10" fill="#fabd2f"/>
    <line x1="700" y1="222" x2="700" y2="252" stroke="#fabd2f" stroke-width="1.5"/>
    <text x="700" y="268" text-anchor="middle" fill="#fabd2f" font-size="10">Q3</text>

    <circle cx="790" cy="210" r="7" fill="#d3869b"/>
    <line x1="790" y1="175" x2="790" y2="203" stroke="#d3869b" stroke-width="1.5"/>
    <text x="790" y="165" text-anchor="middle" fill="#d3869b" font-size="10">Q5</text>

    <circle cx="870" cy="210" r="12" fill="#8ec07c"/>
    <line x1="870" y1="222" x2="870" y2="252" stroke="#8ec07c" stroke-width="1.5"/>
    <text x="870" y="268" text-anchor="middle" fill="#8ec07c" font-size="10">Q7</text>

    <circle cx="935" cy="210" r="7" fill="#83a598"/>
    <line x1="935" y1="175" x2="935" y2="203" stroke="#83a598" stroke-width="1.5"/>
    <text x="935" y="165" text-anchor="middle" fill="#83a598" font-size="10">Q9</text>

    <!-- Role transition labels -->
    <text x="650" y="320" fill="#b8bb26" font-size="11" font-weight="700">Producer</text>
    <text x="750" y="340" fill="#fabd2f" font-size="11" font-weight="700">Architect</text>
    <text x="860" y="320" fill="#8ec07c" font-size="11" font-weight="700">Lead</text>

    <!-- Transition arrows -->
    <line x1="710" y1="318" x2="745" y2="333" stroke="#665c54" stroke-width="1"/>
    <line x1="810" y1="333" x2="850" y2="318" stroke="#665c54" stroke-width="1"/>

    <!-- Decline indicator (dashed) -->
    <line x1="935" y1="210" x2="970" y2="210" stroke="#fb4934" stroke-width="1.5" stroke-dasharray="4" opacity="0.5"/>
  </g>
</svg>