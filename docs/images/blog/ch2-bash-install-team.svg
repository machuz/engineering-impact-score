<svg xmlns="http://www.w3.org/2000/svg" width="620" height="192" viewBox="0 0 620 192">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Card background -->
  <rect width="620" height="192" rx="8" fill="#1d2021"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="192" rx="2" fill="#fe8019"/>

  <!-- Category label -->
  <text x="592" y="18" text-anchor="end" fill="#504945" font-size="10">Bash</text>

  <text x="24" y="28" fill="#928374" font-size="12"># Install</text>
  <text y="46" font-size="12"><tspan x="24" fill="#b8bb26">brew</tspan><tspan x="52.8" fill="#ebdbb2"> tap machuz/tap &amp;&amp; </tspan><tspan x="189.59999999999997" fill="#b8bb26">brew</tspan><tspan x="218.39999999999998" fill="#ebdbb2"> install eis</tspan></text>
  <text x="24" y="82" fill="#928374" font-size="12"># Team analysis</text>
  <text y="100" font-size="12"><tspan x="24" fill="#b8bb26">eis</tspan><tspan x="45.599999999999994" fill="#ebdbb2"> team --recursive ~/workspace</tspan></text>
  <text x="24" y="136" fill="#928374" font-size="12"># JSON → paste into AI</text>
  <text y="154" font-size="12"><tspan x="24" fill="#b8bb26">eis</tspan><tspan x="45.599999999999994" fill="#ebdbb2"> team --format json --recursive ~/workspace | pbcopy</tspan></text>
</svg>