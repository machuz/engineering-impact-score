<svg xmlns="http://www.w3.org/2000/svg" width="640" height="172" viewBox="0 0 640 172">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Card background -->
  <rect width="640" height="172" rx="8" fill="#1d2021"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="172" rx="2" fill="#b8bb26"/>

  <!-- Category label -->
  <text x="612" y="18" text-anchor="end" fill="#504945" font-size="10">Python</text>

  <text y="28" font-size="12"><tspan x="24" fill="#fb4934">for</tspan><tspan x="45.599999999999994" fill="#ebdbb2"> module </tspan><tspan x="103.19999999999999" fill="#fb4934">in</tspan><tspan x="117.6" fill="#ebdbb2"> all_modules:</tspan></text>
  <text y="46" font-size="12"><tspan x="24" fill="#83a598">    top_share</tspan><tspan x="117.6" fill="#928374"> = </tspan><tspan x="139.2" fill="#fabd2f">max</tspan><tspan x="160.79999999999998" fill="#ebdbb2">(blame_distribution[module].values())</tspan><tspan x="427.19999999999993" fill="#928374"> / </tspan><tspan x="448.79999999999995" fill="#ebdbb2">total</tspan></text>
  <text y="64" font-size="12"><tspan x="24" fill="#ebdbb2">    </tspan><tspan x="52.8" fill="#fb4934">if</tspan><tspan x="67.19999999999999" fill="#ebdbb2"> top_share &gt;= </tspan><tspan x="167.99999999999997" fill="#d3869b">0.8</tspan><tspan x="189.59999999999997" fill="#ebdbb2">:</tspan></text>
  <text y="82" font-size="12"><tspan x="24" fill="#ebdbb2">        critical_modules</tspan><tspan x="196.79999999999998" fill="#ebdbb2">[top_author].append(module)</tspan></text>
  <text y="100" font-size="12"><tspan x="24" fill="#ebdbb2">    </tspan><tspan x="52.8" fill="#fb4934">elif</tspan><tspan x="81.6" fill="#ebdbb2"> top_share &gt;= </tspan><tspan x="182.39999999999998" fill="#d3869b">0.6</tspan><tspan x="203.99999999999997" fill="#ebdbb2">:</tspan></text>
  <text y="118" font-size="12"><tspan x="24" fill="#ebdbb2">        high_risk_modules</tspan><tspan x="203.99999999999997" fill="#ebdbb2">[top_author].append(module)</tspan></text>
  <text y="154" font-size="12"><tspan x="24" fill="#83a598">indispensability</tspan><tspan x="139.2" fill="#928374"> = </tspan><tspan x="160.79999999999998" fill="#ebdbb2">critical_count</tspan><tspan x="261.59999999999997" fill="#928374"> × </tspan><tspan x="283.2" fill="#d3869b">1.0</tspan><tspan x="304.8" fill="#928374"> + </tspan><tspan x="326.40000000000003" fill="#ebdbb2">high_count</tspan><tspan x="398.40000000000003" fill="#928374"> × </tspan><tspan x="420.00000000000006" fill="#d3869b">0.5</tspan></text>
</svg>