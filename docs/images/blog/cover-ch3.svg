<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="600" height="360" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="600" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="600" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="300" y="20" text-anchor="middle" fill="#928374" font-size="12">Engineering Impact Score — Chapter 3</text>

  <text x="20" y="70" fill="#928374" font-size="12">Chapter 3</text>
  <text x="20" y="106" fill="#fabd2f" font-size="24" font-weight="700">Two Paths to Architect</text>
  <text x="20" y="142" fill="#928374" font-size="14">How Engineers Evolve Differently</text>
  <text x="20" y="196" fill="#8ec07c" font-size="12" font-weight="700">  Archetypes</text>
  <text y="232" font-size="12"><tspan x="20" fill="#d3869b">  ◆ </tspan><tspan x="48.8" fill="#d3869b" font-weight="700">Architect</tspan><tspan x="113.6" fill="#928374">  — Creates gravity, shapes codebase structure</tspan></text>
  <text y="250" font-size="12"><tspan x="20" fill="#83a598">  ◆ </tspan><tspan x="48.8" fill="#83a598" font-weight="700">Anchor</tspan><tspan x="92.0" fill="#928374">     — Maintains orbit, stabilizes code</tspan></text>
  <text y="268" font-size="12"><tspan x="20" fill="#fabd2f">  ◆ </tspan><tspan x="48.8" fill="#fabd2f" font-weight="700">Producer</tspan><tspan x="106.4" fill="#928374">   — Generates output, uses structure</tspan></text>
  <text y="286" font-size="12"><tspan x="20" fill="#8ec07c">  ◆ </tspan><tspan x="48.8" fill="#8ec07c" font-weight="700">Cleaner</tspan><tspan x="99.19999999999999" fill="#928374">    — Reduces entropy, improves quality</tspan></text>
  <text y="322" font-size="12"><tspan x="20" fill="#928374">  Builder → Mass → Balanced → Spread → Churn → Rescue</tspan></text>
</svg>