<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="1000" height="420" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="1000" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="1000" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="500" y="20" text-anchor="middle" fill="#928374" font-size="12">Engineering Impact Score — Chapter 3</text>

  <!-- Left side: Text content -->
  <text x="30" y="75" fill="#928374" font-size="12">Chapter 3</text>
  <text x="30" y="115" fill="#fabd2f" font-size="24" font-weight="700">Two Paths to Architect</text>
  <text x="30" y="148" fill="#928374" font-size="14">How Engineers Evolve Differently</text>

  <!-- Left side: Archetypes -->
  <text x="30" y="195" fill="#8ec07c" font-size="11" font-weight="700">Archetypes</text>
  <text y="220" font-size="11"><tspan x="30" fill="#d3869b">Architect </tspan><tspan fill="#928374">— Creates gravity</tspan></text>
  <text y="240" font-size="11"><tspan x="30" fill="#83a598">Anchor    </tspan><tspan fill="#928374">— Stabilizes code</tspan></text>
  <text y="260" font-size="11"><tspan x="30" fill="#fabd2f">Producer  </tspan><tspan fill="#928374">— Generates output</tspan></text>
  <text y="280" font-size="11"><tspan x="30" fill="#8ec07c">Cleaner   </tspan><tspan fill="#928374">— Reduces entropy</tspan></text>

  <!-- Bottom prompt -->
  <text x="30" y="390" fill="#8ec07c" font-size="12">$ eis score --classify architect</text>
  <rect x="310" y="378" width="7" height="14" fill="#ebdbb2" opacity="0.7"/>

  <!-- Right side: Large chapter number -->

  <!-- Right side: Two branching evolution paths -->
  <g opacity="0.9">
    <!-- Starting point -->
    <circle cx="740" cy="80" r="10" fill="#fabd2f" opacity="0.9"/>
    <text x="740" y="65" text-anchor="middle" fill="#fabd2f" font-size="10">Origin</text>

    <!-- Trunk -->
    <line x1="740" y1="90" x2="740" y2="150" stroke="#665c54" stroke-width="2.5"/>

    <!-- Branch point -->
    <circle cx="740" cy="150" r="5" fill="#ebdbb2" opacity="0.7"/>

    <!-- FE Divergent path (left branch) -->
    <path d="M 740,150 Q 680,200 640,270" fill="none" stroke="#83a598" stroke-width="2.5"/>
    <circle cx="640" cy="270" r="25" fill="none" stroke="#83a598" stroke-width="2" opacity="0.7"/>
    <text x="640" y="275" text-anchor="middle" fill="#83a598" font-size="13" font-weight="700">FE</text>
    <text x="640" y="310" text-anchor="middle" fill="#83a598" font-size="10">Divergent</text>

    <!-- Sub-branches from FE (spreading out) -->
    <line x1="620" y1="260" x2="585" y2="230" stroke="#83a598" stroke-width="1" opacity="0.5"/>
    <circle cx="580" cy="225" r="3" fill="#83a598" opacity="0.5"/>
    <line x1="630" y1="248" x2="610" y2="215" stroke="#83a598" stroke-width="1" opacity="0.4"/>
    <circle cx="606" cy="210" r="2" fill="#83a598" opacity="0.4"/>
    <line x1="655" y1="250" x2="660" y2="215" stroke="#83a598" stroke-width="1" opacity="0.4"/>
    <circle cx="662" cy="210" r="2" fill="#83a598" opacity="0.4"/>

    <!-- BE Convergent path (right branch) -->
    <path d="M 740,150 Q 800,200 840,270" fill="none" stroke="#d3869b" stroke-width="2.5"/>
    <circle cx="840" cy="270" r="25" fill="none" stroke="#d3869b" stroke-width="2" opacity="0.7"/>
    <text x="840" y="275" text-anchor="middle" fill="#d3869b" font-size="13" font-weight="700">BE</text>
    <text x="840" y="310" text-anchor="middle" fill="#d3869b" font-size="10">Convergent</text>

    <!-- Sub-branches converging into BE -->
    <line x1="870" y1="220" x2="850" y2="250" stroke="#d3869b" stroke-width="1" opacity="0.5"/>
    <circle cx="875" cy="215" r="3" fill="#d3869b" opacity="0.5"/>
    <line x1="890" y1="240" x2="858" y2="260" stroke="#d3869b" stroke-width="1" opacity="0.4"/>
    <circle cx="895" cy="236" r="2" fill="#d3869b" opacity="0.4"/>
    <line x1="810" y1="220" x2="830" y2="250" stroke="#d3869b" stroke-width="1" opacity="0.4"/>
    <circle cx="805" cy="215" r="2" fill="#d3869b" opacity="0.4"/>
  </g>
</svg>