<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="1000" height="420" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="1000" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="1000" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="500" y="20" text-anchor="middle" fill="#928374" font-size="12">Engineering Impact Score — Chapter 10</text>

  <!-- Left side: Text content -->
  <text x="30" y="75" fill="#928374" font-size="12">Chapter 10</text>
  <text x="30" y="115" fill="#fabd2f" font-size="24" font-weight="700">Dark Matter</text>
  <text x="30" y="148" fill="#928374" font-size="14">The Invisible Gravity</text>

  <!-- Left side: What EIS cannot see -->
  <text x="30" y="195" fill="#8ec07c" font-size="11" font-weight="700">What EIS Cannot See</text>
  <text y="220" font-size="11"><tspan x="30" fill="#83a598">Code Review      </tspan><tspan fill="#928374">— invisible, stabilizes orbits</tspan></text>
  <text y="240" font-size="11"><tspan x="30" fill="#83a598">Design Discussion </tspan><tspan fill="#928374">— no commit, shapes structure</tspan></text>
  <text y="260" font-size="11"><tspan x="30" fill="#83a598">Small Refactors   </tspan><tspan fill="#928374">— tiny commits, huge stability</tspan></text>
  <text y="280" font-size="11"><tspan x="30" fill="#83a598">Dependency Cleanup</tspan><tspan fill="#928374">— prevents collapse</tspan></text>

  <!-- Bottom -->
  <text x="30" y="370" fill="#928374" font-size="11">Anchors are the dark matter of code universes.</text>

  <!-- Right side: Large chapter number -->
  <text x="750" y="320" text-anchor="middle" fill="#3c3836" font-size="200" font-weight="700">10</text>

  <!-- Right side: Visible vs invisible nodes -->
  <g opacity="0.9">
    <!-- Dark matter zone (dashed circle) -->
    <circle cx="760" cy="200" r="80" fill="none" stroke="#504945" stroke-width="2.5" stroke-dasharray="8 5" opacity="0.5"/>
    <text x="760" y="205" text-anchor="middle" fill="#504945" font-size="16" opacity="0.6">?</text>

    <!-- Visible nodes (solid) -->
    <circle cx="660" cy="150" r="10" fill="#8ec07c" opacity="0.9"/>
    <text x="660" y="132" text-anchor="middle" fill="#8ec07c" font-size="9">Reviews</text>

    <circle cx="860" cy="150" r="10" fill="#83a598" opacity="0.9"/>
    <text x="860" y="132" text-anchor="middle" fill="#83a598" font-size="9">Mentoring</text>

    <circle cx="760" cy="310" r="10" fill="#b8bb26" opacity="0.9"/>
    <text x="760" y="335" text-anchor="middle" fill="#b8bb26" font-size="9">Architecture</text>

    <!-- Invisible connections (dashed lines to dark matter center) -->
    <path d="M 668,155 Q 710,170 752,195" fill="none" stroke="#665c54" stroke-width="1.5" stroke-dasharray="4"/>
    <path d="M 852,155 Q 810,170 768,195" fill="none" stroke="#665c54" stroke-width="1.5" stroke-dasharray="4"/>
    <path d="M 760,300 Q 760,260 760,212" fill="none" stroke="#665c54" stroke-width="1.5" stroke-dasharray="4"/>

    <!-- Ghost nodes (nearly invisible contributions) -->
    <circle cx="700" cy="240" r="5" fill="#504945" opacity="0.4"/>
    <circle cx="820" cy="240" r="5" fill="#504945" opacity="0.4"/>
    <circle cx="720" cy="110" r="4" fill="#504945" opacity="0.3"/>
    <circle cx="800" cy="110" r="4" fill="#504945" opacity="0.3"/>

    <!-- Subtle gravitational pull arrows -->
    <circle cx="700" cy="240" r="12" fill="none" stroke="#504945" stroke-width="0.5" stroke-dasharray="2" opacity="0.3"/>
    <circle cx="820" cy="240" r="12" fill="none" stroke="#504945" stroke-width="0.5" stroke-dasharray="2" opacity="0.3"/>
  </g>
</svg>