<svg xmlns="http://www.w3.org/2000/svg" width="720" height="84" viewBox="0 0 720 84">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Card background -->
  <rect width="720" height="84" rx="8" fill="#1d2021"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="84" rx="2" fill="#b8bb26"/>

  <!-- Category label -->
  <text x="692" y="18" text-anchor="end" fill="#504945" font-size="10">Python</text>

  <text y="28" font-size="12"><tspan x="24" fill="#83a598">is_fix</tspan><tspan x="67.19999999999999" fill="#928374"> = </tspan><tspan x="88.79999999999998" fill="#fabd2f">re.match</tspan><tspan x="146.39999999999998" fill="#928374">(</tspan><tspan x="153.59999999999997" fill="#b8bb26">r&quot;^(fix|revert|hotfix)&quot;</tspan><tspan x="319.19999999999993" fill="#ebdbb2">, subject.lower())</tspan></text>
  <text y="46" font-size="12"><tspan x="24" fill="#ebdbb2">        </tspan><tspan x="81.6" fill="#fb4934">or</tspan><tspan x="96.0" fill="#ebdbb2"> </tspan><tspan x="103.2" fill="#b8bb26">&quot;修正&quot;</tspan><tspan x="132.0" fill="#ebdbb2"> </tspan><tspan x="139.2" fill="#fb4934">in</tspan><tspan x="153.6" fill="#ebdbb2"> subject</tspan></text>
</svg>