<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="800" height="300" rx="8" fill="#282828"/>
  <rect width="800" height="28" rx="8" fill="#1d2021"/>
  <rect y="20" width="800" height="8" fill="#1d2021"/>
  <circle cx="18" cy="14" r="5" fill="#cc241d"/>
  <circle cx="36" cy="14" r="5" fill="#d79921"/>
  <circle cx="54" cy="14" r="5" fill="#98971a"/>

  <!-- Central dashed orbit -->
  <circle cx="400" cy="155" r="100" fill="none" stroke="#504945" stroke-width="1" stroke-dasharray="6 3" opacity="0.4"/>
  <circle cx="400" cy="155" r="55" fill="none" stroke="#504945" stroke-width="1" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- Core/nucleus -->
  <circle cx="400" cy="155" r="8" fill="#ebdbb2" opacity="0.3"/>
  <circle cx="400" cy="155" r="3" fill="#ebdbb2" opacity="0.7"/>

  <!-- Four forces positioned around -->

  <!-- Gravity (top) -->
  <circle cx="400" cy="55" r="18" fill="#d3869b" opacity="0.2"/>
  <circle cx="400" cy="55" r="12" fill="#d3869b" opacity="0.5"/>
  <text x="400" y="59" text-anchor="middle" fill="#282828" font-size="9" font-weight="700">G</text>
  <text x="400" y="35" text-anchor="middle" fill="#d3869b" font-size="12" font-weight="700">Gravity</text>
  <line x1="400" y1="67" x2="400" y2="100" stroke="#d3869b" stroke-width="1.5" opacity="0.5"/>

  <!-- Strong Force (right) -->
  <circle cx="530" cy="155" r="18" fill="#b8bb26" opacity="0.2"/>
  <circle cx="530" cy="155" r="12" fill="#b8bb26" opacity="0.5"/>
  <text x="530" y="159" text-anchor="middle" fill="#282828" font-size="9" font-weight="700">S</text>
  <text x="570" y="145" fill="#b8bb26" font-size="12" font-weight="700">Strong</text>
  <text x="570" y="160" fill="#665c54" font-size="9">Code coupling</text>
  <line x1="518" y1="155" x2="455" y2="155" stroke="#b8bb26" stroke-width="1.5" opacity="0.5"/>

  <!-- Weak Force (bottom) -->
  <circle cx="400" cy="255" r="18" fill="#83a598" opacity="0.2"/>
  <circle cx="400" cy="255" r="12" fill="#83a598" opacity="0.5"/>
  <text x="400" y="259" text-anchor="middle" fill="#282828" font-size="9" font-weight="700">W</text>
  <text x="400" y="285" text-anchor="middle" fill="#83a598" font-size="12" font-weight="700">Weak</text>
  <line x1="400" y1="243" x2="400" y2="210" stroke="#83a598" stroke-width="1.5" opacity="0.5"/>

  <!-- EM Force (left) -->
  <circle cx="270" cy="155" r="18" fill="#fabd2f" opacity="0.2"/>
  <circle cx="270" cy="155" r="12" fill="#fabd2f" opacity="0.5"/>
  <text x="270" y="159" text-anchor="middle" fill="#282828" font-size="9" font-weight="700">E</text>
  <text x="210" y="145" fill="#fabd2f" font-size="12" font-weight="700" text-anchor="end">EM</text>
  <text x="210" y="160" fill="#665c54" font-size="9" text-anchor="end">Communication</text>
  <line x1="282" y1="155" x2="345" y2="155" stroke="#fabd2f" stroke-width="1.5" opacity="0.5"/>

  <!-- Cross connections (subtle) -->
  <line x1="412" y1="67" x2="518" y2="143" stroke="#665c54" stroke-width="0.8" opacity="0.2"/>
  <line x1="518" y1="167" x2="412" y2="243" stroke="#665c54" stroke-width="0.8" opacity="0.2"/>
  <line x1="388" y1="243" x2="282" y2="167" stroke="#665c54" stroke-width="0.8" opacity="0.2"/>
  <line x1="282" y1="143" x2="388" y2="67" stroke="#665c54" stroke-width="0.8" opacity="0.2"/>
</svg>