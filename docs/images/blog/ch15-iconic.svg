<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fabd2f" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fabd2f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="#282828"/>

  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" fill="#fabd2f" font-size="22" font-weight="700">The Age of AI</text>
  <text x="400" y="85" text-anchor="middle" fill="#928374" font-size="13">AI creates stars. But it doesn't create gravity.</text>

  <!-- Starburst glow -->
  <circle cx="400" cy="250" r="150" fill="url(#glow)"/>

  <!-- Central mass -->
  <circle cx="400" cy="250" r="7" fill="#ebdbb2" opacity="0.9"/>

  <!-- Inner: bright AI stars -->
  <circle cx="365" cy="210" r="5" fill="#b8bb26" opacity="0.9"/>
  <circle cx="435" cy="200" r="6" fill="#b8bb26" opacity="0.85"/>
  <circle cx="455" cy="245" r="5" fill="#b8bb26" opacity="0.9"/>
  <circle cx="445" cy="285" r="4" fill="#b8bb26" opacity="0.85"/>
  <circle cx="400" cy="305" r="5" fill="#b8bb26" opacity="0.9"/>
  <circle cx="355" cy="285" r="4" fill="#b8bb26" opacity="0.85"/>
  <circle cx="345" cy="245" r="5" fill="#b8bb26" opacity="0.9"/>
  <circle cx="375" cy="295" r="4" fill="#b8bb26" opacity="0.75"/>
  <circle cx="425" cy="215" r="4" fill="#b8bb26" opacity="0.8"/>

  <!-- Outer: scattering -->
  <circle cx="290" cy="160" r="4" fill="#fabd2f" opacity="0.6"/>
  <circle cx="500" cy="150" r="4" fill="#fabd2f" opacity="0.55"/>
  <circle cx="550" cy="220" r="4" fill="#fabd2f" opacity="0.5"/>
  <circle cx="560" cy="300" r="4" fill="#fabd2f" opacity="0.4"/>
  <circle cx="510" cy="360" r="4" fill="#fabd2f" opacity="0.4"/>
  <circle cx="400" cy="390" r="4" fill="#fabd2f" opacity="0.5"/>
  <circle cx="290" cy="350" r="4" fill="#fabd2f" opacity="0.4"/>
  <circle cx="250" cy="270" r="4" fill="#fabd2f" opacity="0.45"/>
  <circle cx="270" cy="200" r="4" fill="#fabd2f" opacity="0.5"/>

  <!-- Outermost: entropy -->
  <circle cx="210" cy="120" r="2" fill="#fb4934" opacity="0.3"/>
  <circle cx="590" cy="130" r="2" fill="#fb4934" opacity="0.3"/>
  <circle cx="620" cy="310" r="2" fill="#fb4934" opacity="0.25"/>
  <circle cx="550" cy="390" r="2" fill="#fb4934" opacity="0.2"/>
  <circle cx="250" cy="390" r="2" fill="#fb4934" opacity="0.2"/>
  <circle cx="190" cy="310" r="2" fill="#fb4934" opacity="0.2"/>
  <circle cx="160" cy="180" r="2" fill="#fb4934" opacity="0.2"/>
  <circle cx="640" cy="200" r="2" fill="#fb4934" opacity="0.2"/>

  <!-- Motion lines -->
  <line x1="290" y1="160" x2="260" y2="140" stroke="#fabd2f" stroke-width="0.7" opacity="0.3"/>
  <line x1="500" y1="150" x2="520" y2="130" stroke="#fabd2f" stroke-width="0.7" opacity="0.3"/>
  <line x1="560" y1="300" x2="580" y2="310" stroke="#fabd2f" stroke-width="0.5" opacity="0.25"/>
  <line x1="290" y1="350" x2="270" y2="365" stroke="#fabd2f" stroke-width="0.5" opacity="0.25"/>
  <line x1="550" y1="220" x2="570" y2="215" stroke="#fabd2f" stroke-width="0.5" opacity="0.25"/>
  <line x1="250" y1="270" x2="230" y2="270" stroke="#fabd2f" stroke-width="0.5" opacity="0.25"/>

  <!-- Broken gravity circle -->
  <circle cx="400" cy="250" r="100" fill="none" stroke="#fb4934" stroke-width="1.2" stroke-dasharray="4,8" opacity="0.25"/>

  <!-- Bottom -->
  <text x="400" y="435" text-anchor="middle" fill="#665c54" font-size="11">Stars scatter without gravity — the AI Starburst</text>
</svg>