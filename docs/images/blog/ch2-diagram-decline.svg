<svg xmlns="http://www.w3.org/2000/svg" width="680" height="102" viewBox="0 0 680 102">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Card background -->
  <rect width="680" height="102" rx="8" fill="#1d2021"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="102" rx="2" fill="#83a598"/>

  <!-- Category label -->
  <text x="652" y="18" text-anchor="end" fill="#504945" font-size="10">Model</text>

  <text y="28" font-size="12"><tspan x="24" fill="#ebdbb2">  Design Layer        </tspan><tspan x="182.39999999999998" fill="#928374">→ </tspan><tspan x="196.79999999999998" fill="#928374">Former</tspan><tspan x="239.99999999999997" fill="#928374"> (design knowledge leaves)</tspan></text>
  <text y="46" font-size="12"><tspan x="24" fill="#ebdbb2">  Stabilization Layer </tspan><tspan x="182.39999999999998" fill="#928374">→ </tspan><tspan x="196.79999999999998" fill="#928374">Silent</tspan><tspan x="239.99999999999997" fill="#928374">, </tspan><tspan x="254.39999999999998" fill="#fb4934">Fragile</tspan></text>
  <text y="64" font-size="12"><tspan x="24" fill="#ebdbb2">  Implementation Layer </tspan><tspan x="189.6" fill="#928374">→ </tspan><tspan x="204.0" fill="#928374">Silent</tspan></text>
</svg>