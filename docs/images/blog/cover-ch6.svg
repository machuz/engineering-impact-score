  <text x="300" y="20" text-anchor="middle" fill="#928374" font-size="12">Engineering Impact Score — Chapter 6</text>

  <text x="20" y="70" fill="#928374" font-size="12">Chapter 6</text>
  <text x="20" y="106" fill="#fabd2f" font-size="24" font-weight="700">Teams Evolve</text>
  <text x="20" y="142" fill="#928374" font-size="14">The Laws of Organization Revealed by Timelines</text>
  <text x="20" y="196" fill="#8ec07c" font-size="12" font-weight="700">  Team Evolution Models</text>
  <text y="232" font-size="12"><tspan x="20" fill="#83a598">  Growing</tspan><tspan x="84.8" fill="#928374"> → </tspan><tspan x="106.4" fill="#83a598">Anchor</tspan><tspan x="149.60000000000002" fill="#928374"> → </tspan><tspan x="171.20000000000002" fill="#fabd2f">Producer</tspan><tspan x="228.8" fill="#928374"> → </tspan><tspan x="250.4" fill="#d3869b" font-weight="700">Architect</tspan></text>
  <text y="268" font-size="12"><tspan x="20" fill="#ebdbb2">  Permeation:  </tspan><tspan x="128.0" fill="#8ec07c">respect → produce → design</tspan></text>
  <text y="286" font-size="12"><tspan x="20" fill="#ebdbb2">  Immediate:   </tspan><tspan x="128.0" fill="#d3869b">Anchor → Architect (rare)</tspan></text>
  <text y="304" font-size="12"><tspan x="20" fill="#ebdbb2">  Founding:    </tspan><tspan x="128.0" fill="#b8bb26">Architect → decline = success</tspan></text>
  <text x="20" y="340" fill="#928374" font-size="12">  Organizations have laws. Timelines reveal them.</text>
