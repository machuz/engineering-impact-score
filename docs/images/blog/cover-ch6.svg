<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="1000" height="420" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="1000" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="1000" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="500" y="20" text-anchor="middle" fill="#928374" font-size="12">Engineering Impact Score — Chapter 6</text>

  <!-- Left side: Text content -->
  <text x="30" y="75" fill="#928374" font-size="12">Chapter 6</text>
  <text x="30" y="115" fill="#fabd2f" font-size="24" font-weight="700">Teams Evolve</text>
  <text x="30" y="148" fill="#928374" font-size="14">The Laws of Organization Revealed by Timelines</text>

  <!-- Left side: Evolution models -->
  <text x="30" y="195" fill="#8ec07c" font-size="11" font-weight="700">Team Evolution Models</text>
  <text y="220" font-size="11"><tspan x="30" fill="#83a598">Growing </tspan><tspan fill="#928374">-></tspan><tspan fill="#83a598"> Anchor </tspan><tspan fill="#928374">-></tspan><tspan fill="#fabd2f"> Producer </tspan><tspan fill="#928374">-></tspan><tspan fill="#d3869b" font-weight="700"> Architect</tspan></text>
  <text y="248" font-size="11"><tspan x="30" fill="#ebdbb2">Permeation: </tspan><tspan fill="#8ec07c">respect -> produce -> design</tspan></text>
  <text y="268" font-size="11"><tspan x="30" fill="#ebdbb2">Immediate:  </tspan><tspan fill="#d3869b">Anchor -> Architect (rare)</tspan></text>
  <text y="288" font-size="11"><tspan x="30" fill="#ebdbb2">Founding:   </tspan><tspan fill="#b8bb26">Architect decline = success</tspan></text>

  <!-- Bottom -->
  <text x="30" y="370" fill="#928374" font-size="11">Organizations have laws. Timelines reveal them.</text>

  <!-- Right side: Large chapter number -->
  <text x="750" y="320" text-anchor="middle" fill="#3c3836" font-size="200" font-weight="700">06</text>

  <!-- Right side: Four evolution stages -->
  <g opacity="0.9">
    <!-- Stage 1: Formation -->
    <rect x="565" y="85" width="85" height="50" rx="5" fill="none" stroke="#fb4934" stroke-width="1.5" opacity="0.8"/>
    <text x="607" y="108" text-anchor="middle" fill="#fb4934" font-size="10" font-weight="700">Formation</text>
    <text x="607" y="122" text-anchor="middle" fill="#665c54" font-size="8">1-2</text>
    <!-- Member dots -->
    <circle cx="600" cy="138" r="3" fill="#fb4934" opacity="0.6"/>
    <circle cx="614" cy="138" r="3" fill="#fb4934" opacity="0.6"/>

    <!-- Arrow -->
    <line x1="650" y1="110" x2="670" y2="110" stroke="#665c54" stroke-width="1" stroke-dasharray="3"/>

    <!-- Stage 2: Growth -->
    <rect x="670" y="85" width="85" height="50" rx="5" fill="none" stroke="#fabd2f" stroke-width="1.5" opacity="0.8"/>
    <text x="712" y="108" text-anchor="middle" fill="#fabd2f" font-size="10" font-weight="700">Growth</text>
    <text x="712" y="122" text-anchor="middle" fill="#665c54" font-size="8">3-5</text>
    <!-- Member dots -->
    <circle cx="698" cy="138" r="3" fill="#fabd2f" opacity="0.6"/>
    <circle cx="712" cy="138" r="3" fill="#fabd2f" opacity="0.6"/>
    <circle cx="726" cy="138" r="3" fill="#fabd2f" opacity="0.6"/>
    <circle cx="705" cy="148" r="3" fill="#fabd2f" opacity="0.4"/>

    <!-- Arrow -->
    <line x1="755" y1="110" x2="775" y2="110" stroke="#665c54" stroke-width="1" stroke-dasharray="3"/>

    <!-- Stage 3: Maturity -->
    <rect x="775" y="85" width="85" height="50" rx="5" fill="none" stroke="#b8bb26" stroke-width="1.5" opacity="0.8"/>
    <text x="817" y="108" text-anchor="middle" fill="#b8bb26" font-size="10" font-weight="700">Maturity</text>
    <text x="817" y="122" text-anchor="middle" fill="#665c54" font-size="8">6-8</text>
    <!-- Member dots -->
    <circle cx="798" cy="138" r="3" fill="#b8bb26" opacity="0.6"/>
    <circle cx="810" cy="138" r="3" fill="#b8bb26" opacity="0.6"/>
    <circle cx="822" cy="138" r="3" fill="#b8bb26" opacity="0.6"/>
    <circle cx="834" cy="138" r="3" fill="#b8bb26" opacity="0.6"/>
    <circle cx="804" cy="148" r="3" fill="#b8bb26" opacity="0.4"/>
    <circle cx="816" cy="148" r="3" fill="#b8bb26" opacity="0.4"/>
    <circle cx="828" cy="148" r="3" fill="#b8bb26" opacity="0.4"/>

    <!-- Arrow -->
    <line x1="860" y1="110" x2="880" y2="110" stroke="#665c54" stroke-width="1" stroke-dasharray="3"/>

    <!-- Stage 4: Scaling -->
    <rect x="880" y="85" width="85" height="50" rx="5" fill="none" stroke="#8ec07c" stroke-width="1.5" opacity="0.8"/>
    <text x="922" y="108" text-anchor="middle" fill="#8ec07c" font-size="10" font-weight="700">Scaling</text>
    <text x="922" y="122" text-anchor="middle" fill="#665c54" font-size="8">9+</text>
    <!-- Member dots (many) -->
    <circle cx="900" cy="138" r="3" fill="#8ec07c" opacity="0.6"/>
    <circle cx="912" cy="138" r="3" fill="#8ec07c" opacity="0.6"/>
    <circle cx="924" cy="138" r="3" fill="#8ec07c" opacity="0.6"/>
    <circle cx="936" cy="138" r="3" fill="#8ec07c" opacity="0.6"/>
    <circle cx="906" cy="148" r="3" fill="#8ec07c" opacity="0.4"/>
    <circle cx="918" cy="148" r="3" fill="#8ec07c" opacity="0.4"/>
    <circle cx="930" cy="148" r="3" fill="#8ec07c" opacity="0.4"/>
    <circle cx="942" cy="148" r="3" fill="#8ec07c" opacity="0.4"/>
    <circle cx="912" cy="158" r="3" fill="#8ec07c" opacity="0.3"/>
    <circle cx="924" cy="158" r="3" fill="#8ec07c" opacity="0.3"/>

    <!-- Health score bar -->
    <text x="760" y="380" text-anchor="middle" fill="#8ec07c" font-size="10" font-weight="700">Team Health Score</text>
    <rect x="640" y="388" width="240" height="6" rx="3" fill="#3c3836"/>
    <rect x="640" y="388" width="180" height="6" rx="3" fill="#b8bb26"/>
    <text x="830" y="396" fill="#b8bb26" font-size="10" font-weight="700">75</text>
  </g>
</svg>