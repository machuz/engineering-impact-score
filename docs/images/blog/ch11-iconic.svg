<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="800" height="300" rx="8" fill="#282828"/>
  <rect width="800" height="28" rx="8" fill="#1d2021"/>
  <rect y="20" width="800" height="8" fill="#1d2021"/>
  <circle cx="18" cy="14" r="5" fill="#cc241d"/>
  <circle cx="36" cy="14" r="5" fill="#d79921"/>
  <circle cx="54" cy="14" r="5" fill="#98971a"/>

  <!-- Ordered side (left) -->
  <text x="200" y="65" text-anchor="middle" fill="#8ec07c" font-size="13" font-weight="700">Low Entropy</text>

  <!-- 4x4 grid of neatly ordered blocks -->
  <rect x="120" y="85" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.75"/>
  <rect x="155" y="85" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.75"/>
  <rect x="190" y="85" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.75"/>
  <rect x="225" y="85" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.75"/>

  <rect x="120" y="120" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.75"/>
  <rect x="155" y="120" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.75"/>
  <rect x="190" y="120" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.75"/>
  <rect x="225" y="120" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.75"/>

  <rect x="120" y="155" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.75"/>
  <rect x="155" y="155" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.75"/>
  <rect x="190" y="155" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.75"/>
  <rect x="225" y="155" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.75"/>

  <rect x="120" y="190" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.75"/>
  <rect x="155" y="190" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.75"/>
  <rect x="190" y="190" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.75"/>
  <rect x="225" y="190" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.75"/>

  <!-- Arrow -->
  <line x1="310" y1="155" x2="490" y2="155" stroke="#665c54" stroke-width="2.5"/>
  <polygon points="490,149 504,155 490,161" fill="#665c54"/>
  <text x="400" y="140" text-anchor="middle" fill="#fb4934" font-size="12" font-weight="700">time</text>
  <text x="400" y="180" text-anchor="middle" fill="#665c54" font-size="10">no maintenance</text>

  <!-- Disordered side (right) -->
  <text x="620" y="65" text-anchor="middle" fill="#fb4934" font-size="13" font-weight="700">High Entropy</text>

  <!-- Scattered, rotated, multi-colored blocks -->
  <rect x="530" y="80" width="28" height="28" rx="3" fill="#fb4934" opacity="0.55" transform="rotate(18,544,94)"/>
  <rect x="580" y="90" width="28" height="28" rx="3" fill="#fabd2f" opacity="0.55" transform="rotate(-12,594,104)"/>
  <rect x="640" y="78" width="28" height="28" rx="3" fill="#d3869b" opacity="0.55" transform="rotate(30,654,92)"/>
  <rect x="690" y="95" width="28" height="28" rx="3" fill="#83a598" opacity="0.55" transform="rotate(-22,704,109)"/>

  <rect x="520" y="130" width="28" height="28" rx="3" fill="#83a598" opacity="0.55" transform="rotate(-25,534,144)"/>
  <rect x="575" y="140" width="28" height="28" rx="3" fill="#fb4934" opacity="0.55" transform="rotate(14,589,154)"/>
  <rect x="640" y="125" width="28" height="28" rx="3" fill="#fabd2f" opacity="0.55" transform="rotate(-35,654,139)"/>
  <rect x="700" y="140" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.55" transform="rotate(8,714,154)"/>

  <rect x="540" y="175" width="28" height="28" rx="3" fill="#d3869b" opacity="0.55" transform="rotate(40,554,189)"/>
  <rect x="600" y="185" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.55" transform="rotate(-7,614,199)"/>
  <rect x="660" y="170" width="28" height="28" rx="3" fill="#fb4934" opacity="0.55" transform="rotate(22,674,184)"/>
  <rect x="710" y="185" width="28" height="28" rx="3" fill="#fabd2f" opacity="0.55" transform="rotate(-18,724,199)"/>

  <rect x="525" y="215" width="28" height="28" rx="3" fill="#fabd2f" opacity="0.55" transform="rotate(-15,539,229)"/>
  <rect x="590" y="225" width="28" height="28" rx="3" fill="#83a598" opacity="0.55" transform="rotate(28,604,239)"/>
  <rect x="650" y="210" width="28" height="28" rx="3" fill="#b8bb26" opacity="0.55" transform="rotate(-33,664,224)"/>
  <rect x="700" y="228" width="28" height="28" rx="3" fill="#d3869b" opacity="0.55" transform="rotate(12,714,242)"/>

  <!-- Bottom -->
  <text x="400" y="275" text-anchor="middle" fill="#665c54" font-size="11">Without maintenance, code decays into disorder</text>
</svg>