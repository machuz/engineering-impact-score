<svg xmlns="http://www.w3.org/2000/svg" width="520" height="114" viewBox="0 0 520 114">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Card background -->
  <rect width="520" height="114" rx="8" fill="#1d2021"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="114" rx="2" fill="#8ec07c"/>

  <!-- Category label -->
  <text x="492" y="18" text-anchor="end" fill="#504945" font-size="10">Formula</text>

  <text y="28" font-size="14"><tspan x="24" fill="#83a598">base</tspan><tspan x="57.6" fill="#928374"> = </tspan><tspan x="82.80000000000001" fill="#fabd2f">avg</tspan><tspan x="108.00000000000001" fill="#ebdbb2">(members.Production)</tspan></text>
  <text y="50" font-size="14"><tspan x="24" fill="#928374">bonus:</tspan></text>
  <text y="72" font-size="14"><tspan x="24" fill="#ebdbb2">  ≤3 members</tspan><tspan x="124.80000000000001" fill="#928374"> &amp;&amp; </tspan><tspan x="158.4" fill="#ebdbb2">base ≥ 50</tspan><tspan x="234.0" fill="#928374"> → </tspan><tspan x="259.2" fill="#b8bb26">×1.2</tspan></text>
  <text y="94" font-size="14"><tspan x="24" fill="#ebdbb2">  ≤5 members</tspan><tspan x="124.80000000000001" fill="#928374"> &amp;&amp; </tspan><tspan x="158.4" fill="#ebdbb2">base ≥ 50</tspan><tspan x="234.0" fill="#928374"> → </tspan><tspan x="259.2" fill="#b8bb26">×1.1</tspan></text>
</svg>