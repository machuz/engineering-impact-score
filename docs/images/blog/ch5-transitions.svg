<svg xmlns="http://www.w3.org/2000/svg" width="800" height="230" viewBox="0 0 800 230">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="800" height="230" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="800" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="800" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="400" y="20" text-anchor="middle" fill="#928374" font-size="12">Terminal — Notable Transitions</text>

  <text x="20" y="50" fill="#8ec07c" font-size="12" font-weight="700">Notable transitions:</text>
  <text y="68" font-size="12"><tspan x="20" fill="#ebdbb2">  * Engineer I: Role </tspan><tspan x="171.20000000000002" fill="#83a598">Anchor</tspan><tspan x="214.40000000000003" fill="#928374">→</tspan><tspan x="221.60000000000002" fill="#d3869b">Architect</tspan><tspan x="286.40000000000003" fill="#928374"> (2024-Q4)</tspan><tspan x="358.40000000000003" fill="#ebdbb2"></tspan></text>
  <text y="86" font-size="12"><tspan x="20" fill="#ebdbb2">  * Engineer I: Style </tspan><tspan x="178.4" fill="#83a598">Balanced</tspan><tspan x="236.0" fill="#928374">→</tspan><tspan x="243.2" fill="#928374">Builder</tspan><tspan x="293.59999999999997" fill="#928374"> (2025-Q1)</tspan><tspan x="365.59999999999997" fill="#ebdbb2"></tspan></text>
  <text y="104" font-size="12"><tspan x="20" fill="#ebdbb2">  * Engineer I: Role </tspan><tspan x="171.20000000000002" fill="#83a598">Architect</tspan><tspan x="236.0" fill="#928374">→</tspan><tspan x="243.2" fill="#83a598">Anchor</tspan><tspan x="286.4" fill="#928374"> (2025-Q3)</tspan><tspan x="358.4" fill="#fb4934">  ← friction</tspan></text>
  <text y="122" font-size="12"><tspan x="20" fill="#ebdbb2">  * Engineer I: Style </tspan><tspan x="178.4" fill="#83a598">Builder</tspan><tspan x="228.8" fill="#928374">→</tspan><tspan x="236.0" fill="#928374">Balanced</tspan><tspan x="293.6" fill="#928374"> (2025-Q3)</tspan><tspan x="365.6" fill="#fb4934">  ← hesitation</tspan></text>
  <text y="140" font-size="12"><tspan x="20" fill="#ebdbb2">  * Engineer I: Role </tspan><tspan x="171.20000000000002" fill="#83a598">Anchor</tspan><tspan x="214.40000000000003" fill="#928374">→</tspan><tspan x="221.60000000000002" fill="#d3869b">Architect</tspan><tspan x="286.40000000000003" fill="#928374"> (2025-Q4)</tspan><tspan x="358.40000000000003" fill="#fb4934">  ← return</tspan></text>
  <text y="176" font-size="12"><tspan x="20" fill="#ebdbb2">  * Engineer J: Style </tspan><tspan x="178.4" fill="#83a598">Balanced</tspan><tspan x="236.0" fill="#928374">→</tspan><tspan x="243.2" fill="#83a598">Builder</tspan><tspan x="293.59999999999997" fill="#928374"> (2024-Q4)</tspan><tspan x="365.59999999999997" fill="#8ec07c">  ← building phase</tspan></text>
  <text y="194" font-size="12"><tspan x="20" fill="#ebdbb2">  * Engineer J: Role </tspan><tspan x="171.20000000000002" fill="#83a598">Architect</tspan><tspan x="236.0" fill="#928374">→</tspan><tspan x="243.2" fill="#fabd2f">Producer</tspan><tspan x="300.8" fill="#928374"> (2025-Q3)</tspan><tspan x="372.8" fill="#8ec07c">  ← structure complete</tspan></text>
  <text y="212" font-size="12"><tspan x="20" fill="#ebdbb2">  * Engineer J: State </tspan><tspan x="178.4" fill="#83a598">Former</tspan><tspan x="221.60000000000002" fill="#928374">→</tspan><tspan x="228.8" fill="#b8bb26">Active</tspan><tspan x="272.0" fill="#928374"> (2026-Q1)</tspan><tspan x="344.0" fill="#b8bb26">  ← return</tspan></text>
</svg>