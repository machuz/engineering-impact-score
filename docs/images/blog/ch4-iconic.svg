<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="800" height="300" rx="8" fill="#282828"/>
  <rect width="800" height="28" rx="8" fill="#1d2021"/>
  <rect y="20" width="800" height="8" fill="#1d2021"/>
  <circle cx="18" cy="14" r="5" fill="#cc241d"/>
  <circle cx="36" cy="14" r="5" fill="#d79921"/>
  <circle cx="54" cy="14" r="5" fill="#98971a"/>

  <!-- Multiple starting points (top) -->
  <circle cx="100" cy="70" r="7" fill="#83a598" opacity="0.7"/>
  <circle cx="220" cy="55" r="7" fill="#b8bb26" opacity="0.7"/>
  <circle cx="340" cy="65" r="7" fill="#fabd2f" opacity="0.8"/>
  <circle cx="460" cy="55" r="7" fill="#8ec07c" opacity="0.8"/>
  <circle cx="580" cy="70" r="7" fill="#b8bb26" opacity="0.7"/>
  <circle cx="700" cy="60" r="7" fill="#83a598" opacity="0.7"/>

  <!-- Converging lines -->
  <path d="M 100,77 Q 200,150 400,220" fill="none" stroke="#83a598" stroke-width="1.5" opacity="0.4"/>
  <path d="M 220,62 Q 300,140 400,220" fill="none" stroke="#b8bb26" stroke-width="1.5" opacity="0.5"/>
  <path d="M 340,72 Q 370,140 400,220" fill="none" stroke="#fabd2f" stroke-width="1.5" opacity="0.6"/>
  <path d="M 460,62 Q 430,140 400,220" fill="none" stroke="#8ec07c" stroke-width="1.5" opacity="0.6"/>
  <path d="M 580,77 Q 500,150 400,220" fill="none" stroke="#b8bb26" stroke-width="1.5" opacity="0.5"/>
  <path d="M 700,67 Q 600,150 400,220" fill="none" stroke="#83a598" stroke-width="1.5" opacity="0.4"/>

  <!-- Middle passage glow -->
  <circle cx="400" cy="150" r="40" fill="#d3869b" opacity="0.04"/>
  <circle cx="400" cy="180" r="30" fill="#d3869b" opacity="0.06"/>

  <!-- Convergence point -->
  <circle cx="400" cy="220" r="16" fill="#d3869b" opacity="0.3"/>
  <circle cx="400" cy="220" r="10" fill="#d3869b" opacity="0.6"/>
  <circle cx="400" cy="220" r="5" fill="#d3869b"/>

  <!-- Labels -->
  <text x="100" y="55" text-anchor="middle" fill="#665c54" font-size="9">A</text>
  <text x="220" y="42" text-anchor="middle" fill="#665c54" font-size="9">B</text>
  <text x="340" y="52" text-anchor="middle" fill="#665c54" font-size="9">C</text>
  <text x="460" y="42" text-anchor="middle" fill="#665c54" font-size="9">D</text>
  <text x="580" y="55" text-anchor="middle" fill="#665c54" font-size="9">E</text>
  <text x="700" y="47" text-anchor="middle" fill="#665c54" font-size="9">F</text>

  <text x="400" y="260" text-anchor="middle" fill="#d3869b" font-size="13" font-weight="700">Convergence Point</text>
  <text x="400" y="278" text-anchor="middle" fill="#665c54" font-size="11">Different paths, same architectural destination</text>
</svg>