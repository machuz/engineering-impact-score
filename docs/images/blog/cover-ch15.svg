<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
    <radialGradient id="starburst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fabd2f" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fabd2f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Terminal background -->
  <rect width="1000" height="420" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="1000" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="1000" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="500" y="20" text-anchor="middle" fill="#928374" font-size="12">Engineering Impact Score — Chapter 15 — Final</text>

  <!-- Left side: Text content -->
  <text x="30" y="75" fill="#928374" font-size="12">Chapter 15 — Final</text>
  <text x="30" y="115" fill="#fabd2f" font-size="24" font-weight="700">The Age of AI</text>
  <text x="30" y="148" fill="#928374" font-size="14">The Starburst of Code Universes</text>

  <!-- Left side: AI impact -->
  <text x="30" y="195" fill="#8ec07c" font-size="11" font-weight="700">AI generates:</text>
  <text y="220" font-size="11"><tspan x="50" fill="#b8bb26">Stars     </tspan><tspan fill="#928374">← Production (exploding)</tspan></text>
  <text y="240" font-size="11"><tspan x="50" fill="#fb4934">not Gravity</tspan><tspan fill="#928374"> ← Design (missing)</tspan></text>

  <text x="30" y="280" fill="#d3869b" font-size="11" font-weight="700">Survivors of AI era:</text>
  <text y="300" font-size="11"><tspan x="50" fill="#fabd2f">Code Architect </tspan><tspan fill="#928374">— generates gravity</tspan></text>
  <text y="320" font-size="11"><tspan x="50" fill="#83a598">Code Custodian </tspan><tspan fill="#928374">— fights entropy</tspan></text>
  <text y="340" font-size="11"><tspan x="50" fill="#504945">Code Writer    </tspan><tspan fill="#928374">— replaced by AI</tspan></text>

  <!-- Bottom prompt -->
  <text x="30" y="395" fill="#8ec07c" font-size="12">$ eis analyze --recursive</text>
  <rect x="258" y="383" width="7" height="14" fill="#ebdbb2" opacity="0.7"/>

  <!-- Right side: Starburst visualization -->
  <g opacity="0.9">
    <!-- Starburst glow -->
    <circle cx="760" cy="210" r="130" fill="url(#starburst)"/>

    <!-- Explosion of stars (AI-generated code) -->
    <!-- Central mass -->
    <circle cx="760" cy="210" r="5" fill="#ebdbb2" opacity="0.9"/>

    <!-- Inner ring: bright new stars -->
    <circle cx="730" cy="170" r="4" fill="#b8bb26" opacity="0.9"/>
    <circle cx="790" cy="160" r="5" fill="#b8bb26" opacity="0.8"/>
    <circle cx="810" cy="200" r="4" fill="#b8bb26" opacity="0.9"/>
    <circle cx="800" cy="240" r="3" fill="#b8bb26" opacity="0.8"/>
    <circle cx="760" cy="260" r="4" fill="#b8bb26" opacity="0.9"/>
    <circle cx="720" cy="240" r="3" fill="#b8bb26" opacity="0.8"/>
    <circle cx="710" cy="200" r="4" fill="#b8bb26" opacity="0.9"/>
    <circle cx="740" cy="250" r="3" fill="#b8bb26" opacity="0.7"/>

    <!-- Outer ring: scattering stars (no gravity) -->
    <circle cx="670" cy="130" r="3" fill="#fabd2f" opacity="0.6"/>
    <circle cx="840" cy="120" r="3" fill="#fabd2f" opacity="0.5"/>
    <circle cx="890" cy="170" r="3" fill="#fabd2f" opacity="0.5"/>
    <circle cx="900" cy="250" r="3" fill="#fabd2f" opacity="0.4"/>
    <circle cx="860" cy="310" r="3" fill="#fabd2f" opacity="0.4"/>
    <circle cx="760" cy="340" r="3" fill="#fabd2f" opacity="0.5"/>
    <circle cx="660" cy="300" r="3" fill="#fabd2f" opacity="0.4"/>
    <circle cx="630" cy="220" r="3" fill="#fabd2f" opacity="0.4"/>
    <circle cx="650" cy="160" r="3" fill="#fabd2f" opacity="0.5"/>

    <!-- Outermost: fading stars (entropy) -->
    <circle cx="610" cy="100" r="2" fill="#fb4934" opacity="0.3"/>
    <circle cx="920" cy="140" r="2" fill="#fb4934" opacity="0.3"/>
    <circle cx="940" cy="280" r="2" fill="#fb4934" opacity="0.2"/>
    <circle cx="870" cy="350" r="2" fill="#fb4934" opacity="0.2"/>
    <circle cx="650" cy="350" r="2" fill="#fb4934" opacity="0.2"/>
    <circle cx="600" cy="270" r="2" fill="#fb4934" opacity="0.2"/>
    <circle cx="920" cy="100" r="2" fill="#fb4934" opacity="0.2"/>

    <!-- Motion lines (stars scattering outward) -->
    <line x1="670" y1="130" x2="640" y2="110" stroke="#fabd2f" stroke-width="0.5" opacity="0.3"/>
    <line x1="840" y1="120" x2="860" y2="100" stroke="#fabd2f" stroke-width="0.5" opacity="0.3"/>
    <line x1="900" y1="250" x2="920" y2="260" stroke="#fabd2f" stroke-width="0.5" opacity="0.2"/>
    <line x1="660" y1="300" x2="640" y2="320" stroke="#fabd2f" stroke-width="0.5" opacity="0.2"/>
    <line x1="890" y1="170" x2="910" y2="160" stroke="#fabd2f" stroke-width="0.5" opacity="0.2"/>
    <line x1="630" y1="220" x2="610" y2="220" stroke="#fabd2f" stroke-width="0.5" opacity="0.2"/>

    <!-- "No gravity" indicator: dashed circle (broken structure) -->
    <circle cx="760" cy="210" r="80" fill="none" stroke="#fb4934" stroke-width="1" stroke-dasharray="3,6" opacity="0.25"/>

    <!-- Labels -->
    <text x="760" y="85" text-anchor="middle" fill="#665c54" font-size="8">Stars scatter without gravity</text>
    <text x="760" y="370" text-anchor="middle" fill="#665c54" font-size="8">AI Starburst</text>
  </g>
</svg>