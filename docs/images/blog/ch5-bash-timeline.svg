<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Card background -->
  <rect width="660" height="300" rx="8" fill="#1d2021"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="300" rx="2" fill="#fe8019"/>

  <!-- Category label -->
  <text x="632" y="18" text-anchor="end" fill="#504945" font-size="10">Bash</text>

  <text x="24" y="28" fill="#928374" font-size="12"># Default: last 4 quarters in 3-month spans</text>
  <text y="46" font-size="12"><tspan x="24" fill="#b8bb26">eis</tspan><tspan x="45.599999999999994" fill="#ebdbb2"> timeline --recursive ~/workspace</tspan></text>
  <text x="24" y="82" fill="#928374" font-size="12"># From 2024, quarterly</text>
  <text y="100" font-size="12"><tspan x="24" fill="#b8bb26">eis</tspan><tspan x="45.599999999999994" fill="#ebdbb2"> timeline --span 3m --since 2024-01-01 --recursive ~/workspace</tspan></text>
  <text x="24" y="136" fill="#928374" font-size="12"># Half-year spans, full history</text>
  <text y="154" font-size="12"><tspan x="24" fill="#b8bb26">eis</tspan><tspan x="45.599999999999994" fill="#ebdbb2"> timeline --span 6m --periods 0 --recursive ~/workspace</tspan></text>
  <text x="24" y="190" fill="#928374" font-size="12"># Specific members only</text>
  <text y="208" font-size="12"><tspan x="24" fill="#b8bb26">eis</tspan><tspan x="45.599999999999994" fill="#ebdbb2"> timeline --author alice,bob --recursive ~/workspace</tspan></text>
  <text x="24" y="244" fill="#928374" font-size="12"># JSON output</text>
  <text y="262" font-size="12"><tspan x="24" fill="#b8bb26">eis</tspan><tspan x="45.599999999999994" fill="#ebdbb2"> timeline --format json --recursive ~/workspace</tspan></text>
</svg>