<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="1000" height="420" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="1000" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="1000" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="500" y="20" text-anchor="middle" fill="#928374" font-size="12">Engineering Impact Score — Chapter 9</text>

  <!-- Left side: Text content -->
  <text x="30" y="75" fill="#928374" font-size="12">Chapter 9</text>
  <text x="30" y="115" fill="#fabd2f" font-size="24" font-weight="700">Origin</text>
  <text x="30" y="148" fill="#928374" font-size="14">The Big Bang of Code Universes</text>

  <!-- Left side: First commit -->
  <text x="30" y="195" fill="#8ec07c" font-size="11" font-weight="700">The First Commit</text>
  <text y="222" font-size="11"><tspan x="30" fill="#928374">$</tspan><tspan fill="#b8bb26"> git log --reverse</tspan></text>
  <text y="248" font-size="11"><tspan x="30" fill="#fabd2f">commit 0a1b2c3</tspan><tspan fill="#928374"> -- The Big Bang</tspan></text>
  <text y="272" font-size="11"><tspan x="30" fill="#928374">Author: founder</tspan></text>
  <text y="296" font-size="11"><tspan x="30" fill="#928374">Date:   2021-01-01</tspan></text>
  <text y="326" font-size="11"><tspan x="30" fill="#ebdbb2">Initial commit.</tspan><tspan fill="#928374"> Everything starts here.</tspan></text>

  <!-- Bottom prompt -->
  <text x="30" y="390" fill="#8ec07c" font-size="12">$ git log --reverse --format="%H" | head -1</text>
  <rect x="385" y="378" width="7" height="14" fill="#ebdbb2" opacity="0.7"/>

  <!-- Right side: Large chapter number -->
  <text x="750" y="320" text-anchor="middle" fill="#3c3836" font-size="200" font-weight="700">09</text>

  <!-- Right side: Big Bang concentric circles with particles -->
  <g opacity="0.9">
    <!-- Central explosion point -->
    <circle cx="760" cy="200" r="10" fill="#fabd2f"/>

    <!-- Concentric rings (expanding universe) -->
    <circle cx="760" cy="200" r="30" fill="none" stroke="#fabd2f" stroke-width="1.5" opacity="0.7"/>
    <circle cx="760" cy="200" r="60" fill="none" stroke="#d79921" stroke-width="1.5" opacity="0.5"/>
    <circle cx="760" cy="200" r="95" fill="none" stroke="#d79921" stroke-width="1" opacity="0.3"/>
    <circle cx="760" cy="200" r="135" fill="none" stroke="#928374" stroke-width="1" opacity="0.2"/>

    <!-- Scattered particles (initial commits flying outward) -->
    <circle cx="710" cy="150" r="4" fill="#b8bb26" opacity="0.8"/>
    <circle cx="810" cy="160" r="3" fill="#83a598" opacity="0.7"/>
    <circle cx="730" cy="260" r="4" fill="#d3869b" opacity="0.8"/>
    <circle cx="800" cy="250" r="3" fill="#8ec07c" opacity="0.7"/>
    <circle cx="680" cy="200" r="3" fill="#fabd2f" opacity="0.6"/>
    <circle cx="840" cy="180" r="4" fill="#fb4934" opacity="0.5"/>
    <circle cx="720" cy="180" r="3" fill="#83a598" opacity="0.6"/>
    <circle cx="790" cy="270" r="3" fill="#b8bb26" opacity="0.5"/>

    <!-- Outer particles (further expansion) -->
    <circle cx="650" cy="130" r="2" fill="#b8bb26" opacity="0.4"/>
    <circle cx="870" cy="120" r="2" fill="#d3869b" opacity="0.3"/>
    <circle cx="640" cy="260" r="2" fill="#83a598" opacity="0.4"/>
    <circle cx="880" cy="280" r="2" fill="#fabd2f" opacity="0.3"/>
    <circle cx="660" cy="310" r="2" fill="#8ec07c" opacity="0.3"/>
    <circle cx="870" cy="310" r="2" fill="#fb4934" opacity="0.3"/>

    <!-- Energy rays from center -->
    <line x1="760" y1="200" x2="680" y2="130" stroke="#fabd2f" stroke-width="0.5" opacity="0.3"/>
    <line x1="760" y1="200" x2="860" y2="140" stroke="#fabd2f" stroke-width="0.5" opacity="0.3"/>
    <line x1="760" y1="200" x2="660" y2="280" stroke="#fabd2f" stroke-width="0.5" opacity="0.2"/>
    <line x1="760" y1="200" x2="870" y2="290" stroke="#fabd2f" stroke-width="0.5" opacity="0.2"/>

    <!-- Label -->
    <text x="760" y="358" text-anchor="middle" fill="#665c54" font-size="10">git init -- the first commit</text>
  </g>
</svg>