<svg xmlns="http://www.w3.org/2000/svg" width="400" height="140" viewBox="0 0 400 140">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="400" height="140" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="400" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="400" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="200" y="20" text-anchor="middle" fill="#928374" font-size="12">Backend Team Structure</text>

  <text x="20" y="50" fill="#d3869b" font-size="12" font-weight="700">Star (Architect)</text>
  <text x="20" y="68" fill="#928374" font-size="12">    ↓</text>
