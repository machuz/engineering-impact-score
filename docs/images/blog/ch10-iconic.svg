<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="800" height="300" rx="8" fill="#282828"/>
  <rect width="800" height="28" rx="8" fill="#1d2021"/>
  <rect y="20" width="800" height="8" fill="#1d2021"/>
  <circle cx="18" cy="14" r="5" fill="#cc241d"/>
  <circle cx="36" cy="14" r="5" fill="#d79921"/>
  <circle cx="54" cy="14" r="5" fill="#98971a"/>

  <!-- Left side: Visible (solid) -->
  <text x="200" y="60" text-anchor="middle" fill="#8ec07c" font-size="13" font-weight="700">Visible</text>
  <text x="200" y="78" text-anchor="middle" fill="#665c54" font-size="10">What git log shows</text>

  <!-- Visible nodes with solid connections -->
  <circle cx="130" cy="130" r="10" fill="#8ec07c" opacity="0.8"/>
  <circle cx="270" cy="130" r="10" fill="#83a598" opacity="0.8"/>
  <circle cx="200" cy="200" r="10" fill="#b8bb26" opacity="0.8"/>

  <line x1="140" y1="130" x2="260" y2="130" stroke="#8ec07c" stroke-width="2" opacity="0.7"/>
  <line x1="135" y1="138" x2="193" y2="192" stroke="#8ec07c" stroke-width="2" opacity="0.7"/>
  <line x1="265" y1="138" x2="207" y2="192" stroke="#83a598" stroke-width="2" opacity="0.7"/>

  <text x="130" y="115" text-anchor="middle" fill="#8ec07c" font-size="9">Commits</text>
  <text x="270" y="115" text-anchor="middle" fill="#83a598" font-size="9">PRs</text>
  <text x="200" y="225" text-anchor="middle" fill="#b8bb26" font-size="9">Lines</text>

  <!-- Center divider -->
  <line x1="400" y1="50" x2="400" y2="260" stroke="#504945" stroke-width="1" stroke-dasharray="6 3"/>

  <!-- Right side: Dark Matter (dashed, invisible) -->
  <text x="600" y="60" text-anchor="middle" fill="#504945" font-size="13" font-weight="700">Dark Matter</text>
  <text x="600" y="78" text-anchor="middle" fill="#504945" font-size="10">What git log cannot see</text>

  <!-- Dark matter area -->
  <circle cx="600" cy="160" r="70" fill="#504945" opacity="0.08"/>
  <circle cx="600" cy="160" r="50" fill="#504945" opacity="0.08"/>

  <!-- Invisible nodes with dashed connections -->
  <circle cx="530" cy="120" r="10" fill="none" stroke="#504945" stroke-width="2" stroke-dasharray="3"/>
  <circle cx="670" cy="120" r="10" fill="none" stroke="#504945" stroke-width="2" stroke-dasharray="3"/>
  <circle cx="600" cy="200" r="10" fill="none" stroke="#504945" stroke-width="2" stroke-dasharray="3"/>

  <line x1="540" y1="120" x2="660" y2="120" stroke="#504945" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="535" y1="128" x2="593" y2="192" stroke="#504945" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="665" y1="128" x2="607" y2="192" stroke="#504945" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>

  <text x="530" y="105" text-anchor="middle" fill="#504945" font-size="9">Reviews</text>
  <text x="670" y="105" text-anchor="middle" fill="#504945" font-size="9">Mentoring</text>
  <text x="600" y="225" text-anchor="middle" fill="#504945" font-size="9">Architecture</text>

  <!-- Question marks floating -->
  <text x="560" y="155" fill="#504945" font-size="14" opacity="0.4">?</text>
  <text x="640" y="170" fill="#504945" font-size="12" opacity="0.3">?</text>
  <text x="590" y="180" fill="#504945" font-size="10" opacity="0.3">?</text>

  <!-- Bottom label -->
  <text x="400" y="270" text-anchor="middle" fill="#665c54" font-size="11">Invisible contributions that shape codebases</text>
</svg>