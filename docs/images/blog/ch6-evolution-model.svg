<svg xmlns="http://www.w3.org/2000/svg" width="750" height="446" viewBox="0 0 750 446">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="750" height="446" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="750" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="750" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="375" y="20" text-anchor="middle" fill="#928374" font-size="12">Evolution Model Overview</text>

  <text x="20" y="50" fill="#928374" font-size="12">┌──────────────────────────────────────────────────────────┐</text>
  <text x="20" y="68" fill="#8ec07c" font-size="12">│              Evolution Model Overview                    │</text>
  <text x="20" y="86" fill="#928374" font-size="12">├──────────────────────────────────────────────────────────┤</text>
  <text x="20" y="104" fill="#928374" font-size="12">│                                                          │</text>
  <text y="122" font-size="12"><tspan x="20" fill="#928374">│  </tspan><tspan x="41.6" fill="#83a598">[Growing]</tspan><tspan x="106.4" fill="#928374"> → </tspan><tspan x="128.0" fill="#83a598">[Anchor]</tspan><tspan x="185.6" fill="#928374"> → </tspan><tspan x="207.2" fill="#fabd2f">[Producer]</tspan><tspan x="279.2" fill="#928374"> → </tspan><tspan x="300.8" fill="#d3869b">[Architect]</tspan><tspan x="380.0" fill="#928374">        │</tspan></text>
  <text x="20" y="140" fill="#928374" font-size="12">│                  ↑            │            │             │</text>
  <text x="20" y="158" fill="#928374" font-size="12">│                  │            │   structure │             │</text>
  <text x="20" y="176" fill="#928374" font-size="12">│                  │            ←─────────────┘             │</text>
  <text x="20" y="194" fill="#928374" font-size="12">│                  │       (metabolism: back to Producer)   │</text>
  <text x="20" y="212" fill="#928374" font-size="12">│                                                          │</text>
  <text y="230" font-size="12"><tspan x="20" fill="#928374">│  * Permeation: </tspan><tspan x="142.4" fill="#83a598">[Anchor]</tspan><tspan x="200.0" fill="#928374"> → </tspan><tspan x="221.6" fill="#fabd2f">[Producer]</tspan><tspan x="293.6" fill="#928374"> → </tspan><tspan x="315.20000000000005" fill="#d3869b">[Architect]</tspan><tspan x="394.40000000000003" fill="#928374">        │</tspan></text>
  <text y="248" font-size="12"><tspan x="20" fill="#928374">│  * Immediate:  </tspan><tspan x="142.4" fill="#83a598">[Anchor]</tspan><tspan x="200.0" fill="#928374"> → </tspan><tspan x="221.6" fill="#d3869b">[Architect]</tspan><tspan x="300.8" fill="#928374"> direct               │</tspan></text>
  <text y="266" font-size="12"><tspan x="20" fill="#928374">│  * Founding:   </tspan><tspan x="142.4" fill="#d3869b">[Architect]</tspan><tspan x="221.60000000000002" fill="#928374"> → score decline (= success)   │</tspan></text>
  <text x="20" y="284" fill="#928374" font-size="12">│                                                          │</text>
  <text x="20" y="302" fill="#928374" font-size="12">├──────────────────────────────────────────────────────────┤</text>
  <text y="320" font-size="12"><tspan x="20" fill="#ebdbb2">│  BE: Architect seats tend to </tspan><tspan x="243.20000000000002" fill="#fb4934">concentrate</tspan><tspan x="322.40000000000003" fill="#ebdbb2"> (observed: 1)    │</tspan></text>
  <text y="338" font-size="12"><tspan x="20" fill="#ebdbb2">│  FE: Architect seats are </tspan><tspan x="214.4" fill="#b8bb26">fluid</tspan><tspan x="250.4" fill="#ebdbb2"> (observed: 1–2)           │</tspan></text>
  <text x="20" y="356" fill="#928374" font-size="12">├──────────────────────────────────────────────────────────┤</text>
  <text x="20" y="374" fill="#ebdbb2" font-size="12">│  Builder prerequisite: Builder experience → Architect    │</text>
  <text x="20" y="392" fill="#ebdbb2" font-size="12">│  Producer fuel: using structure deeply powers design     │</text>
  <text y="410" font-size="12"><tspan x="20" fill="#ebdbb2">│  Producer Vacuum: no producers = </tspan><tspan x="272.0" fill="#fb4934">structure sits idle</tspan><tspan x="408.8" fill="#ebdbb2">      │</tspan></text>
  <text x="20" y="428" fill="#928374" font-size="12">└──────────────────────────────────────────────────────────┘</text>
</svg>