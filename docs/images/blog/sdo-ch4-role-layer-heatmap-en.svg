    <text x="490" y="468" class="sans" fill="#ebdbb2" font-size="11">lone Producer spins out</text>
    <text x="490" y="482" class="sans" fill="#928374" font-size="10">burns out in design debate</text>
  </g>
  <g>
    <rect x="708" y="428" width="224" height="60" rx="8" fill="#282828" stroke="#cc241d" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="722" y="448" class="sans" fill="#cc241d" font-size="12" font-weight="700">✕  misfit</text>
    <text x="722" y="468" class="sans" fill="#ebdbb2" font-size="11">spins out</text>
    <text x="722" y="482" class="sans" fill="#928374" font-size="10">decision grain doesn't match</text>
  </g>

  <!-- Row 6: Specialist -->
  <rect x="20" y="496" width="216" height="60" rx="8" fill="#282828" stroke="#3c3836" stroke-width="1"/>
  <text x="36" y="518" class="sans" fill="#ebdbb2" font-size="14" font-weight="800">Specialist</text>
  <text x="36" y="536" class="sans" fill="#928374" font-size="11">deep in a domain</text>
  <text x="36" y="550" class="sans" fill="#7c6f64" font-size="10">domain-bounded</text>

  <g>
    <rect x="244" y="496" width="224" height="60" rx="8" fill="#282828" stroke="#fabd2f" stroke-width="1.5"/>
