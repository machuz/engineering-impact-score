  <text x="820" y="130" text-anchor="middle" class="sans" fill="#fabd2f" font-size="14" font-weight="800">Principle</text>

  <!-- Row 1: Architect Inheritance -->
  <rect x="20" y="156" width="216" height="60" rx="8" fill="#282828" stroke="#3c3836" stroke-width="1"/>
  <text x="36" y="178" class="sans" fill="#ebdbb2" font-size="14" font-weight="800">Architect</text>
  <text x="36" y="196" class="sans" fill="#928374" font-size="11">Inheritance lineage</text>
  <text x="36" y="210" class="sans" fill="#7c6f64" font-size="10">inherited by others</text>

  <g>
    <rect x="244" y="156" width="224" height="60" rx="8" fill="#282828" stroke="#83a598" stroke-width="1"/>
    <text x="258" y="176" class="sans" fill="#83a598" font-size="12" font-weight="700">●  viable</text>
    <text x="258" y="196" class="sans" fill="#ebdbb2" font-size="11">design embedded in code</text>
    <text x="258" y="210" class="sans" fill="#928374" font-size="10">directly</text>
  </g>
  <g>
    <rect x="476" y="156" width="224" height="60" rx="8" fill="#282828" stroke="#b8bb26" stroke-width="2"/>
