  <text x="84" y="96" class="sans" fill="#b8bb26" font-size="11" font-weight="700">★ prime</text>
  <text x="148" y="96" class="sans" fill="#fabd2f" font-size="11" font-weight="700">▲ strong</text>
  <text x="218" y="96" class="sans" fill="#83a598" font-size="11" font-weight="700">● viable</text>
  <text x="288" y="96" class="sans" fill="#d3869b" font-size="11" font-weight="700">▽ caution</text>
  <text x="362" y="96" class="sans" fill="#cc241d" font-size="11" font-weight="700">✕ misfit</text>

  <rect x="244" y="110" width="224" height="32" rx="6" fill="#282828" stroke="#83a598" stroke-width="1"/>
