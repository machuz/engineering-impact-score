  <g>
    <rect x="476" y="292" width="224" height="60" rx="8" fill="#282828" stroke="#83a598" stroke-width="1"/>
    <text x="490" y="312" class="sans" fill="#83a598" font-size="12" font-weight="700">●  viable</text>
    <text x="490" y="332" class="sans" fill="#ebdbb2" font-size="11">design review · quality guard</text>
    <text x="490" y="346" class="sans" fill="#928374" font-size="10">* severing from code breaks them</text>
