    <text x="490" y="550" class="sans" fill="#928374" font-size="10">spec · API design</text>
  </g>
  <g>
    <rect x="708" y="496" width="224" height="60" rx="8" fill="#282828" stroke="#83a598" stroke-width="1"/>
