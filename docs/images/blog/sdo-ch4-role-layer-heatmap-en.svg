    <rect x="244" y="428" width="224" height="60" rx="8" fill="#282828" stroke="#b8bb26" stroke-width="2"/>
    <text x="258" y="448" class="sans" fill="#b8bb26" font-size="12" font-weight="800">★  prime</text>
    <text x="258" y="468" class="sans" fill="#ebdbb2" font-size="11">leads by speed</text>
