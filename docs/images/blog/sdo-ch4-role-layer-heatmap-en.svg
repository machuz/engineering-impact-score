  <rect width="960" height="660" rx="12" fill="#1d2021"/>
  <rect x="0" y="0" width="4" height="660" rx="2" fill="#d3869b"/>
  <text x="936" y="24" text-anchor="end" class="mono" fill="#504945" font-size="10">Role × Layer · ch4</text>

  <text x="480" y="46" text-anchor="middle" class="sans" fill="#ebdbb2" font-size="22" font-weight="800" letter-spacing="1.2">Role × Layer — Placement Fit</text>
  <text x="480" y="68" text-anchor="middle" class="sans" fill="#928374" font-size="12">The same Role produces completely different results depending on which layer you place it in</text>

  <!-- Legend -->
