    <text x="722" y="536" class="sans" fill="#ebdbb2" font-size="11">only if domain wires to Principle</text>
    <text x="722" y="550" class="sans" fill="#928374" font-size="10">when the domain IS strategic</text>
  </g>

  <!-- Footer -->
  <text x="480" y="600" text-anchor="middle" class="sans" fill="#a89984" font-size="12">A Role alone doesn't determine placement fit. Only Role × Layer — as a pair — names "fits" vs "misfits".</text>
  <text x="480" y="620" text-anchor="middle" class="sans" fill="#928374" font-size="11">Layer on which transformation someone can carry, and placement design is complete.</text>
  <text x="480" y="640" text-anchor="middle" class="sans" fill="#7c6f64" font-size="10">Don't change the person — change the placement. That's why layer design works for organization theory.</text>
