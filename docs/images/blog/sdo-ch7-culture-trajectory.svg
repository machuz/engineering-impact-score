<svg xmlns="http://www.w3.org/2000/svg" width="960" height="700" viewBox="0 0 960 700">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Noto+Sans+JP:wght@400;700;800&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
      .jp   { font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', -apple-system, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <rect width="960" height="700" rx="12" fill="#1d2021"/>
  <rect x="0" y="0" width="4" height="700" rx="2" fill="#8ec07c"/>
  <text x="936" y="24" text-anchor="end" class="mono" fill="#504945" font-size="10">Culture Trajectory · ch7</text>

  <!-- Title -->
  <text x="480" y="46" text-anchor="middle" class="jp" fill="#ebdbb2" font-size="22" font-weight="800" letter-spacing="1.5">文化の装着 — 12 ヶ月の観測ログ</text>
  <text x="480" y="68" text-anchor="middle" class="jp" fill="#928374" font-size="12">文化は形容詞ではない。数字で立ち上がりが見える——ただし数字は構造シグナルの側にある</text>

  <!-- ============ Cell 1: "Which layer?" utterance frequency ============ -->
  <rect x="40" y="100" width="440" height="240" rx="10" fill="#282828" stroke="#fabd2f" stroke-width="1.5"/>
  <rect x="40" y="100" width="6" height="240" rx="3" fill="#fabd2f"/>
  <text x="60" y="126" class="jp" fill="#fabd2f" font-size="14" font-weight="800">「どのレイヤー？」発話頻度</text>
  <text x="60" y="144" class="mono" fill="#7c6f64" font-size="10">per week · observed in meetings</text>

  <!-- Chart area: x=80-440 y=160-300 -->
  <!-- Y axis labels -->
  <text x="72" y="172" text-anchor="end" class="mono" fill="#504945" font-size="9">20</text>
  <text x="72" y="216" text-anchor="end" class="mono" fill="#504945" font-size="9">10</text>
  <text x="72" y="260" text-anchor="end" class="mono" fill="#504945" font-size="9">5</text>
  <text x="72" y="300" text-anchor="end" class="mono" fill="#504945" font-size="9">0</text>
  <!-- Y axis line -->
  <line x1="80" y1="170" x2="80" y2="300" stroke="#3c3836" stroke-width="1"/>
  <!-- Horizontal gridlines -->
  <line x1="80" y1="172" x2="450" y2="172" stroke="#3c3836" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="216" x2="450" y2="216" stroke="#3c3836" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="260" x2="450" y2="260" stroke="#3c3836" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="300" x2="450" y2="300" stroke="#3c3836" stroke-width="1"/>

  <!-- Data line: M0=0, M3=1, M6=5, M12=15 -->
  <!-- x: M0=100, M3=200, M6=300, M12=430; y: 0=300, 20=172 (range 128px per 20) -->
  <line x1="100" y1="300" x2="200" y2="294" stroke="#fabd2f" stroke-width="2.5"/>
  <line x1="200" y1="294" x2="300" y2="268" stroke="#fabd2f" stroke-width="2.5"/>
  <line x1="300" y1="268" x2="430" y2="204" stroke="#fabd2f" stroke-width="2.5"/>
  <circle cx="100" cy="300" r="5" fill="#fabd2f"/>
  <circle cx="200" cy="294" r="5" fill="#fabd2f"/>
  <circle cx="300" cy="268" r="5" fill="#fabd2f"/>
  <circle cx="430" cy="204" r="5" fill="#fabd2f"/>

  <!-- Data point labels -->
  <text x="100" y="321" text-anchor="middle" class="mono" fill="#928374" font-size="10">0</text>
  <text x="200" y="321" text-anchor="middle" class="mono" fill="#928374" font-size="10">~1</text>
  <text x="300" y="321" text-anchor="middle" class="mono" fill="#928374" font-size="10">~5</text>
  <text x="430" y="198" text-anchor="middle" class="mono" fill="#fabd2f" font-size="11" font-weight="700">15+</text>

  <!-- ============ Cell 2: Structural vocab review rate ============ -->
  <rect x="496" y="100" width="440" height="240" rx="10" fill="#282828" stroke="#d3869b" stroke-width="1.5"/>
  <rect x="496" y="100" width="6" height="240" rx="3" fill="#d3869b"/>
  <text x="516" y="126" class="jp" fill="#d3869b" font-size="14" font-weight="800">構造語彙レビュー率</text>
  <text x="516" y="144" class="mono" fill="#7c6f64" font-size="10">Design / Survival / Cleanup in PR comments</text>

  <text x="528" y="172" text-anchor="end" class="mono" fill="#504945" font-size="9">100%</text>
  <text x="528" y="216" text-anchor="end" class="mono" fill="#504945" font-size="9">50%</text>
  <text x="528" y="260" text-anchor="end" class="mono" fill="#504945" font-size="9">25%</text>
  <text x="528" y="300" text-anchor="end" class="mono" fill="#504945" font-size="9">0%</text>
  <line x1="536" y1="170" x2="536" y2="300" stroke="#3c3836" stroke-width="1"/>
  <line x1="536" y1="172" x2="906" y2="172" stroke="#3c3836" stroke-width="0.5" opacity="0.5"/>
  <line x1="536" y1="216" x2="906" y2="216" stroke="#3c3836" stroke-width="0.5" opacity="0.5"/>
  <line x1="536" y1="260" x2="906" y2="260" stroke="#3c3836" stroke-width="0.5" opacity="0.5"/>
  <line x1="536" y1="300" x2="906" y2="300" stroke="#3c3836" stroke-width="1"/>

  <!-- M0=0%, M3=10%, M6=30%, M12=80% -->
  <line x1="556" y1="300" x2="656" y2="287" stroke="#d3869b" stroke-width="2.5"/>
  <line x1="656" y1="287" x2="756" y2="261" stroke="#d3869b" stroke-width="2.5"/>
  <line x1="756" y1="261" x2="886" y2="196" stroke="#d3869b" stroke-width="2.5"/>
  <circle cx="556" cy="300" r="5" fill="#d3869b"/>
  <circle cx="656" cy="287" r="5" fill="#d3869b"/>
  <circle cx="756" cy="261" r="5" fill="#d3869b"/>
  <circle cx="886" cy="196" r="5" fill="#d3869b"/>

  <text x="556" y="321" text-anchor="middle" class="mono" fill="#928374" font-size="10">0%</text>
  <text x="656" y="321" text-anchor="middle" class="mono" fill="#928374" font-size="10">10%</text>
  <text x="756" y="321" text-anchor="middle" class="mono" fill="#928374" font-size="10">30%</text>
  <text x="886" y="190" text-anchor="middle" class="mono" fill="#d3869b" font-size="11" font-weight="700">80%</text>

  <!-- ============ Cell 3: EIS Design axis median ============ -->
  <rect x="40" y="360" width="440" height="240" rx="10" fill="#282828" stroke="#83a598" stroke-width="1.5"/>
  <rect x="40" y="360" width="6" height="240" rx="3" fill="#83a598"/>
  <text x="60" y="386" class="jp" fill="#83a598" font-size="14" font-weight="800">EIS Design 軸中央値</text>
  <text x="60" y="404" class="mono" fill="#7c6f64" font-size="10">structural contribution to the codebase's core</text>

  <text x="72" y="432" text-anchor="end" class="mono" fill="#504945" font-size="9">60</text>
  <text x="72" y="476" text-anchor="end" class="mono" fill="#504945" font-size="9">40</text>
  <text x="72" y="520" text-anchor="end" class="mono" fill="#504945" font-size="9">20</text>
  <text x="72" y="560" text-anchor="end" class="mono" fill="#504945" font-size="9">0</text>
  <line x1="80" y1="430" x2="80" y2="560" stroke="#3c3836" stroke-width="1"/>
  <line x1="80" y1="432" x2="450" y2="432" stroke="#3c3836" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="476" x2="450" y2="476" stroke="#3c3836" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="520" x2="450" y2="520" stroke="#3c3836" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="560" x2="450" y2="560" stroke="#3c3836" stroke-width="1"/>

  <!-- M0=28, M3=30, M6=34, M12=45 — y scale 0@560 60@432 -->
  <line x1="100" y1="500" x2="200" y2="496" stroke="#83a598" stroke-width="2.5"/>
  <line x1="200" y1="496" x2="300" y2="488" stroke="#83a598" stroke-width="2.5"/>
  <line x1="300" y1="488" x2="430" y2="465" stroke="#83a598" stroke-width="2.5"/>
  <circle cx="100" cy="500" r="5" fill="#83a598"/>
  <circle cx="200" cy="496" r="5" fill="#83a598"/>
  <circle cx="300" cy="488" r="5" fill="#83a598"/>
  <circle cx="430" cy="465" r="5" fill="#83a598"/>

  <text x="100" y="518" text-anchor="middle" class="mono" fill="#928374" font-size="10">28</text>
  <text x="200" y="514" text-anchor="middle" class="mono" fill="#928374" font-size="10">30</text>
  <text x="300" y="506" text-anchor="middle" class="mono" fill="#928374" font-size="10">34</text>
  <text x="430" y="459" text-anchor="middle" class="mono" fill="#83a598" font-size="11" font-weight="700">45</text>

  <!-- ============ Cell 4: New hire vocabulary adoption in 1 week ============ -->
  <rect x="496" y="360" width="440" height="240" rx="10" fill="#282828" stroke="#b8bb26" stroke-width="1.5"/>
  <rect x="496" y="360" width="6" height="240" rx="3" fill="#b8bb26"/>
  <text x="516" y="386" class="jp" fill="#b8bb26" font-size="14" font-weight="800">新人が 1 週間で語彙を使えた率</text>
  <text x="516" y="404" class="mono" fill="#7c6f64" font-size="10">1-week vocabulary adoption · onboarding signal</text>

  <text x="528" y="432" text-anchor="end" class="mono" fill="#504945" font-size="9">100%</text>
  <text x="528" y="476" text-anchor="end" class="mono" fill="#504945" font-size="9">50%</text>
  <text x="528" y="520" text-anchor="end" class="mono" fill="#504945" font-size="9">25%</text>
  <text x="528" y="560" text-anchor="end" class="mono" fill="#504945" font-size="9">0%</text>
  <line x1="536" y1="430" x2="536" y2="560" stroke="#3c3836" stroke-width="1"/>
  <line x1="536" y1="432" x2="906" y2="432" stroke="#3c3836" stroke-width="0.5" opacity="0.5"/>
  <line x1="536" y1="476" x2="906" y2="476" stroke="#3c3836" stroke-width="0.5" opacity="0.5"/>
  <line x1="536" y1="520" x2="906" y2="520" stroke="#3c3836" stroke-width="0.5" opacity="0.5"/>
  <line x1="536" y1="560" x2="906" y2="560" stroke="#3c3836" stroke-width="1"/>

  <!-- M0=0%, M3=0%, M6=40%, M12=100% -->
  <line x1="556" y1="560" x2="656" y2="560" stroke="#b8bb26" stroke-width="2.5"/>
  <line x1="656" y1="560" x2="756" y2="508" stroke="#b8bb26" stroke-width="2.5"/>
  <line x1="756" y1="508" x2="886" y2="432" stroke="#b8bb26" stroke-width="2.5"/>
  <circle cx="556" cy="560" r="5" fill="#b8bb26"/>
  <circle cx="656" cy="560" r="5" fill="#b8bb26"/>
  <circle cx="756" cy="508" r="5" fill="#b8bb26"/>
  <circle cx="886" cy="432" r="5" fill="#b8bb26"/>

  <text x="556" y="578" text-anchor="middle" class="mono" fill="#928374" font-size="10">0%</text>
  <text x="656" y="578" text-anchor="middle" class="mono" fill="#928374" font-size="10">0%</text>
  <text x="756" y="526" text-anchor="middle" class="mono" fill="#928374" font-size="10">40%</text>
  <text x="886" y="426" text-anchor="middle" class="mono" fill="#b8bb26" font-size="11" font-weight="700">100%</text>

  <!-- Phase markers below all cells -->
  <text x="100" y="626" text-anchor="middle" class="jp" fill="#cc241d" font-size="12" font-weight="800">M0 · Before</text>
  <text x="100" y="642" text-anchor="middle" class="jp" fill="#7c6f64" font-size="10">LGTM + nits / バリュー引用 0</text>
  <text x="287" y="626" text-anchor="middle" class="jp" fill="#a89984" font-size="12" font-weight="700">M3</text>
  <text x="287" y="642" text-anchor="middle" class="jp" fill="#7c6f64" font-size="10">構造-first 1on1 導入</text>
  <text x="567" y="626" text-anchor="middle" class="jp" fill="#a89984" font-size="12" font-weight="700">M6</text>
  <text x="567" y="642" text-anchor="middle" class="jp" fill="#7c6f64" font-size="10">語彙がチームに浸透</text>
  <text x="860" y="626" text-anchor="middle" class="jp" fill="#b8bb26" font-size="12" font-weight="800">M12 · After</text>
  <text x="860" y="642" text-anchor="middle" class="jp" fill="#7c6f64" font-size="10">全員反射神経化 / EIS 共有</text>

  <!-- Footer -->
  <text x="480" y="676" text-anchor="middle" class="jp" fill="#928374" font-size="11">数字は売上でも離職率でもなく、構造シグナルの側に置かれる</text>
</svg>
