<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="800" height="300" rx="8" fill="#282828"/>
  <rect width="800" height="28" rx="8" fill="#1d2021"/>
  <rect y="20" width="800" height="8" fill="#1d2021"/>
  <circle cx="18" cy="14" r="5" fill="#cc241d"/>
  <circle cx="36" cy="14" r="5" fill="#d79921"/>
  <circle cx="54" cy="14" r="5" fill="#98971a"/>

  <!-- Good Architect (left) -->
  <text x="220" y="60" text-anchor="middle" fill="#8ec07c" font-size="14" font-weight="700">Good Architect</text>

  <!-- Green star with radiating light -->
  <circle cx="220" cy="155" r="50" fill="none" stroke="#8ec07c" stroke-width="1" opacity="0.2"/>
  <circle cx="220" cy="155" r="35" fill="none" stroke="#8ec07c" stroke-width="1" opacity="0.3"/>
  <circle cx="220" cy="155" r="20" fill="#8ec07c" opacity="0.15"/>
  <circle cx="220" cy="155" r="12" fill="#8ec07c" opacity="0.6"/>

  <!-- Radiating outward (nurturing) -->
  <line x1="220" y1="140" x2="220" y2="95" stroke="#8ec07c" stroke-width="1.5" opacity="0.5"/>
  <line x1="235" y1="155" x2="280" y2="155" stroke="#8ec07c" stroke-width="1.5" opacity="0.5"/>
  <line x1="205" y1="155" x2="160" y2="155" stroke="#8ec07c" stroke-width="1.5" opacity="0.5"/>
  <line x1="220" y1="170" x2="220" y2="215" stroke="#8ec07c" stroke-width="1.5" opacity="0.5"/>
  <line x1="232" y1="143" x2="260" y2="115" stroke="#8ec07c" stroke-width="1" opacity="0.4"/>
  <line x1="208" y1="143" x2="180" y2="115" stroke="#8ec07c" stroke-width="1" opacity="0.4"/>
  <line x1="232" y1="167" x2="260" y2="195" stroke="#8ec07c" stroke-width="1" opacity="0.4"/>
  <line x1="208" y1="167" x2="180" y2="195" stroke="#8ec07c" stroke-width="1" opacity="0.4"/>

  <!-- Orbiting team members -->
  <circle cx="220" cy="90" r="5" fill="#b8bb26" opacity="0.7"/>
  <circle cx="285" cy="155" r="5" fill="#b8bb26" opacity="0.7"/>
  <circle cx="155" cy="155" r="5" fill="#b8bb26" opacity="0.7"/>
  <circle cx="220" cy="220" r="5" fill="#b8bb26" opacity="0.7"/>
  <circle cx="265" cy="110" r="4" fill="#b8bb26" opacity="0.5"/>
  <circle cx="175" cy="110" r="4" fill="#b8bb26" opacity="0.5"/>
  <circle cx="265" cy="200" r="4" fill="#b8bb26" opacity="0.5"/>
  <circle cx="175" cy="200" r="4" fill="#b8bb26" opacity="0.5"/>

  <text x="220" y="250" text-anchor="middle" fill="#8ec07c" font-size="11">Gravity that nurtures</text>

  <!-- VS -->
  <text x="400" y="160" text-anchor="middle" fill="#665c54" font-size="16" font-weight="700">vs</text>

  <!-- Black Hole (right) -->
  <text x="580" y="60" text-anchor="middle" fill="#fb4934" font-size="14" font-weight="700">Black Hole</text>

  <!-- Dark collapsed star -->
  <circle cx="580" cy="155" r="50" fill="#1d2021" opacity="0.5"/>
  <circle cx="580" cy="155" r="35" fill="#1d2021" stroke="#fb4934" stroke-width="2" opacity="0.6"/>
  <circle cx="580" cy="155" r="18" fill="#fb4934" opacity="0.15"/>
  <circle cx="580" cy="155" r="8" fill="#fb4934" opacity="0.4"/>

  <!-- Spiraling inward (consuming) -->
  <path d="M 520,95 Q 540,115 565,140" fill="none" stroke="#fb4934" stroke-width="1.2" opacity="0.5"/>
  <path d="M 640,95 Q 620,115 595,140" fill="none" stroke="#fb4934" stroke-width="1.2" opacity="0.5"/>
  <path d="M 520,215 Q 540,195 565,170" fill="none" stroke="#fb4934" stroke-width="1.2" opacity="0.5"/>
  <path d="M 640,215 Q 620,195 595,170" fill="none" stroke="#fb4934" stroke-width="1.2" opacity="0.5"/>
  <path d="M 515,155 Q 540,155 565,155" fill="none" stroke="#fb4934" stroke-width="1.2" opacity="0.5"/>
  <path d="M 645,155 Q 620,155 595,155" fill="none" stroke="#fb4934" stroke-width="1.2" opacity="0.5"/>

  <!-- Being consumed particles -->
  <circle cx="515" cy="90" r="4" fill="#fb4934" opacity="0.4"/>
  <circle cx="645" cy="90" r="4" fill="#fb4934" opacity="0.4"/>
  <circle cx="510" cy="155" r="4" fill="#fb4934" opacity="0.4"/>
  <circle cx="650" cy="155" r="4" fill="#fb4934" opacity="0.4"/>
  <circle cx="515" cy="220" r="4" fill="#fb4934" opacity="0.4"/>
  <circle cx="645" cy="220" r="4" fill="#fb4934" opacity="0.4"/>

  <text x="580" y="250" text-anchor="middle" fill="#fb4934" font-size="11">Gravity that consumes</text>

  <text x="400" y="282" text-anchor="middle" fill="#665c54" font-size="11">Same gravitational force, opposite effects</text>
</svg>