<svg xmlns="http://www.w3.org/2000/svg" width="660" height="180" viewBox="0 0 660 180">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Card background -->
  <rect width="660" height="180" rx="8" fill="#1d2021"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="180" rx="2" fill="#8ec07c"/>

  <!-- Category label -->
  <text x="632" y="18" text-anchor="end" fill="#504945" font-size="10">Formula</text>

  <text y="28" font-size="14"><tspan x="24" fill="#83a598">health</tspan><tspan x="74.4" fill="#928374"> = </tspan><tspan x="99.60000000000001" fill="#ebdbb2">Quality</tspan><tspan x="158.4" fill="#928374"> × </tspan><tspan x="183.60000000000002" fill="#d3869b">0.6</tspan><tspan x="208.8" fill="#928374"> + </tspan><tspan x="234.0" fill="#ebdbb2">RobustSurvival</tspan><tspan x="351.6" fill="#928374"> × </tspan><tspan x="376.8" fill="#d3869b">0.4</tspan></text>
  <text y="72" font-size="14"><tspan x="24" fill="#ebdbb2">Gravity &lt; 20</tspan><tspan x="124.80000000000001" fill="#928374">  → </tspan><tspan x="158.4" fill="#928374">dim gray</tspan><tspan x="225.60000000000002" fill="#928374"> (low influence)</tspan></text>
  <text y="94" font-size="14"><tspan x="24" fill="#ebdbb2">health ≥ 60</tspan><tspan x="116.4" fill="#928374">  → </tspan><tspan x="150.0" fill="#b8bb26">green</tspan><tspan x="192.0" fill="#928374"> (healthy gravity)</tspan></text>
  <text y="116" font-size="14"><tspan x="24" fill="#ebdbb2">health ≥ 40</tspan><tspan x="116.4" fill="#928374">  → </tspan><tspan x="150.0" fill="#fabd2f">yellow</tspan><tspan x="200.4" fill="#928374"> (moderate)</tspan></text>
  <text y="138" font-size="14"><tspan x="24" fill="#ebdbb2">health &lt; 40</tspan><tspan x="116.4" fill="#928374">  → </tspan><tspan x="150.0" fill="#fb4934">red</tspan><tspan x="175.2" fill="#928374"> (fragile gravity)</tspan></text>
</svg>