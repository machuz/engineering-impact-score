<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Noto+Sans+JP:wght@400;700;800&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
      .jp   { font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', -apple-system, 'Segoe UI', sans-serif; }
    </style>
    <marker id="arr10" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#504945"/>
    </marker>
  </defs>

  <rect width="960" height="640" rx="12" fill="#1d2021"/>
  <rect x="0" y="0" width="4" height="640" rx="2" fill="#ebdbb2"/>
  <text x="936" y="24" text-anchor="end" class="mono" fill="#504945" font-size="10">Organization OS Stack · ch10</text>

  <text x="480" y="46" text-anchor="middle" class="jp" fill="#ebdbb2" font-size="22" font-weight="800" letter-spacing="1.5">構造駆動組織 OS のスタック</text>
  <text x="480" y="68" text-anchor="middle" class="jp" fill="#928374" font-size="12">観測 + 語彙 + 配管 が積み上がって、組織は OS として動く</text>

  <!-- Layer 5 (top): Organization OS -->
  <rect x="120" y="104" width="720" height="80" rx="10" fill="#282828" stroke="#ebdbb2" stroke-width="2"/>
  <rect x="120" y="104" width="720" height="24" rx="10" fill="#ebdbb2"/>
  <rect x="120" y="118" width="720" height="10" fill="#ebdbb2"/>
  <text x="150" y="122" class="jp" fill="#1d2021" font-size="13" font-weight="800">組織 OS</text>
  <text x="810" y="122" text-anchor="end" class="mono" fill="#1d2021" font-size="11" font-weight="700">ch10</text>
  <text x="480" y="160" text-anchor="middle" class="jp" fill="#ebdbb2" font-size="14" font-weight="700">人が走るための規律と配線を提供する</text>
  <text x="480" y="178" text-anchor="middle" class="mono" fill="#7c6f64" font-size="10">the discipline and wiring that lets people run</text>

  <!-- Layer 4: Culture -->
  <rect x="120" y="206" width="720" height="80" rx="10" fill="#282828" stroke="#8ec07c" stroke-width="2"/>
  <rect x="120" y="206" width="720" height="24" rx="10" fill="#8ec07c"/>
  <rect x="120" y="220" width="720" height="10" fill="#8ec07c"/>
  <text x="150" y="224" class="jp" fill="#1d2021" font-size="13" font-weight="800">文化</text>
  <text x="810" y="224" text-anchor="end" class="mono" fill="#1d2021" font-size="11" font-weight="700">ch7</text>
  <text x="480" y="260" text-anchor="middle" class="jp" fill="#ebdbb2" font-size="13">語彙が<tspan font-weight="bold">日常語</tspan>になる / 新人が 1 週間で構造語で話す / 「それ、どのレイヤー？」</text>
  <text x="480" y="278" text-anchor="middle" class="mono" fill="#7c6f64" font-size="10">the vocabulary reaches daily language — verbalization becomes culture</text>

  <!-- Layer 3: Plumbing SaaS -->
  <rect x="120" y="308" width="720" height="80" rx="10" fill="#282828" stroke="#fabd2f" stroke-width="2"/>
  <rect x="120" y="308" width="720" height="24" rx="10" fill="#fabd2f"/>
  <rect x="120" y="322" width="720" height="10" fill="#fabd2f"/>
  <text x="150" y="326" class="jp" fill="#1d2021" font-size="13" font-weight="800">配管 SaaS</text>
  <text x="810" y="326" text-anchor="end" class="mono" fill="#1d2021" font-size="11" font-weight="700">ch9</text>
  <text x="240" y="362" text-anchor="middle" class="jp" fill="#d3869b" font-size="12" font-weight="700">OrbitLens Ace</text>
  <text x="240" y="378" text-anchor="middle" class="jp" fill="#928374" font-size="10">現在地と不足を読む</text>
  <text x="480" y="362" text-anchor="middle" class="jp" fill="#fabd2f" font-size="12" font-weight="700">OrbitLens True</text>
  <text x="480" y="378" text-anchor="middle" class="jp" fill="#928374" font-size="10">外から構造を埋める</text>
  <text x="720" y="362" text-anchor="middle" class="jp" fill="#83a598" font-size="12" font-weight="700">OrbitLens Ideal</text>
  <text x="720" y="378" text-anchor="middle" class="jp" fill="#928374" font-size="10">今いる人で回す</text>

  <!-- Layer 2: Structural Language -->
  <rect x="120" y="410" width="720" height="90" rx="10" fill="#282828" stroke="#d3869b" stroke-width="2"/>
  <rect x="120" y="410" width="720" height="24" rx="10" fill="#d3869b"/>
  <rect x="120" y="424" width="720" height="10" fill="#d3869b"/>
  <text x="150" y="428" class="jp" fill="#1d2021" font-size="13" font-weight="800">構造語彙</text>
  <text x="810" y="428" text-anchor="end" class="mono" fill="#1d2021" font-size="11" font-weight="700">ch2-6</text>
  <text x="480" y="462" text-anchor="middle" class="jp" fill="#ebdbb2" font-size="12">3 層（原理 / 構造 / 実装）+ 変換 · Role × Style × State</text>
  <text x="480" y="480" text-anchor="middle" class="jp" fill="#ebdbb2" font-size="12">介入 3 層（行動 / 出力 / 蓄積）· 文化シグナル 3 バケツ · Product-Organization Isomorphism</text>
  <text x="480" y="496" text-anchor="middle" class="mono" fill="#7c6f64" font-size="10">the shared vocabulary that plumbs every layer together</text>

  <!-- Layer 1 (bottom): Observation -->
  <rect x="120" y="522" width="720" height="80" rx="10" fill="#282828" stroke="#83a598" stroke-width="2"/>
  <rect x="120" y="522" width="720" height="24" rx="10" fill="#83a598"/>
  <rect x="120" y="536" width="720" height="10" fill="#83a598"/>
  <text x="150" y="540" class="jp" fill="#1d2021" font-size="13" font-weight="800">観測基盤</text>
  <text x="810" y="540" text-anchor="end" class="mono" fill="#1d2021" font-size="11" font-weight="700">ch1 · EIS</text>
  <text x="480" y="574" text-anchor="middle" class="jp" fill="#ebdbb2" font-size="13" font-weight="700">EIS (CLI) — Git 考古学 · 7 軸シグナル · アーキタイプ · モジュールトポロジー</text>
  <text x="480" y="592" text-anchor="middle" class="mono" fill="#7c6f64" font-size="10">observation foundation — built from git log + git blame alone</text>

  <!-- Stack arrows (upward) -->
  <line x1="60" y1="502" x2="60" y2="408" stroke="#504945" stroke-width="1.5" marker-end="url(#arr10)"/>
  <line x1="60" y1="400" x2="60" y2="308" stroke="#504945" stroke-width="1.5" marker-end="url(#arr10)"/>
  <line x1="60" y1="300" x2="60" y2="208" stroke="#504945" stroke-width="1.5" marker-end="url(#arr10)"/>
  <line x1="60" y1="200" x2="60" y2="108" stroke="#504945" stroke-width="1.5" marker-end="url(#arr10)"/>

  <!-- Side: 3 conditions (ch8) -->
  <rect x="880" y="104" width="66" height="498" rx="8" fill="#1d2021" stroke="#504945" stroke-width="1"/>
  <text x="913" y="124" text-anchor="middle" class="jp" fill="#928374" font-size="9">ch8</text>
  <text x="913" y="140" text-anchor="middle" class="jp" fill="#928374" font-size="9">貫通</text>
  <text x="913" y="156" text-anchor="middle" class="jp" fill="#928374" font-size="9">条件</text>
  <line x1="886" y1="168" x2="940" y2="168" stroke="#504945" stroke-width="0.5"/>
  <text x="913" y="250" text-anchor="middle" class="jp" fill="#b8bb26" font-size="10" font-weight="700" transform="rotate(-90 913 250)">再現性</text>
  <text x="913" y="380" text-anchor="middle" class="jp" fill="#83a598" font-size="10" font-weight="700" transform="rotate(-90 913 380)">可観測性</text>
  <text x="913" y="520" text-anchor="middle" class="jp" fill="#d3869b" font-size="10" font-weight="700" transform="rotate(-90 913 520)">自己修正性</text>
</svg>
