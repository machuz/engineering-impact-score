<svg xmlns="http://www.w3.org/2000/svg" width="720" height="640" viewBox="0 0 720 640">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Noto+Sans+JP:wght@400;700;800&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
      .jp   { font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', -apple-system, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="720" height="640" rx="12" fill="#1d2021"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="640" rx="2" fill="#8ec07c"/>

  <!-- Category label -->
  <text x="696" y="24" text-anchor="end" class="mono" fill="#504945" font-size="10">Model · ch4</text>

  <!-- Title -->
  <text x="360" y="46" text-anchor="middle" class="jp" fill="#ebdbb2" font-size="22" font-weight="800" letter-spacing="1.5">3 層 + 2 変換モデル</text>
  <text x="360" y="68" text-anchor="middle" class="mono" fill="#928374" font-size="12">原理 ── 変換 ── 構造 ── 変換 ── 実装</text>

  <!-- ================== Principle Layer ================== -->
  <rect x="48" y="98" width="624" height="72" rx="10" fill="#282828" stroke="#fabd2f" stroke-width="1.5"/>
  <rect x="48" y="98" width="6" height="72" rx="3" fill="#fabd2f"/>
  <text x="74" y="131" class="jp" fill="#fabd2f" font-size="22" font-weight="800">原理層</text>
  <text x="74" y="152" class="mono" fill="#7c6f64" font-size="11">Principle</text>
  <text x="210" y="128" class="jp" fill="#ebdbb2" font-size="14" font-weight="700">戦略、世界観、思想</text>
  <text x="210" y="149" class="jp" fill="#928374" font-size="12">なぜ作るか／何を作らないか／誰のために／どこに賭けるか</text>

  <!-- ================== Transformation 1 (Principle ↔ Structure) ================== -->
  <!-- Double arrow -->
  <g transform="translate(360, 188)">
    <line x1="0" y1="0" x2="0" y2="62" stroke="#8ec07c" stroke-width="2"/>
    <polygon points="-6,6 6,6 0,-2" fill="#8ec07c"/>
    <polygon points="-6,56 6,56 0,64" fill="#8ec07c"/>
  </g>
  <!-- Down label (left of arrow) -->
  <text x="346" y="208" text-anchor="end" class="jp" fill="#928374" font-size="11">↓ 思想を構造の形に翻訳</text>
  <text x="346" y="224" text-anchor="end" class="jp" fill="#7c6f64" font-size="10">（アーキテクチャ・組織設計・IA として）</text>
  <!-- Up label (right of arrow) -->
  <text x="374" y="208" class="jp" fill="#928374" font-size="11">↑ 構造の現実を原理の再評価に戻す</text>
  <text x="374" y="224" class="jp" fill="#7c6f64" font-size="10">（歪みを発見・原則を書き換え）</text>
  <!-- Transformation label (centered on top of arrow) -->
  <rect x="278" y="238" width="164" height="22" rx="11" fill="#1d2021" stroke="#8ec07c" stroke-width="1"/>
  <text x="360" y="254" text-anchor="middle" class="jp" fill="#8ec07c" font-size="12" font-weight="700">変換 · 原理 ↔ 構造</text>

  <!-- ================== Structure Layer ================== -->
  <rect x="48" y="278" width="624" height="84" rx="10" fill="#282828" stroke="#d3869b" stroke-width="1.5"/>
  <rect x="48" y="278" width="6" height="84" rx="3" fill="#d3869b"/>
  <text x="74" y="311" class="jp" fill="#d3869b" font-size="22" font-weight="800">構造層</text>
  <text x="74" y="332" class="mono" fill="#7c6f64" font-size="11">Structure</text>
  <text x="210" y="308" class="jp" fill="#ebdbb2" font-size="14" font-weight="700">アーキテクチャ、組織設計、情報設計</text>
  <text x="210" y="329" class="jp" fill="#928374" font-size="12">思想が形を持った状態／RFC・組織図・IA として参照される</text>
  <text x="210" y="349" class="jp" fill="#7c6f64" font-size="10">変換の着地点。ここが薄いと、原理と実装が繋がらない</text>

  <!-- ================== Transformation 2 (Structure ↔ Implementation) ================== -->
  <g transform="translate(360, 380)">
    <line x1="0" y1="0" x2="0" y2="62" stroke="#8ec07c" stroke-width="2"/>
    <polygon points="-6,6 6,6 0,-2" fill="#8ec07c"/>
    <polygon points="-6,56 6,56 0,64" fill="#8ec07c"/>
  </g>
  <text x="346" y="400" text-anchor="end" class="jp" fill="#928374" font-size="11">↓ 構造をコード・画面に翻訳</text>
  <text x="346" y="416" text-anchor="end" class="jp" fill="#7c6f64" font-size="10">（手を動かせる粒度に分解）</text>
  <text x="374" y="400" class="jp" fill="#928374" font-size="11">↑ 実装の手触りを構造の修正に戻す</text>
  <text x="374" y="416" class="jp" fill="#7c6f64" font-size="10">（制約・課題・エッジケース）</text>
  <rect x="278" y="430" width="164" height="22" rx="11" fill="#1d2021" stroke="#8ec07c" stroke-width="1"/>
  <text x="360" y="446" text-anchor="middle" class="jp" fill="#8ec07c" font-size="12" font-weight="700">変換 · 構造 ↔ 実装</text>

  <!-- ================== Implementation Layer ================== -->
  <rect x="48" y="470" width="624" height="72" rx="10" fill="#282828" stroke="#83a598" stroke-width="1.5"/>
  <rect x="48" y="470" width="6" height="72" rx="3" fill="#83a598"/>
  <text x="74" y="503" class="jp" fill="#83a598" font-size="22" font-weight="800">実装層</text>
  <text x="74" y="524" class="mono" fill="#7c6f64" font-size="11">Implementation</text>
  <text x="210" y="500" class="jp" fill="#ebdbb2" font-size="14" font-weight="700">コード、機能、運用、画面、API</text>
  <text x="210" y="521" class="jp" fill="#928374" font-size="12">動くか動かないか／使えるか使えないかが評価軸</text>

  <!-- ================== Footer note ================== -->
  <text x="360" y="578" text-anchor="middle" class="jp" fill="#a89984" font-size="12">構造は、変換の結果として立ち現れる状態。</text>
  <text x="360" y="598" text-anchor="middle" class="jp" fill="#928374" font-size="11">変換が止まれば、原理は構造から切れ、構造は実装から切れる。</text>
  <text x="360" y="618" text-anchor="middle" class="jp" fill="#7c6f64" font-size="10">本書のタイトル「構造駆動」= この変換が走り続ける組織を設計すること</text>
</svg>
