<svg xmlns="http://www.w3.org/2000/svg" width="580" height="114" viewBox="0 0 580 114">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Card background -->
  <rect width="580" height="114" rx="8" fill="#1d2021"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="114" rx="2" fill="#8ec07c"/>

  <!-- Category label -->
  <text x="552" y="18" text-anchor="end" fill="#504945" font-size="10">Formula</text>

  <text y="28" font-size="14"><tspan x="24" fill="#83a598">coverage</tspan><tspan x="91.2" fill="#928374"> = </tspan><tspan x="116.4" fill="#ebdbb2">uniqueRoles</tspan><tspan x="208.8" fill="#928374"> / </tspan><tspan x="234.0" fill="#d3869b">5</tspan></text>
  <text y="50" font-size="14"><tspan x="24" fill="#83a598">bonus</tspan><tspan x="66.0" fill="#928374"> = </tspan><tspan x="91.2" fill="#d3869b">Architect</tspan><tspan x="166.8" fill="#928374">(+10)</tspan><tspan x="208.8" fill="#928374"> + </tspan><tspan x="234.0" fill="#83a598">Anchor</tspan><tspan x="284.4" fill="#928374">(+5)</tspan><tspan x="318.0" fill="#928374"> + </tspan><tspan x="343.2" fill="#8ec07c">Cleaner</tspan><tspan x="402.0" fill="#928374">(+5)</tspan></text>
  <text y="72" font-size="14"><tspan x="24" fill="#83a598">score</tspan><tspan x="66.0" fill="#928374"> = </tspan><tspan x="91.2" fill="#ebdbb2">coverage</tspan><tspan x="158.4" fill="#928374"> × </tspan><tspan x="183.60000000000002" fill="#d3869b">80</tspan><tspan x="200.40000000000003" fill="#928374"> + </tspan><tspan x="225.60000000000002" fill="#ebdbb2">bonus</tspan><tspan x="267.6" fill="#ebdbb2">  </tspan><tspan x="284.40000000000003" fill="#928374">(clamped 0-100)</tspan></text>
</svg>