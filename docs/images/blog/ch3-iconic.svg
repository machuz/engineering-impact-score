<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="800" height="300" rx="8" fill="#282828"/>
  <rect width="800" height="28" rx="8" fill="#1d2021"/>
  <rect y="20" width="800" height="8" fill="#1d2021"/>
  <circle cx="18" cy="14" r="5" fill="#cc241d"/>
  <circle cx="36" cy="14" r="5" fill="#d79921"/>
  <circle cx="54" cy="14" r="5" fill="#98971a"/>

  <!-- Common origin -->
  <circle cx="400" cy="60" r="10" fill="#fabd2f"/>
  <text x="400" y="64" text-anchor="middle" fill="#282828" font-size="9" font-weight="700">IC</text>

  <!-- Trunk -->
  <line x1="400" y1="70" x2="400" y2="105" stroke="#fabd2f" stroke-width="3"/>

  <!-- Branch point -->
  <circle cx="400" cy="105" r="4" fill="#665c54"/>

  <!-- FE path (left) - divergent, spreading out -->
  <path d="M 400,105 Q 300,130 200,120" fill="none" stroke="#83a598" stroke-width="2.5"/>
  <path d="M 200,120 Q 150,130 100,110" fill="none" stroke="#83a598" stroke-width="1.5" opacity="0.7"/>
  <path d="M 200,120 Q 160,150 120,170" fill="none" stroke="#83a598" stroke-width="1.5" opacity="0.7"/>
  <path d="M 200,120 Q 180,160 170,210" fill="none" stroke="#83a598" stroke-width="1.5" opacity="0.7"/>

  <!-- FE leaf nodes -->
  <circle cx="100" cy="110" r="6" fill="#83a598" opacity="0.6"/>
  <circle cx="120" cy="170" r="6" fill="#83a598" opacity="0.6"/>
  <circle cx="170" cy="210" r="6" fill="#83a598" opacity="0.6"/>

  <!-- FE labels -->
  <text x="65" y="100" fill="#83a598" font-size="9">UI/UX</text>
  <text x="75" y="175" fill="#83a598" font-size="9">React</text>
  <text x="130" y="225" fill="#83a598" font-size="9">CSS</text>

  <text x="200" y="260" text-anchor="middle" fill="#83a598" font-size="14" font-weight="700">FE Architect</text>
  <text x="200" y="278" text-anchor="middle" fill="#665c54" font-size="11">Divergent</text>

  <!-- BE path (right) - convergent, narrowing -->
  <path d="M 400,105 Q 500,130 600,120" fill="none" stroke="#d3869b" stroke-width="2.5"/>
  <path d="M 600,120 Q 650,140 660,170" fill="none" stroke="#d3869b" stroke-width="1.5" opacity="0.7"/>
  <path d="M 600,120 Q 640,160 640,200" fill="none" stroke="#d3869b" stroke-width="1.5" opacity="0.7"/>
  <path d="M 600,120 Q 620,150 610,190" fill="none" stroke="#d3869b" stroke-width="1.5" opacity="0.7"/>

  <!-- BE convergence point -->
  <path d="M 660,170 Q 640,210 630,230" fill="none" stroke="#d3869b" stroke-width="1" opacity="0.5"/>
  <path d="M 640,200 Q 635,215 630,230" fill="none" stroke="#d3869b" stroke-width="1" opacity="0.5"/>
  <path d="M 610,190 Q 620,210 630,230" fill="none" stroke="#d3869b" stroke-width="1" opacity="0.5"/>
  <circle cx="630" cy="230" r="8" fill="#d3869b" opacity="0.8"/>

  <!-- BE labels -->
  <text x="670" y="165" fill="#d3869b" font-size="9">API</text>
  <text x="655" y="200" fill="#d3869b" font-size="9">DB</text>
  <text x="620" y="188" fill="#d3869b" font-size="9">Infra</text>

  <text x="600" y="260" text-anchor="middle" fill="#d3869b" font-size="14" font-weight="700">BE Architect</text>
  <text x="600" y="278" text-anchor="middle" fill="#665c54" font-size="11">Convergent</text>

  <!-- Center label -->
  <text x="400" y="180" text-anchor="middle" fill="#504945" font-size="11">Two Paths</text>
</svg>