<svg xmlns="http://www.w3.org/2000/svg" width="800" height="140" viewBox="0 0 800 140">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="800" height="140" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="800" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="800" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="400" y="20" text-anchor="middle" fill="#928374" font-size="12">Gravitational Field Strength</text>

  <text y="50" font-size="12"><tspan x="20" fill="#ebdbb2">Structure: </tspan><tspan x="99.2" fill="#d3869b" font-weight="700">Architectural Engine</tspan><tspan x="243.2" fill="#928374">  →  Strong gravitational field</tspan></text>
  <text x="20" y="68" fill="#928374" font-size="12">                                  (scores are hard-earned)</text>
  <text y="104" font-size="12"><tspan x="20" fill="#ebdbb2">Structure: </tspan><tspan x="99.2" fill="#fb4934" font-weight="700">Unstructured</tspan><tspan x="185.60000000000002" fill="#928374">          →  Weak gravitational field</tspan></text>
  <text x="20" y="122" fill="#928374" font-size="12">                                  (scores come easily)</text>
</svg>