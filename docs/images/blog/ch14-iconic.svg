<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="800" height="450" fill="#282828"/>

  <!-- Civilization pyramid structure -->
  <!-- Foundation -->
  <rect x="200" y="330" width="400" height="40" rx="4" fill="#504945" opacity="0.5"/>
  <text x="400" y="356" text-anchor="middle" fill="#928374" font-size="12">Foundation — Code that Persists</text>

  <!-- Anchor layer -->
  <rect x="260" y="275" width="280" height="40" rx="4" fill="#458588" opacity="0.35"/>
  <circle cx="340" cy="295" r="12" fill="#83a598" opacity="0.8"/>
  <circle cx="460" cy="295" r="12" fill="#83a598" opacity="0.8"/>
  <text x="400" y="300" text-anchor="middle" fill="#ebdbb2" font-size="11">Anchor × 2</text>

  <!-- Architect layer -->
  <rect x="330" y="220" width="140" height="40" rx="4" fill="#b57614" opacity="0.35"/>
  <circle cx="400" cy="240" r="14" fill="#fabd2f" opacity="0.9"/>
  <text x="400" y="245" text-anchor="middle" fill="#282828" font-size="10" font-weight="700">A/B</text>

  <!-- Producer stars above -->
  <circle cx="310" cy="180" r="6" fill="#b8bb26" opacity="0.7"/>
  <circle cx="490" cy="180" r="6" fill="#b8bb26" opacity="0.7"/>
  <circle cx="360" cy="155" r="5" fill="#b8bb26" opacity="0.6"/>
  <circle cx="440" cy="155" r="5" fill="#b8bb26" opacity="0.6"/>
  <circle cx="400" cy="135" r="5" fill="#b8bb26" opacity="0.7"/>

  <!-- Gravity lines -->
  <line x1="400" y1="240" x2="310" y2="180" stroke="#fabd2f" stroke-width="0.8" opacity="0.35"/>
  <line x1="400" y1="240" x2="490" y2="180" stroke="#fabd2f" stroke-width="0.8" opacity="0.35"/>
  <line x1="400" y1="240" x2="360" y2="155" stroke="#fabd2f" stroke-width="0.8" opacity="0.35"/>
  <line x1="400" y1="240" x2="440" y2="155" stroke="#fabd2f" stroke-width="0.8" opacity="0.35"/>
  <line x1="400" y1="240" x2="400" y2="135" stroke="#fabd2f" stroke-width="0.8" opacity="0.35"/>

  <!-- Title -->
  <text x="400" y="80" text-anchor="middle" fill="#fabd2f" font-size="22" font-weight="700">Civilization</text>
  <text x="400" y="105" text-anchor="middle" fill="#928374" font-size="13">Structure that persists beyond time</text>

  <!-- Bottom quote -->
  <text x="400" y="420" text-anchor="middle" fill="#665c54" font-size="11">Architect + Anchor + Producer = Civilization</text>

  <!-- Sparkles -->
  <circle cx="150" cy="120" r="1" fill="#ebdbb2" opacity="0.3"/>
  <circle cx="650" cy="130" r="1" fill="#ebdbb2" opacity="0.3"/>
  <circle cx="180" cy="350" r="1" fill="#ebdbb2" opacity="0.2"/>
  <circle cx="620" cy="360" r="1" fill="#ebdbb2" opacity="0.2"/>
  <circle cx="700" cy="200" r="1" fill="#ebdbb2" opacity="0.2"/>
  <circle cx="100" cy="250" r="1" fill="#ebdbb2" opacity="0.2"/>
</svg>