<svg xmlns="http://www.w3.org/2000/svg" width="960" height="660" viewBox="0 0 960 660">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Noto+Sans+JP:wght@400;700;800&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
      .jp   { font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', -apple-system, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <rect width="960" height="660" rx="12" fill="#1d2021"/>
  <rect x="0" y="0" width="4" height="660" rx="2" fill="#d3869b"/>
  <text x="936" y="24" text-anchor="end" class="mono" fill="#504945" font-size="10">Role × Layer · ch4</text>

  <!-- Title -->
  <text x="480" y="46" text-anchor="middle" class="jp" fill="#ebdbb2" font-size="22" font-weight="800" letter-spacing="1.5">Role × Layer — 配置の相性</text>
  <text x="480" y="68" text-anchor="middle" class="jp" fill="#928374" font-size="12">同じ Role でも、配置するレイヤーで結果がまったく違う</text>

  <!-- Legend -->
  <text x="30" y="96" class="jp" fill="#7c6f64" font-size="10">Legend:</text>
  <text x="84" y="96" class="jp" fill="#b8bb26" font-size="11" font-weight="700">★ 本領</text>
  <text x="150" y="96" class="jp" fill="#fabd2f" font-size="11" font-weight="700">▲ 主力</text>
  <text x="214" y="96" class="jp" fill="#83a598" font-size="11" font-weight="700">● 寄与</text>
  <text x="278" y="96" class="jp" fill="#d3869b" font-size="11" font-weight="700">▽ 注意</text>
  <text x="344" y="96" class="jp" fill="#cc241d" font-size="11" font-weight="700">✕ 不可</text>

  <!-- Column Headers -->
  <rect x="244" y="110" width="224" height="32" rx="6" fill="#282828" stroke="#83a598" stroke-width="1"/>
  <text x="356" y="130" text-anchor="middle" class="jp" fill="#83a598" font-size="14" font-weight="800">実装層</text>
  <rect x="476" y="110" width="224" height="32" rx="6" fill="#282828" stroke="#d3869b" stroke-width="1"/>
  <text x="588" y="130" text-anchor="middle" class="jp" fill="#d3869b" font-size="14" font-weight="800">構造層</text>
  <rect x="708" y="110" width="224" height="32" rx="6" fill="#282828" stroke="#fabd2f" stroke-width="1"/>
  <text x="820" y="130" text-anchor="middle" class="jp" fill="#fabd2f" font-size="14" font-weight="800">原理層</text>

  <!-- ========= Row 1: Architect 継承型 ========= -->
  <rect x="20" y="156" width="216" height="60" rx="8" fill="#282828" stroke="#3c3836" stroke-width="1"/>
  <text x="36" y="178" class="jp" fill="#ebdbb2" font-size="14" font-weight="800">Architect</text>
  <text x="36" y="196" class="jp" fill="#928374" font-size="11">継承型（Inheritance）</text>
  <text x="36" y="210" class="jp" fill="#7c6f64" font-size="10">設計を他者が継承</text>

  <!-- Impl: moderate -->
  <g>
    <rect x="244" y="156" width="224" height="60" rx="8" fill="#282828" stroke="#83a598" stroke-width="1"/>
    <text x="258" y="176" class="jp" fill="#83a598" font-size="12" font-weight="700">●  寄与</text>
    <text x="258" y="196" class="jp" fill="#ebdbb2" font-size="11">設計をコードに</text>
    <text x="258" y="210" class="jp" fill="#928374" font-size="10">直接残す</text>
  </g>
  <!-- Structure: strong -->
  <g>
    <rect x="476" y="156" width="224" height="60" rx="8" fill="#282828" stroke="#b8bb26" stroke-width="2"/>
    <text x="490" y="176" class="jp" fill="#b8bb26" font-size="12" font-weight="800">★  本領</text>
    <text x="490" y="196" class="jp" fill="#ebdbb2" font-size="11">最も力を発揮</text>
    <text x="490" y="210" class="jp" fill="#928374" font-size="10">設計が他者のコードに継承</text>
  </g>
  <!-- Principle: good -->
  <g>
    <rect x="708" y="156" width="224" height="60" rx="8" fill="#282828" stroke="#fabd2f" stroke-width="1.5"/>
    <text x="722" y="176" class="jp" fill="#fabd2f" font-size="12" font-weight="700">▲  主力</text>
    <text x="722" y="196" class="jp" fill="#ebdbb2" font-size="11">戦略との接続を担う</text>
    <text x="722" y="210" class="jp" fill="#928374" font-size="10">少数精鋭</text>
  </g>

  <!-- ========= Row 2: Architect 創発型 ========= -->
  <rect x="20" y="224" width="216" height="60" rx="8" fill="#282828" stroke="#3c3836" stroke-width="1"/>
  <text x="36" y="246" class="jp" fill="#ebdbb2" font-size="14" font-weight="800">Architect</text>
  <text x="36" y="264" class="jp" fill="#928374" font-size="11">創発型（Emergent）</text>
  <text x="36" y="278" class="jp" fill="#7c6f64" font-size="10">新しい方向性を探索</text>

  <g>
    <rect x="244" y="224" width="224" height="60" rx="8" fill="#282828" stroke="#83a598" stroke-width="1"/>
    <text x="258" y="244" class="jp" fill="#83a598" font-size="12" font-weight="700">●  寄与</text>
    <text x="258" y="264" class="jp" fill="#ebdbb2" font-size="11">既存を破る試行を回す</text>
    <text x="258" y="278" class="jp" fill="#928374" font-size="10">探索的な実装</text>
  </g>
  <g>
    <rect x="476" y="224" width="224" height="60" rx="8" fill="#282828" stroke="#fabd2f" stroke-width="1.5"/>
    <text x="490" y="244" class="jp" fill="#fabd2f" font-size="12" font-weight="700">▲  主力</text>
    <text x="490" y="264" class="jp" fill="#ebdbb2" font-size="11">新しい構造提案を</text>
    <text x="490" y="278" class="jp" fill="#928374" font-size="10">落とし込む</text>
  </g>
  <g>
    <rect x="708" y="224" width="224" height="60" rx="8" fill="#282828" stroke="#fabd2f" stroke-width="1.5"/>
    <text x="722" y="244" class="jp" fill="#fabd2f" font-size="12" font-weight="700">▲  主力</text>
    <text x="722" y="264" class="jp" fill="#ebdbb2" font-size="11">新規事業・R&amp;D で</text>
    <text x="722" y="278" class="jp" fill="#928374" font-size="10">世界観を提示</text>
  </g>

  <!-- ========= Row 3: Anchor ========= -->
  <rect x="20" y="292" width="216" height="60" rx="8" fill="#282828" stroke="#3c3836" stroke-width="1"/>
  <text x="36" y="314" class="jp" fill="#ebdbb2" font-size="14" font-weight="800">Anchor</text>
  <text x="36" y="332" class="jp" fill="#928374" font-size="11">品質で骨格を守る</text>
  <text x="36" y="346" class="jp" fill="#7c6f64" font-size="10">構造 ↔ 実装 を跨ぐ</text>

  <g>
    <rect x="244" y="292" width="224" height="60" rx="8" fill="#282828" stroke="#b8bb26" stroke-width="2"/>
    <text x="258" y="312" class="jp" fill="#b8bb26" font-size="12" font-weight="800">★  本領</text>
    <text x="258" y="332" class="jp" fill="#ebdbb2" font-size="11">コードの骨格を守る</text>
    <text x="258" y="346" class="jp" fill="#928374" font-size="10">手を動かし続ける</text>
  </g>
  <g>
    <rect x="476" y="292" width="224" height="60" rx="8" fill="#282828" stroke="#83a598" stroke-width="1"/>
    <text x="490" y="312" class="jp" fill="#83a598" font-size="12" font-weight="700">●  寄与</text>
    <text x="490" y="332" class="jp" fill="#ebdbb2" font-size="11">設計レビュー・品質ガード</text>
    <text x="490" y="346" class="jp" fill="#928374" font-size="10">※ コードから切り離すと本領が消える</text>
  </g>
  <g>
    <rect x="708" y="292" width="224" height="60" rx="8" fill="#282828" stroke="#d3869b" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="722" y="312" class="jp" fill="#d3869b" font-size="12" font-weight="700">▽  注意</text>
    <text x="722" y="332" class="jp" fill="#ebdbb2" font-size="11">過剰適応の懸念</text>
    <text x="722" y="346" class="jp" fill="#928374" font-size="10">適合しすぎて硬直化する</text>
  </g>

  <!-- ========= Row 4: Cleaner ========= -->
  <rect x="20" y="360" width="216" height="60" rx="8" fill="#282828" stroke="#3c3836" stroke-width="1"/>
  <text x="36" y="382" class="jp" fill="#ebdbb2" font-size="14" font-weight="800">Cleaner</text>
  <text x="36" y="400" class="jp" fill="#928374" font-size="11">負債を清掃</text>
  <text x="36" y="414" class="jp" fill="#7c6f64" font-size="10">他者の負債も再生</text>

  <g>
    <rect x="244" y="360" width="224" height="60" rx="8" fill="#282828" stroke="#b8bb26" stroke-width="2"/>
    <text x="258" y="380" class="jp" fill="#b8bb26" font-size="12" font-weight="800">★  本領</text>
    <text x="258" y="400" class="jp" fill="#ebdbb2" font-size="11">負債を清掃</text>
    <text x="258" y="414" class="jp" fill="#928374" font-size="10">書き直しで構造を回復</text>
  </g>
  <g>
    <rect x="476" y="360" width="224" height="60" rx="8" fill="#282828" stroke="#83a598" stroke-width="1"/>
    <text x="490" y="380" class="jp" fill="#83a598" font-size="12" font-weight="700">●  寄与</text>
    <text x="490" y="400" class="jp" fill="#ebdbb2" font-size="11">仕組みでの清掃を設計</text>
    <text x="490" y="414" class="jp" fill="#928374" font-size="10">レビュー基準・規約</text>
  </g>
  <g>
    <rect x="708" y="360" width="224" height="60" rx="8" fill="#282828" stroke="#cc241d" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="722" y="380" class="jp" fill="#cc241d" font-size="12" font-weight="700">✕  不可</text>
    <text x="722" y="400" class="jp" fill="#ebdbb2" font-size="11">具体物がない</text>
    <text x="722" y="414" class="jp" fill="#928374" font-size="10">清掃対象が存在しない</text>
  </g>

  <!-- ========= Row 5: Producer ========= -->
  <rect x="20" y="428" width="216" height="60" rx="8" fill="#282828" stroke="#3c3836" stroke-width="1"/>
  <text x="36" y="450" class="jp" fill="#ebdbb2" font-size="14" font-weight="800">Producer</text>
  <text x="36" y="468" class="jp" fill="#928374" font-size="11">速度で前に出す</text>
  <text x="36" y="482" class="jp" fill="#7c6f64" font-size="10">量を稼ぐ</text>

  <g>
    <rect x="244" y="428" width="224" height="60" rx="8" fill="#282828" stroke="#b8bb26" stroke-width="2"/>
    <text x="258" y="448" class="jp" fill="#b8bb26" font-size="12" font-weight="800">★  本領</text>
    <text x="258" y="468" class="jp" fill="#ebdbb2" font-size="11">速度で前に出す</text>
    <text x="258" y="482" class="jp" fill="#928374" font-size="10">機能をシップする</text>
  </g>
  <g>
    <rect x="476" y="428" width="224" height="60" rx="8" fill="#282828" stroke="#d3869b" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="490" y="448" class="jp" fill="#d3869b" font-size="12" font-weight="700">▽  注意</text>
    <text x="490" y="468" class="jp" fill="#ebdbb2" font-size="11">単発の Producer は空転</text>
    <text x="490" y="482" class="jp" fill="#928374" font-size="10">設計議論で消耗する</text>
  </g>
  <g>
    <rect x="708" y="428" width="224" height="60" rx="8" fill="#282828" stroke="#cc241d" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="722" y="448" class="jp" fill="#cc241d" font-size="12" font-weight="700">✕  不可</text>
    <text x="722" y="468" class="jp" fill="#ebdbb2" font-size="11">空転する</text>
    <text x="722" y="482" class="jp" fill="#928374" font-size="10">判断軸の粒度が合わない</text>
  </g>

  <!-- ========= Row 6: Specialist ========= -->
  <rect x="20" y="496" width="216" height="60" rx="8" fill="#282828" stroke="#3c3836" stroke-width="1"/>
  <text x="36" y="518" class="jp" fill="#ebdbb2" font-size="14" font-weight="800">Specialist</text>
  <text x="36" y="536" class="jp" fill="#928374" font-size="11">領域で深く貢献</text>
  <text x="36" y="550" class="jp" fill="#7c6f64" font-size="10">該当領域内のみ</text>

  <g>
    <rect x="244" y="496" width="224" height="60" rx="8" fill="#282828" stroke="#fabd2f" stroke-width="1.5"/>
    <text x="258" y="516" class="jp" fill="#fabd2f" font-size="12" font-weight="700">▲  主力</text>
    <text x="258" y="536" class="jp" fill="#ebdbb2" font-size="11">該当領域の実装で深く</text>
    <text x="258" y="550" class="jp" fill="#928374" font-size="10">深い技術貢献</text>
  </g>
  <g>
    <rect x="476" y="496" width="224" height="60" rx="8" fill="#282828" stroke="#fabd2f" stroke-width="1.5"/>
    <text x="490" y="516" class="jp" fill="#fabd2f" font-size="12" font-weight="700">▲  主力</text>
    <text x="490" y="536" class="jp" fill="#ebdbb2" font-size="11">該当領域の設計で深く</text>
    <text x="490" y="550" class="jp" fill="#928374" font-size="10">仕様・API 設計</text>
  </g>
  <g>
    <rect x="708" y="496" width="224" height="60" rx="8" fill="#282828" stroke="#83a598" stroke-width="1"/>
    <text x="722" y="516" class="jp" fill="#83a598" font-size="12" font-weight="700">●  条件付き</text>
    <text x="722" y="536" class="jp" fill="#ebdbb2" font-size="11">原理層と直結時のみ</text>
    <text x="722" y="550" class="jp" fill="#928374" font-size="10">領域が戦略の根幹なら</text>
  </g>

  <!-- Footer -->
  <text x="480" y="600" text-anchor="middle" class="jp" fill="#a89984" font-size="12">Role 単独では配置の良し悪しが決まらない。Role × Layer のセットで初めて「合っている／ずれている」が言える。</text>
  <text x="480" y="620" text-anchor="middle" class="jp" fill="#928374" font-size="11">さらに「どの変換を担えるか」まで重ねて、配置設計は完成する。</text>
  <text x="480" y="640" text-anchor="middle" class="jp" fill="#7c6f64" font-size="10">人を変えるのではなく、配置を変える — これがレイヤー設計が組織論で有効な理由。</text>
</svg>
