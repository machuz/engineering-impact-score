<svg xmlns="http://www.w3.org/2000/svg" width="620" height="172" viewBox="0 0 620 172">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Card background -->
  <rect width="620" height="172" rx="8" fill="#1d2021"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="172" rx="2" fill="#83a598"/>

  <!-- Category label -->
  <text x="592" y="18" text-anchor="end" fill="#504945" font-size="10">Model</text>

  <text y="28" font-size="12"><tspan x="24" fill="#ebdbb2">  Design Layer        </tspan><tspan x="182.39999999999998" fill="#d3869b" font-weight="700">Architect</tspan></text>
  <text y="46" font-size="12"><tspan x="24" fill="#ebdbb2">                      </tspan><tspan x="182.39999999999998" fill="#928374">↑ Design decisions embedded in code</tspan></text>
  <text x="24" y="64" fill="#504945" font-size="12">  ──────────────────────────────────</text>
  <text y="82" font-size="12"><tspan x="24" fill="#ebdbb2">  Stabilization Layer </tspan><tspan x="182.39999999999998" fill="#83a598" font-weight="700">Anchor</tspan><tspan x="225.59999999999997" fill="#928374"> / </tspan><tspan x="247.19999999999996" fill="#8ec07c" font-weight="700">Cleaner</tspan></text>
  <text y="100" font-size="12"><tspan x="24" fill="#ebdbb2">                      </tspan><tspan x="182.39999999999998" fill="#928374">↑ Quality rises, code survives</tspan></text>
  <text x="24" y="118" fill="#504945" font-size="12">  ──────────────────────────────────</text>
  <text y="136" font-size="12"><tspan x="24" fill="#ebdbb2">  Implementation Layer </tspan><tspan x="189.6" fill="#fabd2f" font-weight="700">Producer</tspan><tspan x="247.2" fill="#928374"> / </tspan><tspan x="268.8" fill="#83a598" font-weight="700">Growing</tspan></text>
  <text y="154" font-size="12"><tspan x="24" fill="#ebdbb2">                       </tspan><tspan x="189.6" fill="#928374">Write code. Ship it.</tspan></text>
</svg>