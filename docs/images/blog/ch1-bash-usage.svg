<svg xmlns="http://www.w3.org/2000/svg" width="580" height="192" viewBox="0 0 580 192">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Card background -->
  <rect width="580" height="192" rx="8" fill="#1d2021"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="192" rx="2" fill="#fe8019"/>

  <!-- Category label -->
  <text x="552" y="18" text-anchor="end" fill="#504945" font-size="10">Bash</text>

  <text x="24" y="28" fill="#928374" font-size="12"># Analyze current repo</text>
  <text y="46" font-size="12"><tspan x="24" fill="#b8bb26">eis</tspan><tspan x="45.599999999999994" fill="#ebdbb2"> analyze .</tspan></text>
  <text x="24" y="82" fill="#928374" font-size="12"># Auto-discover repos under a directory</text>
  <text y="100" font-size="12"><tspan x="24" fill="#b8bb26">eis</tspan><tspan x="45.599999999999994" fill="#ebdbb2"> analyze --recursive ~/projects</tspan></text>
  <text x="24" y="136" fill="#928374" font-size="12"># With config</text>
  <text y="154" font-size="12"><tspan x="24" fill="#b8bb26">eis</tspan><tspan x="45.599999999999994" fill="#ebdbb2"> analyze --config eis.yaml --recursive ~/projects</tspan></text>
</svg>