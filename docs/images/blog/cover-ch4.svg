<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="1000" height="420" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="1000" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="1000" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="500" y="20" text-anchor="middle" fill="#928374" font-size="12">Engineering Impact Score — Chapter 4</text>

  <!-- Left side: Text content -->
  <text x="30" y="75" fill="#928374" font-size="12">Chapter 4</text>
  <text x="30" y="115" fill="#fabd2f" font-size="24" font-weight="700">Backend Architects</text>
  <text x="30" y="148" fill="#fabd2f" font-size="24" font-weight="700">Converge</text>
  <text x="30" y="178" fill="#928374" font-size="14">The Sacred Work of Laying Souls to Rest</text>

  <!-- Left side: Convergence timeline -->
  <text x="30" y="220" fill="#8ec07c" font-size="11" font-weight="700">Backend Architect Concentration</text>
  <text y="244" font-size="11"><tspan x="30" fill="#928374">2024-H1 </tspan><tspan fill="#d3869b">*</tspan><tspan fill="#83a598"> Engineer F </tspan><tspan fill="#928374">machuz</tspan></text>
  <text y="264" font-size="11"><tspan x="30" fill="#928374">2024-H2 </tspan><tspan fill="#d3869b">*</tspan><tspan fill="#83a598"> Engineer F </tspan><tspan fill="#83a598">machuz (Builder)</tspan></text>
  <text y="284" font-size="11"><tspan x="30" fill="#928374">2025-H1 </tspan><tspan fill="#83a598">.</tspan><tspan fill="#fabd2f"> Engineer F </tspan><tspan fill="#928374">machuz</tspan></text>
  <text y="304" font-size="11"><tspan x="30" fill="#928374">2025-H2 </tspan><tspan fill="#928374">.</tspan><tspan fill="#928374"> Engineer F </tspan><tspan fill="#d3869b" font-weight="700">machuz (Architect)</tspan></text>

  <!-- Bottom -->
  <text x="30" y="350" fill="#928374" font-size="11">The seat converges to one. Always.</text>

  <!-- Right side: Large chapter number -->

  <!-- Right side: Convergence lines -->
  <g opacity="0.9">
    <!-- Multiple starting points -->
    <circle cx="600" cy="80" r="6" fill="#83a598" opacity="0.6"/>
    <circle cx="670" cy="90" r="6" fill="#b8bb26" opacity="0.7"/>
    <circle cx="740" cy="75" r="6" fill="#fabd2f" opacity="0.8"/>
    <circle cx="810" cy="85" r="6" fill="#8ec07c" opacity="0.8"/>
    <circle cx="880" cy="80" r="6" fill="#b8bb26" opacity="0.7"/>
    <circle cx="940" cy="90" r="6" fill="#83a598" opacity="0.6"/>

    <!-- Convergence lines to single point -->
    <line x1="600" y1="86" x2="760" y2="310" stroke="#d3869b" stroke-width="1.5" opacity="0.4"/>
    <line x1="670" y1="96" x2="760" y2="310" stroke="#d3869b" stroke-width="1.5" opacity="0.5"/>
    <line x1="740" y1="81" x2="760" y2="310" stroke="#d3869b" stroke-width="1.5" opacity="0.6"/>
    <line x1="810" y1="91" x2="760" y2="310" stroke="#d3869b" stroke-width="1.5" opacity="0.7"/>
    <line x1="880" y1="86" x2="760" y2="310" stroke="#d3869b" stroke-width="1.5" opacity="0.5"/>
    <line x1="940" y1="96" x2="760" y2="310" stroke="#d3869b" stroke-width="1.5" opacity="0.4"/>

    <!-- Convergence point -->
    <circle cx="760" cy="310" r="14" fill="#d3869b" opacity="0.9"/>
    <circle cx="760" cy="310" r="22" fill="none" stroke="#d3869b" stroke-width="1.5" opacity="0.4"/>
    <text x="760" y="355" text-anchor="middle" fill="#d3869b" font-size="10">Convergence</text>

    <!-- Glow effect -->
    <circle cx="760" cy="310" r="35" fill="none" stroke="#d3869b" stroke-width="1" opacity="0.2"/>
  </g>
</svg>