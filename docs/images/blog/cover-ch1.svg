<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="1000" height="420" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="1000" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="1000" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="500" y="20" text-anchor="middle" fill="#928374" font-size="12">Engineering Impact Score — Chapter 1</text>

  <!-- Left side: Text content -->
  <text x="30" y="75" fill="#928374" font-size="12">Chapter 1</text>
  <text x="30" y="115" fill="#fabd2f" font-size="24" font-weight="700">Measuring Engineering</text>
  <text x="30" y="148" fill="#fabd2f" font-size="24" font-weight="700">Impact</text>
  <text x="30" y="178" fill="#928374" font-size="14">from Git History Alone</text>

  <!-- Left side: 7-axis mini preview -->
  <text x="30" y="220" fill="#8ec07c" font-size="11" font-weight="700">7-Axis Scoring Model</text>
  <text y="244" font-size="11"><tspan x="30" fill="#ebdbb2">Production    </tspan><tspan fill="#b8bb26">████████░░</tspan><tspan fill="#b8bb26" font-weight="700"> 75</tspan></text>
  <text y="260" font-size="11"><tspan x="30" fill="#ebdbb2">Quality       </tspan><tspan fill="#b8bb26">██████░░░░</tspan><tspan fill="#b8bb26" font-weight="700"> 64</tspan></text>
  <text y="276" font-size="11"><tspan x="30" fill="#ebdbb2">Survival      </tspan><tspan fill="#d3869b">██████████</tspan><tspan fill="#d3869b" font-weight="700"> 100</tspan></text>
  <text y="292" font-size="11"><tspan x="30" fill="#ebdbb2">Design        </tspan><tspan fill="#d3869b">█████████░</tspan><tspan fill="#d3869b" font-weight="700"> 85</tspan></text>
  <text y="308" font-size="11"><tspan x="30" fill="#ebdbb2">Breadth       </tspan><tspan fill="#b8bb26">██████░░░░</tspan><tspan fill="#b8bb26" font-weight="700"> 60</tspan></text>
  <text y="324" font-size="11"><tspan x="30" fill="#ebdbb2">Debt          </tspan><tspan fill="#b8bb26">████████░░</tspan><tspan fill="#b8bb26" font-weight="700"> 78</tspan></text>
  <text y="340" font-size="11"><tspan x="30" fill="#ebdbb2">Indispensable </tspan><tspan fill="#fabd2f">████░░░░░░</tspan><tspan fill="#fabd2f" font-weight="700"> 43</tspan></text>

  <!-- Bottom prompt -->
  <text x="30" y="390" fill="#8ec07c" font-size="12">$ eis score --author engineer-a</text>
  <rect x="310" y="378" width="7" height="14" fill="#ebdbb2" opacity="0.7"/>

  <!-- Right side: Large chapter number -->

  <!-- Right side: 7-axis score bars (decorative) -->
  <g opacity="0.9">
    <!-- Vertical bars representing 7 axes -->
    <rect x="580" y="160" width="28" height="180" rx="3" fill="#3c3836"/>
    <rect x="580" y="205" width="28" height="135" rx="3" fill="#b8bb26" opacity="0.8"/>

    <rect x="620" y="160" width="28" height="180" rx="3" fill="#3c3836"/>
    <rect x="620" y="225" width="28" height="115" rx="3" fill="#b8bb26" opacity="0.8"/>

    <rect x="660" y="160" width="28" height="180" rx="3" fill="#3c3836"/>
    <rect x="660" y="160" width="28" height="180" rx="3" fill="#d3869b" opacity="0.8"/>

    <rect x="700" y="160" width="28" height="180" rx="3" fill="#3c3836"/>
    <rect x="700" y="187" width="28" height="153" rx="3" fill="#d3869b" opacity="0.8"/>

    <rect x="740" y="160" width="28" height="180" rx="3" fill="#3c3836"/>
    <rect x="740" y="232" width="28" height="108" rx="3" fill="#b8bb26" opacity="0.8"/>

    <rect x="780" y="160" width="28" height="180" rx="3" fill="#3c3836"/>
    <rect x="780" y="200" width="28" height="140" rx="3" fill="#b8bb26" opacity="0.8"/>

    <rect x="820" y="160" width="28" height="180" rx="3" fill="#3c3836"/>
    <rect x="820" y="262" width="28" height="78" rx="3" fill="#fabd2f" opacity="0.8"/>

    <!-- Axis labels -->
    <text x="594" y="355" text-anchor="middle" fill="#665c54" font-size="9">P</text>
    <text x="634" y="355" text-anchor="middle" fill="#665c54" font-size="9">Q</text>
    <text x="674" y="355" text-anchor="middle" fill="#665c54" font-size="9">S</text>
    <text x="714" y="355" text-anchor="middle" fill="#665c54" font-size="9">D</text>
    <text x="754" y="355" text-anchor="middle" fill="#665c54" font-size="9">B</text>
    <text x="794" y="355" text-anchor="middle" fill="#665c54" font-size="9">Dt</text>
    <text x="834" y="355" text-anchor="middle" fill="#665c54" font-size="9">I</text>
  </g>

  <!-- Decorative glow dots -->
  <circle cx="594" cy="200" r="3" fill="#b8bb26" opacity="0.6"/>
  <circle cx="674" cy="155" r="3" fill="#d3869b" opacity="0.6"/>
  <circle cx="834" cy="258" r="3" fill="#fabd2f" opacity="0.6"/>
</svg>