<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <clipPath id="lens-ol">
      <circle cx="256" cy="256" r="236"/>
    </clipPath>
    <radialGradient id="glow-ol" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dca890" stop-opacity="0.95"/>
      <stop offset="5%" stop-color="#c4886c" stop-opacity="0.7"/>
      <stop offset="15%" stop-color="#a87460" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#8c5c4c" stop-opacity="0.1"/>
      <stop offset="55%" stop-color="#5c3c34" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0f1420" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer aperture ring (no fill — transparent) -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#3c3836" stroke-width="4" opacity="0.55"/>
  <g stroke="#665c54" stroke-width="2" opacity="0.5">
    <line x1="256" y1="8" x2="256" y2="28"/>
    <line x1="504" y1="256" x2="484" y2="256"/>
    <line x1="256" y1="504" x2="256" y2="484"/>
    <line x1="8" y1="256" x2="28" y2="256"/>
    <line x1="385" y1="42" x2="378" y2="54"/>
    <line x1="470" y1="127" x2="458" y2="134"/>
    <line x1="470" y1="385" x2="458" y2="378"/>
    <line x1="385" y1="470" x2="378" y2="458"/>
    <line x1="127" y1="470" x2="134" y2="458"/>
    <line x1="42" y1="385" x2="54" y2="378"/>
    <line x1="42" y1="127" x2="54" y2="134"/>
    <line x1="127" y1="42" x2="134" y2="54"/>
  </g>

  <g clip-path="url(#lens-ol)">
    <!-- Crosshair -->
    <line x1="256" y1="30" x2="256" y2="482" stroke="#a87460" stroke-width="0.7" opacity="0.2"/>
    <line x1="30" y1="256" x2="482" y2="256" stroke="#a87460" stroke-width="0.7" opacity="0.2"/>

    <!-- Concentric rings -->
    <circle cx="256" cy="256" r="155" fill="none" stroke="#a87460" stroke-width="1.0" opacity="0.35"/>
    <circle cx="256" cy="256" r="95" fill="none" stroke="#c4886c" stroke-width="1.1" opacity="0.55"/>

    <!-- true: comet trail -->
    <path d="M131 389 Q173 339 200 298 Q228 256 256 256" fill="none" stroke="#c4886c" stroke-width="3.3" opacity="0.45" stroke-linecap="round"/>
    <path d="M131 389 Q173 339 200 298 Q228 256 256 256" fill="none" stroke="#c4886c" stroke-width="8" opacity="0.1" stroke-linecap="round"/>
    <circle cx="139" cy="381" r="2.2" fill="#c4886c" opacity="0.2"/>
    <circle cx="153" cy="362" r="2.2" fill="#c4886c" opacity="0.28"/>
    <circle cx="167" cy="339" r="2.8" fill="#c4886c" opacity="0.3"/>
    <circle cx="181" cy="317" r="2.8" fill="#c4886c" opacity="0.35"/>
    <circle cx="195" cy="298" r="2.8" fill="#c4886c" opacity="0.4"/>
    <circle cx="212" cy="278" r="3.3" fill="#c4886c" opacity="0.45"/>
    <circle cx="228" cy="264" r="3.3" fill="#dca890" opacity="0.55"/>
    <circle cx="242" cy="259" r="3.3" fill="#dca890" opacity="0.7"/>
    <path d="M389 131 Q339 173 306 228 Q267 244 267 250" fill="none" stroke="#c4886c" stroke-width="1.6" opacity="0.35" stroke-dasharray="5.5 8" stroke-linecap="round"/>

    <!-- ideal: waypoint -->
    <path d="M256 173 L245 206 L256 195 L267 206 Z" fill="#c4886c" opacity="0.55"/>
    <circle cx="256" cy="145" r="4.2" fill="#c4886c" opacity="0.65"/>
    <circle cx="312" cy="187" r="3.3" fill="#c4886c" opacity="0.5"/>
    <circle cx="339" cy="242" r="3.3" fill="#c4886c" opacity="0.42"/>
    <circle cx="325" cy="312" r="3.3" fill="#c4886c" opacity="0.3"/>
    <path d="M256 145 Q312 148 312 187 Q325 214 339 242 Q345 278 325 312" fill="none" stroke="#c4886c" stroke-width="2.2" opacity="0.38" stroke-dasharray="5.5,5.5"/>

    <!-- Moon glow (gradient fades to transparent) -->
    <circle cx="256" cy="256" r="210" fill="url(#glow-ol)"/>

    <!-- Moon core (the bright "ace" center) -->
    <circle cx="256" cy="256" r="50" fill="#8c5c4c" opacity="0.25"/>
    <circle cx="256" cy="256" r="32" fill="#a87460" opacity="0.45"/>
    <circle cx="256" cy="256" r="16" fill="#c4886c" opacity="0.8"/>
    <circle cx="256" cy="256" r="6" fill="#dca890" opacity="1"/>
  </g>
</svg>
