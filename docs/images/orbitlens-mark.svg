<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- OrbitLens brand mark — transparent, single color, stroke=currentColor friendly -->
  <g fill="#ebdbb2" stroke="#ebdbb2">
    <!-- Outer ring with tick marks -->
    <circle cx="256" cy="256" r="220" fill="none" stroke-width="2.5"/>

    <!-- 12 tick marks -->
    <g stroke-width="2">
      <line x1="256" y1="36" x2="256" y2="56"/>
      <line x1="476" y1="256" x2="456" y2="256"/>
      <line x1="256" y1="476" x2="256" y2="456"/>
      <line x1="36" y1="256" x2="56" y2="256"/>
      <line x1="366" y1="63" x2="360" y2="74"/>
      <line x1="449" y1="146" x2="438" y2="152"/>
      <line x1="449" y1="366" x2="438" y2="360"/>
      <line x1="366" y1="449" x2="360" y2="438"/>
      <line x1="146" y1="449" x2="152" y2="438"/>
      <line x1="63" y1="366" x2="74" y2="360"/>
      <line x1="63" y1="146" x2="74" y2="152"/>
      <line x1="146" y1="63" x2="152" y2="74"/>
    </g>

    <!-- Inner concentric rings -->
    <circle cx="256" cy="256" r="155" fill="none" stroke-width="1.5"/>
    <circle cx="256" cy="256" r="95" fill="none" stroke-width="1.5"/>

    <!-- Crosshair -->
    <line x1="256" y1="60" x2="256" y2="452" stroke-width="1.2"/>
    <line x1="60" y1="256" x2="452" y2="256" stroke-width="1.2"/>

    <!-- Center anchor -->
    <circle cx="256" cy="256" r="14"/>

    <!-- Trail -->
    <path d="M131 389 Q173 339 200 298 Q228 256 256 256" fill="none" stroke-width="3" stroke-linecap="round"/>
    <circle cx="145" cy="370" r="2.5"/>
    <circle cx="167" cy="339" r="3"/>
    <circle cx="190" cy="305" r="3"/>
    <circle cx="215" cy="275" r="3.5"/>
    <circle cx="240" cy="260" r="3.5"/>
    <path d="M389 131 Q339 173 306 228 Q267 244 267 250" fill="none" stroke-width="1.5" stroke-dasharray="5.5,8" stroke-linecap="round"/>

    <!-- Waypoint + arrow -->
    <path d="M256 160 L242 200 L256 188 L270 200 Z"/>
    <circle cx="256" cy="140" r="5"/>
    <circle cx="312" cy="187" r="3.5"/>
    <circle cx="339" cy="242" r="3.5"/>
    <circle cx="325" cy="312" r="3.5"/>
    <path d="M256 140 Q312 143 312 187 Q325 214 339 242 Q345 278 325 312" fill="none" stroke-width="2.2" stroke-dasharray="5.5,5.5"/>
  </g>
</svg>
