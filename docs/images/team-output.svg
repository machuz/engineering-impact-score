      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; font-size: 12px; }
      .header { fill: #56b6c2; font-weight: 700; }
      .label { fill: #abb2bf; }
      .value { fill: #abb2bf; }
      .highlight { fill: #e5c07b; font-weight: 700; }
      .type { fill: #61afef; }
      .conf { fill: #5c6370; }
      .domain-title { fill: #e06c75; font-weight: 700; font-size: 15px; }
      .character { fill: #c678dd; font-weight: 700; font-size: 15px; }
      .section { fill: #56b6c2; font-weight: 700; font-size: 13px; }
      .bar-fill { fill: #61afef; }
      .bar-bg { fill: #3e4451; }
      .bar-good { fill: #98c379; }
      .bar-warn { fill: #e5c07b; }
      .bar-bad { fill: #e06c75; }
      .summary { fill: #5c6370; font-size: 12px; }
      .prompt { fill: #98c379; font-size: 13px; }
      .cmd { fill: #abb2bf; font-size: 13px; }
      .dim { fill: #5c6370; }
      .aar-healthy { fill: #98c379; font-weight: 700; }
      .aar-warn { fill: #e5c07b; }
    </style>
  </defs>

  <!-- Terminal background -->
