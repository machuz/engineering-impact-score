<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
      .title { font-size: 16px; font-weight: 700; }
      .box-label { font-size: 13px; font-weight: 700; }
      .box-desc { font-size: 10px; }
      .arrow-text { font-size: 10px; }
      .mapping { font-size: 10px; font-style: italic; }
    </style>

    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#5c6370"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#56b6c2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="10" fill="#282c34"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" class="title" fill="#abb2bf">Code → Engineer → Team: Bottom-Up Structure Discovery</text>
  <text x="450" y="54" text-anchor="middle" class="box-desc" fill="#5c6370">コード → エンジニア → 構造を逆算する</text>

  <!-- ========== Layer 1: Raw Data ========== -->
  <rect x="30" y="80" width="140" height="56" rx="6" fill="#3e4451" stroke="#5c6370" stroke-width="1"/>
  <text x="100" y="104" text-anchor="middle" class="box-label" fill="#e06c75">git log</text>
  <text x="100" y="120" text-anchor="middle" class="box-desc" fill="#5c6370">commits, diffs</text>

  <rect x="200" y="80" width="140" height="56" rx="6" fill="#3e4451" stroke="#5c6370" stroke-width="1"/>
  <text x="270" y="104" text-anchor="middle" class="box-label" fill="#e06c75">git blame</text>
  <text x="270" y="120" text-anchor="middle" class="box-desc" fill="#5c6370">surviving lines</text>

  <!-- Arrows from raw to 7-axis -->
  <line x1="100" y1="136" x2="300" y2="168" stroke="#5c6370" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="270" y1="136" x2="300" y2="168" stroke="#5c6370" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ========== Layer 2: Individual 7-axis ========== -->
  <rect x="200" y="168" width="220" height="56" rx="6" fill="#2c313a" stroke="#61afef" stroke-width="1.5"/>
  <text x="310" y="192" text-anchor="middle" class="box-label" fill="#61afef">7-Axis Individual Score</text>
  <text x="310" y="208" text-anchor="middle" class="box-desc" fill="#5c6370">Prod · Qual · Surv · Design · Breadth · Debt · Indisp</text>

  <!-- Arrow to 3-axis -->
  <line x1="310" y1="224" x2="310" y2="260" stroke="#5c6370" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ========== Layer 3: Individual 3-axis topology ========== -->
  <rect x="100" y="260" width="130" height="50" rx="6" fill="#2c313a" stroke="#e5c07b" stroke-width="1.5"/>
  <text x="165" y="282" text-anchor="middle" class="box-label" fill="#e5c07b">Role</text>
  <text x="165" y="296" text-anchor="middle" class="box-desc" fill="#5c6370">Architect, Anchor...</text>

  <rect x="245" y="260" width="130" height="50" rx="6" fill="#2c313a" stroke="#e5c07b" stroke-width="1.5"/>
  <text x="310" y="282" text-anchor="middle" class="box-label" fill="#e5c07b">Style</text>
  <text x="310" y="296" text-anchor="middle" class="box-desc" fill="#5c6370">Builder, Mass...</text>

  <rect x="390" y="260" width="130" height="50" rx="6" fill="#2c313a" stroke="#e5c07b" stroke-width="1.5"/>
  <text x="455" y="282" text-anchor="middle" class="box-label" fill="#e5c07b">State</text>
  <text x="455" y="296" text-anchor="middle" class="box-desc" fill="#5c6370">Active, Growing...</text>

  <!-- Gravity branch -->
  <rect x="570" y="168" width="160" height="56" rx="6" fill="#2c313a" stroke="#98c379" stroke-width="1.5"/>
  <text x="650" y="192" text-anchor="middle" class="box-label" fill="#98c379">Gravity</text>
  <text x="650" y="208" text-anchor="middle" class="box-desc" fill="#5c6370">Structural Influence</text>
  <line x1="420" y1="196" x2="568" y2="196" stroke="#5c6370" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="490" y="190" class="mapping" fill="#5c6370">Indisp × 0.4</text>
  <text x="490" y="202" class="mapping" fill="#5c6370">+ Breadth × 0.3</text>
  <text x="490" y="214" class="mapping" fill="#5c6370">+ Design × 0.3</text>

  <!-- ========== Weighted aggregation arrows ========== -->
  <!-- Role → Structure -->
  <line x1="165" y1="310" x2="165" y2="378" stroke="#56b6c2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="88" y="348" class="mapping" fill="#56b6c2">weighted by</text>
  <text x="88" y="360" class="mapping" fill="#56b6c2">member.Total</text>

  <!-- Style → Culture -->
  <line x1="310" y1="310" x2="310" y2="378" stroke="#56b6c2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- State → Phase -->
  <line x1="455" y1="310" x2="455" y2="378" stroke="#56b6c2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- Health metrics → Risk -->
  <rect x="570" y="260" width="160" height="50" rx="6" fill="#2c313a" stroke="#e5c07b" stroke-width="1.5"/>
  <text x="650" y="282" text-anchor="middle" class="box-label" fill="#e5c07b">Health Metrics</text>
  <text x="650" y="296" text-anchor="middle" class="box-desc" fill="#5c6370">Complement, Debt...</text>
  <line x1="650" y1="310" x2="600" y2="378" stroke="#56b6c2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- ========== Layer 4: Team 5-axis ========== -->
  <rect x="60" y="380" width="130" height="50" rx="6" fill="#2c313a" stroke="#c678dd" stroke-width="1.5"/>
  <text x="125" y="402" text-anchor="middle" class="box-label" fill="#c678dd">Structure</text>
  <text x="125" y="416" text-anchor="middle" class="box-desc" fill="#5c6370">Arch Engine, ...</text>

  <rect x="205" y="380" width="130" height="50" rx="6" fill="#2c313a" stroke="#c678dd" stroke-width="1.5"/>
  <text x="270" y="402" text-anchor="middle" class="box-label" fill="#c678dd">Culture</text>
  <text x="270" y="416" text-anchor="middle" class="box-desc" fill="#5c6370">Builder, Mass...</text>

  <rect x="350" y="380" width="130" height="50" rx="6" fill="#2c313a" stroke="#c678dd" stroke-width="1.5"/>
  <text x="415" y="402" text-anchor="middle" class="box-label" fill="#c678dd">Phase</text>
  <text x="415" y="416" text-anchor="middle" class="box-desc" fill="#5c6370">Mature, Scaling...</text>

  <rect x="495" y="380" width="130" height="50" rx="6" fill="#2c313a" stroke="#c678dd" stroke-width="1.5"/>
  <text x="560" y="402" text-anchor="middle" class="box-label" fill="#c678dd">Risk</text>
  <text x="560" y="416" text-anchor="middle" class="box-desc" fill="#5c6370">Healthy, Drain...</text>

  <!-- Structural Metrics box -->
  <rect x="660" y="380" width="200" height="50" rx="6" fill="#2c313a" stroke="#98c379" stroke-width="1.5"/>
  <text x="760" y="399" text-anchor="middle" class="box-label" fill="#98c379">Structural Metrics</text>
  <text x="760" y="415" text-anchor="middle" class="box-desc" fill="#5c6370">AAR · Anchor Den · Arch Cov</text>

  <!-- ========== Layer 5: Character (composite) ========== -->
  <!-- Arrows to Character -->
  <line x1="125" y1="430" x2="350" y2="470" stroke="#5c6370" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="270" y1="430" x2="380" y2="470" stroke="#5c6370" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="415" y1="430" x2="420" y2="470" stroke="#5c6370" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="560" y1="430" x2="470" y2="470" stroke="#5c6370" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="760" y1="430" x2="500" y2="470" stroke="#5c6370" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="300" y="470" width="260" height="40" rx="8" fill="#3e4451" stroke="#c678dd" stroke-width="2"/>
  <text x="430" y="496" text-anchor="middle" class="box-label" fill="#c678dd" font-size="15">★ Character</text>

  <!-- Character examples -->
  <text x="600" y="486" class="box-desc" fill="#5c6370">Elite · Fortress · Pioneer · Academy</text>
  <text x="600" y="500" class="box-desc" fill="#5c6370">Feature Factory · Guardian · Firefighting</text>

</svg>
