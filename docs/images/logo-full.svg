<svg xmlns="http://www.w3.org/2000/svg" width="480" height="200" viewBox="0 0 480 200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
    <clipPath id="lens-f3">
      <circle cx="100" cy="100" r="72"/>
    </clipPath>
    <radialGradient id="glow-f3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fabd2f" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#d79921" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#282828" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- transparent background — blends with GitHub's own theme -->

  <!-- Double ring aperture -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#504945" stroke-width="2" opacity="0.6"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="#504945" stroke-width="3"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#3c3836" stroke-width="1"/>

  <!-- 8 aperture blade marks -->
  <line x1="100" y1="8" x2="100" y2="18" stroke="#665c54" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="182" x2="100" y2="192" stroke="#665c54" stroke-width="1.5" opacity="0.4"/>
  <line x1="8" y1="100" x2="18" y2="100" stroke="#665c54" stroke-width="1.5" opacity="0.4"/>
  <line x1="182" y1="100" x2="192" y2="100" stroke="#665c54" stroke-width="1.5" opacity="0.4"/>
  <line x1="42" y1="42" x2="49" y2="49" stroke="#665c54" stroke-width="1.5" opacity="0.4"/>
  <line x1="151" y1="151" x2="158" y2="158" stroke="#665c54" stroke-width="1.5" opacity="0.4"/>
  <line x1="151" y1="42" x2="158" y2="49" stroke="#665c54" stroke-width="1.5" opacity="0.4" transform="rotate(90,154.5,45.5)"/>
  <line x1="42" y1="151" x2="49" y2="158" stroke="#665c54" stroke-width="1.5" opacity="0.4" transform="rotate(90,45.5,154.5)"/>

  <g clip-path="url(#lens-f3)">
    <circle cx="100" cy="100" r="72" fill="#282828"/>
    <circle cx="100" cy="100" r="60" fill="url(#glow-f3)"/>

    <!-- Expansion wavefronts -->
    <circle cx="100" cy="100" r="52" fill="none" stroke="#d79921" stroke-width="0.4" opacity="0.1"/>
    <circle cx="100" cy="100" r="38" fill="none" stroke="#d79921" stroke-width="0.5" opacity="0.15"/>
    <circle cx="100" cy="100" r="25" fill="none" stroke="#fabd2f" stroke-width="0.5" opacity="0.2"/>
    <circle cx="100" cy="100" r="13" fill="none" stroke="#fabd2f" stroke-width="0.7" opacity="0.35"/>

    <!-- Central core -->
    <circle cx="100" cy="100" r="7" fill="#fabd2f" opacity="0.06"/>
    <circle cx="100" cy="100" r="4" fill="#fabd2f" opacity="0.1"/>
    <circle cx="100" cy="100" r="2" fill="#ebdbb2" opacity="0.95"/>

    <!-- Stars — Layer 1 close -->
    <circle cx="90" cy="88" r="1.8" fill="#fabd2f" opacity="0.9"/>
    <circle cx="112" cy="92" r="1.5" fill="#b8bb26" opacity="0.85"/>
    <circle cx="108" cy="112" r="1.8" fill="#d3869b" opacity="0.9"/>
    <circle cx="92" cy="110" r="1.5" fill="#83a598" opacity="0.85"/>

    <!-- Stars — Layer 2 -->
    <circle cx="75" cy="72" r="1.8" fill="#8ec07c" opacity="0.75"/>
    <circle cx="128" cy="78" r="1.6" fill="#fabd2f" opacity="0.7"/>
    <circle cx="130" cy="118" r="1.8" fill="#b8bb26" opacity="0.75"/>
    <circle cx="70" cy="122" r="1.6" fill="#fb4934" opacity="0.55"/>
    <circle cx="118" cy="132" r="1.6" fill="#83a598" opacity="0.6"/>
    <circle cx="82" cy="133" r="1.5" fill="#d3869b" opacity="0.6"/>
    <circle cx="122" cy="72" r="1.5" fill="#fabd2f" opacity="0.6"/>
    <circle cx="76" cy="80" r="1.2" fill="#ebdbb2" opacity="0.5"/>

    <!-- Stars — Layer 3 far -->
    <circle cx="55" cy="55" r="1.5" fill="#83a598" opacity="0.45"/>
    <circle cx="145" cy="57" r="1.6" fill="#d3869b" opacity="0.45"/>
    <circle cx="150" cy="102" r="1.5" fill="#b8bb26" opacity="0.4"/>
    <circle cx="50" cy="105" r="1.5" fill="#8ec07c" opacity="0.4"/>
    <circle cx="145" cy="145" r="1.5" fill="#fb4934" opacity="0.35"/>
    <circle cx="55" cy="148" r="1.6" fill="#fabd2f" opacity="0.4"/>

    <!-- Expansion rays -->
    <line x1="102" y1="98" x2="128" y2="78" stroke="#fabd2f" stroke-width="0.4" opacity="0.12"/>
    <line x1="98" y1="98" x2="75" y2="72" stroke="#fabd2f" stroke-width="0.4" opacity="0.12"/>
    <line x1="102" y1="102" x2="130" y2="118" stroke="#fabd2f" stroke-width="0.4" opacity="0.12"/>
    <line x1="98" y1="102" x2="70" y2="122" stroke="#fabd2f" stroke-width="0.4" opacity="0.12"/>
    <line x1="100" y1="97" x2="100" y2="57" stroke="#fabd2f" stroke-width="0.3" opacity="0.1"/>
    <line x1="100" y1="103" x2="100" y2="145" stroke="#fabd2f" stroke-width="0.3" opacity="0.1"/>

    <!-- Constellation connections -->
    <line x1="90" y1="88" x2="112" y2="92" stroke="#665c54" stroke-width="0.5" opacity="0.25"/>
    <line x1="112" y1="92" x2="108" y2="112" stroke="#665c54" stroke-width="0.5" opacity="0.25"/>
    <line x1="108" y1="112" x2="92" y2="110" stroke="#665c54" stroke-width="0.5" opacity="0.25"/>
    <line x1="92" y1="110" x2="90" y2="88" stroke="#665c54" stroke-width="0.5" opacity="0.25"/>
    <line x1="75" y1="72" x2="90" y2="88" stroke="#665c54" stroke-width="0.4" opacity="0.18"/>
    <line x1="128" y1="78" x2="112" y2="92" stroke="#665c54" stroke-width="0.4" opacity="0.18"/>
  </g>

  <!-- Text -->
  <text x="230" y="105" fill="#ebdbb2" font-size="64" font-weight="700" letter-spacing="8">EIS</text>
  <text x="232" y="135" fill="#928374" font-size="16">the Git Telescope</text>
  <text x="232" y="162" fill="#665c54" font-size="11">Engineering Impact Score</text>
</svg>
