<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <clipPath id="lens-ideal">
      <circle cx="256" cy="256" r="200"/>
    </clipPath>
    <radialGradient id="glow-ideal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8ec07c" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#689d6a" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#282828" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#1d2021"/>

  <!-- Double ring aperture -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#504945" stroke-width="3" opacity="0.6"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#504945" stroke-width="5"/>
  <circle cx="256" cy="256" r="195" fill="none" stroke="#3c3836" stroke-width="1.5"/>

  <!-- Aperture blade hints (6 blades) -->
  <line x1="256" y1="56" x2="256" y2="36" stroke="#665c54" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="476" x2="256" y2="456" stroke="#665c54" stroke-width="2" opacity="0.4"/>
  <line x1="56" y1="256" x2="36" y2="256" stroke="#665c54" stroke-width="2" opacity="0.4"/>
  <line x1="476" y1="256" x2="456" y2="256" stroke="#665c54" stroke-width="2" opacity="0.4"/>
  <!-- Diagonal blades -->
  <line x1="115" y1="115" x2="101" y2="101" stroke="#665c54" stroke-width="2" opacity="0.4"/>
  <line x1="397" y1="397" x2="411" y2="411" stroke="#665c54" stroke-width="2" opacity="0.4"/>
  <line x1="397" y1="115" x2="411" y2="101" stroke="#665c54" stroke-width="2" opacity="0.4"/>
  <line x1="115" y1="397" x2="101" y2="411" stroke="#665c54" stroke-width="2" opacity="0.4"/>

  <g clip-path="url(#lens-ideal)">
    <circle cx="256" cy="256" r="200" fill="#282828"/>
    <circle cx="256" cy="256" r="160" fill="url(#glow-ideal)"/>

    <!-- Orbital ring 1 — large, tilted -->
    <ellipse cx="256" cy="256" rx="140" ry="55" fill="none" stroke="#8ec07c" stroke-width="1.2" opacity="0.3" transform="rotate(-15,256,256)"/>
    <!-- Orbital ring 1 glow -->
    <ellipse cx="256" cy="256" rx="140" ry="55" fill="none" stroke="#8ec07c" stroke-width="4" opacity="0.06" transform="rotate(-15,256,256)"/>

    <!-- Orbital ring 2 — medium, different tilt -->
    <ellipse cx="256" cy="256" rx="100" ry="40" fill="none" stroke="#8ec07c" stroke-width="1.4" opacity="0.4" transform="rotate(25,256,256)"/>
    <!-- Orbital ring 2 glow -->
    <ellipse cx="256" cy="256" rx="100" ry="40" fill="none" stroke="#8ec07c" stroke-width="4" opacity="0.08" transform="rotate(25,256,256)"/>

    <!-- Orbital ring 3 — small, steep tilt -->
    <ellipse cx="256" cy="256" rx="60" ry="28" fill="none" stroke="#b8bb26" stroke-width="1.5" opacity="0.45" transform="rotate(-50,256,256)"/>
    <!-- Orbital ring 3 glow -->
    <ellipse cx="256" cy="256" rx="60" ry="28" fill="none" stroke="#b8bb26" stroke-width="4" opacity="0.08" transform="rotate(-50,256,256)"/>

    <!-- Planet on orbit 1 (bright dot) -->
    <circle cx="370" cy="225" r="5" fill="#8ec07c" opacity="0.9"/>
    <circle cx="370" cy="225" r="8" fill="#8ec07c" opacity="0.15"/>

    <!-- Planet on orbit 2 -->
    <circle cx="185" cy="230" r="4" fill="#b8bb26" opacity="0.8"/>
    <circle cx="185" cy="230" r="7" fill="#b8bb26" opacity="0.12"/>

    <!-- Chevrons along orbit 1 (direction indicators) -->
    <path d="M 310 195 l 6 4 l -6 4" fill="none" stroke="#8ec07c" stroke-width="1.2" opacity="0.4" transform="rotate(-15,310,199)"/>
    <path d="M 200 310 l 6 4 l -6 4" fill="none" stroke="#8ec07c" stroke-width="1.2" opacity="0.35" transform="rotate(-15,200,314)"/>

    <!-- Chevrons along orbit 2 -->
    <path d="M 330 270 l 6 4 l -6 4" fill="none" stroke="#8ec07c" stroke-width="1.2" opacity="0.35" transform="rotate(25,330,274)"/>
    <path d="M 175 248 l 6 4 l -6 4" fill="none" stroke="#8ec07c" stroke-width="1.2" opacity="0.3" transform="rotate(25,175,252)"/>

    <!-- Chevrons along orbit 3 -->
    <path d="M 280 225 l 5 3.5 l -5 3.5" fill="none" stroke="#b8bb26" stroke-width="1.2" opacity="0.4" transform="rotate(-50,280,228)"/>

    <!-- Central bright core -->
    <circle cx="256" cy="256" r="18" fill="#8ec07c" opacity="0.06"/>
    <circle cx="256" cy="256" r="10" fill="#8ec07c" opacity="0.12"/>
    <circle cx="256" cy="256" r="5" fill="#8ec07c" opacity="0.8"/>
    <circle cx="256" cy="256" r="3" fill="#ebdbb2" opacity="0.95"/>

    <!-- Sparse stars (fewer, more geometric feel) -->
    <circle cx="150" cy="150" r="2.5" fill="#ebdbb2" opacity="0.3"/>
    <circle cx="360" cy="360" r="2.5" fill="#ebdbb2" opacity="0.25"/>
    <circle cx="350" cy="150" r="2" fill="#d3869b" opacity="0.25"/>
    <circle cx="155" cy="370" r="2" fill="#fabd2f" opacity="0.2"/>
    <circle cx="300" cy="130" r="2" fill="#83a598" opacity="0.2"/>
    <circle cx="130" cy="280" r="2" fill="#8ec07c" opacity="0.2"/>
    <circle cx="380" cy="300" r="2" fill="#b8bb26" opacity="0.2"/>

    <!-- Subtle grid lines for geometric/structured feel -->
    <line x1="256" y1="100" x2="256" y2="412" stroke="#504945" stroke-width="0.3" opacity="0.1"/>
    <line x1="100" y1="256" x2="412" y2="256" stroke="#504945" stroke-width="0.3" opacity="0.1"/>
  </g>
</svg>
