<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Hiragino Kaku Gothic ProN', sans-serif">
  <rect width="800" height="600" fill="#1d2021"/>
  <text x="400" y="35" text-anchor="middle" fill="#fabd2f" font-size="18" font-weight="700">orbitlens 2コマ — 「Gravitational Loop」</text>

  <!-- Panel 1 -->
  <rect x="30" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="50" y="82" fill="#928374" font-size="13">① 競合は直線、orbitlens は円</text>

  <rect x="70" y="100" width="290" height="140" rx="8" fill="#1d2021" stroke="#504945"/>
  <text x="90" y="125" fill="#928374" font-size="12">競合のビジネスモデル（直線）:</text>
  <text x="90" y="155" fill="#ebdbb2" font-size="12">Swarmia:  測る → ダッシュボード → 終わり</text>
  <text x="90" y="178" fill="#ebdbb2" font-size="12">LinearB:  測る → アラート → 終わり</text>
  <text x="90" y="201" fill="#ebdbb2" font-size="12">Findy:    スカウト → マッチ → 終わり</text>
  <text x="90" y="228" fill="#928374" font-size="11">↑ 単機能。データが次に繋がらない。</text>

  <rect x="70" y="260" width="290" height="100" rx="8" fill="#3c3836"/>
  <text x="90" y="285" fill="#928374" font-size="12">直線モデルの限界:</text>
  <text x="90" y="310" fill="#ebdbb2" font-size="11">・測っても、次のアクションがない</text>
  <text x="90" y="330" fill="#ebdbb2" font-size="11">・マッチしても、入社後の成長は見えない</text>
  <text x="90" y="350" fill="#ebdbb2" font-size="11">・各プロダクトが孤立している</text>

  <text x="210" y="410" text-anchor="middle" fill="#928374" font-size="13">直線は終わりがある。</text>
  <text x="210" y="435" text-anchor="middle" fill="#928374" font-size="13">円は終わらない。</text>

  <!-- Panel 2 -->
  <rect x="410" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="430" y="82" fill="#928374" font-size="13">② Gravitational Loop</text>

  <!-- Circular diagram -->
  <circle cx="590" cy="230" r="100" fill="none" stroke="#504945" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ace -->
  <circle cx="590" cy="130" r="30" fill="#fabd2f" opacity="0.2" stroke="#fabd2f"/>
  <text x="590" y="127" text-anchor="middle" fill="#fabd2f" font-size="13" font-weight="600">ace</text>
  <text x="590" y="143" text-anchor="middle" fill="#fabd2f" font-size="9">observe</text>

  <!-- true -->
  <circle cx="503" cy="280" r="30" fill="#83a598" opacity="0.2" stroke="#83a598"/>
  <text x="503" y="277" text-anchor="middle" fill="#83a598" font-size="13" font-weight="600">true</text>
  <text x="503" y="293" text-anchor="middle" fill="#83a598" font-size="9">navigate</text>

  <!-- ideal -->
  <circle cx="677" cy="280" r="30" fill="#d3869b" opacity="0.2" stroke="#d3869b"/>
  <text x="677" y="277" text-anchor="middle" fill="#d3869b" font-size="13" font-weight="600">ideal</text>
  <text x="677" y="293" text-anchor="middle" fill="#d3869b" font-size="9">stabilize</text>

  <!-- Arrows -->
  <text x="540" y="190" fill="#928374" font-size="16">→</text>
  <text x="640" y="190" fill="#928374" font-size="16">←</text>
  <text x="590" y="310" fill="#928374" font-size="16">↔</text>

  <!-- Explanation -->
  <rect x="440" y="350" width="310" height="140" rx="8" fill="#3c3836"/>
  <text x="455" y="375" fill="#fabd2f" font-size="12">ace で観測 → データが蓄積</text>
  <text x="455" y="395" fill="#83a598" font-size="12">true でマッチ → 精度が上がる</text>
  <text x="455" y="415" fill="#d3869b" font-size="12">ideal で育成 → 成長が ace で再観測</text>
  <text x="455" y="440" fill="#ebdbb2" font-size="12">→ ループするほどデータが増え、</text>
  <text x="455" y="458" fill="#ebdbb2" font-size="12">　 精度が上がり、ユーザーが増える。</text>
  <text x="455" y="480" fill="#fabd2f" font-size="12">三重のネットワーク効果。</text>

  <text x="590" y="520" text-anchor="middle" fill="#928374" font-size="11">競合が追いつけない理由がここにある。</text>

  <!-- Footer -->
  <text x="400" y="565" text-anchor="middle" fill="#fabd2f" font-size="14" font-weight="600">直線は追いつかれる。円は追いつけない。</text>
  <text x="400" y="585" text-anchor="middle" fill="#504945" font-size="11">orbitlens — observe, navigate, stabilize, repeat.</text>
</svg>
