<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Hiragino Kaku Gothic ProN', sans-serif">
  <rect width="800" height="600" fill="#1d2021"/>
  <text x="400" y="35" text-anchor="middle" fill="#fabd2f" font-size="18" font-weight="700">ace 2コマ — 「安定と放置」</text>

  <!-- Panel 1 -->
  <rect x="30" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="50" y="82" fill="#928374" font-size="13">① 二人のSurvival</text>

  <!-- Two engineers side by side -->
  <circle cx="140" cy="180" r="28" fill="#83a598"/>
  <text x="140" y="187" text-anchor="middle" fill="#1d2021" font-size="14">G</text>
  <text x="140" y="225" text-anchor="middle" fill="#83a598" font-size="13">Survival: 78</text>

  <circle cx="280" cy="180" r="28" fill="#b16286"/>
  <text x="280" y="187" text-anchor="middle" fill="#1d2021" font-size="14">H</text>
  <text x="280" y="225" text-anchor="middle" fill="#d3869b" font-size="13">Survival: 75</text>

  <!-- Manager -->
  <circle cx="210" cy="310" r="25" fill="#458588"/>
  <text x="210" y="317" text-anchor="middle" fill="#1d2021" font-size="12">EM</text>

  <rect x="80" y="260" width="270" height="30" rx="8" fill="#3c3836"/>
  <text x="95" y="280" fill="#ebdbb2" font-size="12">「二人とも同じくらい安定してるね」</text>

  <!-- Looks same -->
  <text x="210" y="390" text-anchor="middle" fill="#928374" font-size="15">Survival 78 ≒ 75</text>
  <text x="210" y="415" text-anchor="middle" fill="#928374" font-size="12">同じに見える…本当に？</text>

  <!-- Panel 2 -->
  <rect x="410" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="430" y="82" fill="#928374" font-size="13">② Robust / Dormant で見ると</text>

  <rect x="440" y="100" width="310" height="160" rx="8" fill="#1d2021" stroke="#504945"/>
  <text x="455" y="122" fill="#8ec07c" font-size="11" font-family="monospace">$ eis analyze --detail</text>

  <text x="455" y="155" fill="#928374" font-size="11" font-family="monospace">Member  Surv  Robust  Dormant  State</text>
  <text x="455" y="180" fill="#8ec07c" font-size="12" font-family="monospace">G        78      65       13  Active</text>
  <text x="455" y="205" fill="#fb4934" font-size="12" font-family="monospace">H        75       8       67  Fragile</text>

  <text x="455" y="240" fill="#8ec07c" font-size="11">G: 変更圧の中で生き残ったコード（本物）</text>
  <text x="455" y="258" fill="#fb4934" font-size="11">H: 誰も触らないから残ってるだけ（見せかけ）</text>

  <!-- Visual metaphor -->
  <!-- G: sturdy building -->
  <rect x="460" y="290" width="80" height="80" rx="4" fill="#8ec07c" opacity="0.3" stroke="#8ec07c"/>
  <text x="500" y="320" text-anchor="middle" fill="#8ec07c" font-size="11">嵐の中で</text>
  <text x="500" y="338" text-anchor="middle" fill="#8ec07c" font-size="11">立ってる家</text>
  <text x="500" y="358" text-anchor="middle" fill="#8ec07c" font-size="14">G</text>

  <!-- H: abandoned building -->
  <rect x="580" y="290" width="80" height="80" rx="4" fill="#fb4934" opacity="0.2" stroke="#fb4934"/>
  <text x="620" y="320" text-anchor="middle" fill="#fb4934" font-size="11">誰も来ない</text>
  <text x="620" y="338" text-anchor="middle" fill="#fb4934" font-size="11">廃墟</text>
  <text x="620" y="358" text-anchor="middle" fill="#fb4934" font-size="14">H</text>

  <!-- EM realization -->
  <rect x="450" y="400" width="300" height="70" rx="8" fill="#3c3836"/>
  <text x="465" y="425" fill="#fabd2f" font-size="13">「安定」と「放置」は違う。</text>
  <text x="465" y="448" fill="#ebdbb2" font-size="12">変更圧の中で残るコードだけが本物。</text>
  <text x="465" y="465" fill="#928374" font-size="11">Hのモジュールに変更が来た瞬間、崩壊する。</text>

  <!-- Footer -->
  <text x="400" y="565" text-anchor="middle" fill="#fabd2f" font-size="14" font-weight="600">Survival の中身を見ろ。Robust か Dormant か。</text>
  <text x="400" y="585" text-anchor="middle" fill="#504945" font-size="11">ace — the Git Telescope</text>
</svg>
