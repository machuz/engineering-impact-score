<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Hiragino Kaku Gothic ProN', sans-serif">
  <rect width="800" height="600" fill="#1d2021"/>
  <text x="400" y="35" text-anchor="middle" fill="#fabd2f" font-size="18" font-weight="700">ace 2コマ — 「Survival低い ≠ 弱い」</text>

  <!-- Panel 1 -->
  <rect x="30" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="50" y="82" fill="#928374" font-size="13">① 数字だけ見たEM</text>

  <circle cx="200" cy="150" r="25" fill="#458588"/>
  <text x="200" y="157" text-anchor="middle" fill="#1d2021" font-size="11">EM</text>

  <rect x="80" y="190" width="260" height="80" rx="8" fill="#1d2021" stroke="#504945"/>
  <text x="95" y="212" fill="#928374" font-size="11" font-family="monospace">Member   Surv   Impact</text>
  <text x="95" y="235" fill="#fb4934" font-size="12" font-family="monospace">田中      12    28.5</text>
  <text x="95" y="255" fill="#8ec07c" font-size="12" font-family="monospace">佐藤      78    52.1</text>

  <rect x="60" y="290" width="300" height="50" rx="8" fill="#3c3836"/>
  <polygon points="185,290 200,270 215,290" fill="#3c3836"/>
  <text x="75" y="312" fill="#ebdbb2" font-size="13">「田中さん、Survival低いな…」</text>
  <text x="75" y="332" fill="#fb4934" font-size="12">「コードが残ってないってこと？」</text>

  <text x="200" y="420" text-anchor="middle" fill="#928374" font-size="14">シグナルは文脈なしでは危険。</text>
  <text x="200" y="450" text-anchor="middle" fill="#665c54" font-size="40">⚠️</text>

  <!-- Panel 2 -->
  <rect x="410" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="430" y="82" fill="#928374" font-size="13">② Styleを見ると</text>

  <rect x="440" y="100" width="310" height="120" rx="8" fill="#1d2021" stroke="#504945"/>
  <text x="455" y="122" fill="#8ec07c" font-size="11" font-family="monospace">田中 — Producer / Rescue / Active</text>
  <text x="455" y="150" fill="#928374" font-size="11" font-family="monospace">Prod 65  Surv 12  Debt 82</text>
  <text x="455" y="175" fill="#83a598" font-size="12">Debt Cleanup 82 — 他人の負債を引き取っている</text>
  <text x="455" y="200" fill="#d3869b" font-size="12">Style: Rescue — レガシー救済中</text>

  <rect x="440" y="240" width="310" height="100" rx="8" fill="#3c3836"/>
  <text x="455" y="265" fill="#fabd2f" font-size="14" font-weight="600">Survivalが低い理由：</text>
  <text x="455" y="290" fill="#ebdbb2" font-size="13">自分のコードが残らないんじゃない。</text>
  <text x="455" y="313" fill="#8ec07c" font-size="13">他人が書いた古いコードを</text>
  <text x="455" y="333" fill="#8ec07c" font-size="13">書き直しているから低いだけ。</text>

  <!-- Revelation -->
  <rect x="440" y="360" width="310" height="70" rx="8" fill="#1d2021" stroke="#fabd2f"/>
  <text x="455" y="385" fill="#fabd2f" font-size="14">Rescueは最も誤解されやすいStyle。</text>
  <text x="455" y="410" fill="#ebdbb2" font-size="12">Survival↓ + Debt Cleanup↑ = レガシー救済者</text>
  <text x="455" y="422" fill="#928374" font-size="10">（1軸だけで読むと真逆の結論になる）</text>

  <!-- EM realization -->
  <circle cx="530" cy="490" r="22" fill="#458588"/>
  <text x="530" y="497" text-anchor="middle" fill="#1d2021" font-size="10">EM</text>
  <rect x="560" y="475" width="170" height="30" rx="8" fill="#3c3836"/>
  <text x="570" y="495" fill="#8ec07c" font-size="12">「ごめん田中さん…」</text>

  <!-- Footer -->
  <text x="400" y="565" text-anchor="middle" fill="#fabd2f" font-size="14" font-weight="600">1軸で読むな。3軸で読め。</text>
  <text x="400" y="585" text-anchor="middle" fill="#504945" font-size="11">ace — the Git Telescope</text>
</svg>
