<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Hiragino Kaku Gothic ProN', sans-serif">
  <rect width="800" height="600" fill="#1d2021"/>
  <text x="400" y="35" text-anchor="middle" fill="#83a598" font-size="18" font-weight="700">true 2コマ — 「1時間 vs 3年」</text>

  <!-- Panel 1 -->
  <rect x="30" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="50" y="82" fill="#928374" font-size="13">① 面接 = 1時間のパフォーマンス</text>

  <!-- Interview scene -->
  <circle cx="130" cy="160" r="25" fill="#458588"/>
  <text x="130" y="167" text-anchor="middle" fill="#1d2021" font-size="10">面接官</text>
  <circle cx="280" cy="160" r="25" fill="#d79921"/>
  <text x="280" y="167" text-anchor="middle" fill="#1d2021" font-size="14">Q</text>

  <rect x="70" y="200" width="300" height="130" rx="8" fill="#1d2021" stroke="#504945"/>
  <text x="90" y="222" fill="#928374" font-size="12">面接で測れること:</text>
  <text x="90" y="248" fill="#ebdbb2" font-size="12">  コミュニケーション力</text>
  <text x="90" y="268" fill="#ebdbb2" font-size="12">  論理的思考（その場の問題に限る）</text>
  <text x="90" y="288" fill="#ebdbb2" font-size="12">  プレゼン力</text>
  <text x="90" y="312" fill="#fb4934" font-size="11">  ← 1時間で「構造を作れるか」は測れない</text>

  <!-- Time comparison -->
  <rect x="80" y="360" width="270" height="80" rx="8" fill="#3c3836"/>
  <text x="100" y="385" fill="#ebdbb2" font-size="14">面接: 1時間</text>
  <text x="100" y="410" fill="#ebdbb2" font-size="14">git履歴: 3年分</text>
  <text x="100" y="430" fill="#928374" font-size="11">どちらが正確？</text>

  <text x="210" y="480" text-anchor="middle" fill="#928374" font-size="12">面接が得意な人 ≠ コードが残る人</text>

  <!-- Panel 2 -->
  <rect x="410" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="430" y="82" fill="#928374" font-size="13">② 3年の証拠</text>

  <rect x="440" y="100" width="310" height="210" rx="8" fill="#1d2021" stroke="#83a598"/>
  <text x="455" y="122" fill="#83a598" font-size="12" font-weight="600">Gravity Certificate — Q</text>
  <text x="455" y="142" fill="#928374" font-size="10">36 months of git history, verified</text>

  <text x="455" y="172" fill="#83a598" font-size="11" font-family="monospace">Commits analyzed:   2,847</text>
  <text x="455" y="194" fill="#83a598" font-size="11" font-family="monospace">Code surviving:     68%</text>
  <text x="455" y="216" fill="#83a598" font-size="11" font-family="monospace">Debt cleaned:       412 fixes</text>
  <text x="455" y="238" fill="#83a598" font-size="11" font-family="monospace">Design files:       187 commits</text>
  <text x="455" y="260" fill="#83a598" font-size="11" font-family="monospace">Role consistency:   Architect (36mo)</text>

  <text x="455" y="295" fill="#fabd2f" font-size="12">3年間、毎日の仕事が記録されている。</text>
  <text x="455" y="313" fill="#928374" font-size="11">面接は演じられる。3年間は演じられない。</text>

  <!-- Insight -->
  <rect x="440" y="335" width="310" height="100" rx="8" fill="#3c3836"/>
  <text x="455" y="358" fill="#83a598" font-size="13">面接が不要になるわけではない。</text>
  <text x="455" y="380" fill="#ebdbb2" font-size="12">でも「この人は本当に作れるのか？」は</text>
  <text x="455" y="400" fill="#ebdbb2" font-size="12">1時間の会話より、3年分の git が正確。</text>
  <text x="455" y="425" fill="#fabd2f" font-size="12">面接は人柄。望遠鏡は軌跡。両方必要。</text>

  <!-- Both interviewers -->
  <circle cx="500" cy="500" r="20" fill="#458588"/>
  <text x="500" y="507" text-anchor="middle" fill="#1d2021" font-size="10">面接官</text>
  <text x="530" y="495" fill="#ebdbb2" font-size="11">「人柄は面接で確認。</text>
  <text x="530" y="515" fill="#83a598" font-size="11">　軌跡は望遠鏡で確認。」</text>

  <!-- Footer -->
  <text x="400" y="565" text-anchor="middle" fill="#83a598" font-size="14" font-weight="600">1時間の印象より、3年の軌跡。</text>
  <text x="400" y="585" text-anchor="middle" fill="#504945" font-size="11">orbitlens true — Your gravity, proven.</text>
</svg>
