<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Hiragino Kaku Gothic ProN', sans-serif">
  <rect width="800" height="600" fill="#1d2021"/>
  <text x="400" y="35" text-anchor="middle" fill="#fabd2f" font-size="18" font-weight="700">ace 2コマ — 「エントロピー」</text>

  <!-- Panel 1 -->
  <rect x="30" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="50" y="82" fill="#928374" font-size="13">① 半年前</text>

  <rect x="70" y="100" width="280" height="140" rx="8" fill="#1d2021" stroke="#504945"/>
  <text x="90" y="122" fill="#8ec07c" font-size="11" font-family="monospace">$ eis team (6 months ago)</text>
  <text x="90" y="152" fill="#8ec07c" font-size="12" font-family="monospace">Character:     Spiral</text>
  <text x="90" y="174" fill="#8ec07c" font-size="12" font-family="monospace">Complement:    82</text>
  <text x="90" y="196" fill="#8ec07c" font-size="12" font-family="monospace">Avg Survival:  61</text>
  <text x="90" y="218" fill="#8ec07c" font-size="12" font-family="monospace">Risk Ratio:    0%</text>

  <!-- Happy team -->
  <circle cx="100" cy="310" r="20" fill="#83a598"/>
  <text x="100" y="317" text-anchor="middle" fill="#1d2021" font-size="9">Archi</text>
  <circle cx="160" cy="310" r="20" fill="#689d6a"/>
  <text x="160" y="317" text-anchor="middle" fill="#1d2021" font-size="9">Anchor</text>
  <circle cx="220" cy="310" r="20" fill="#d79921"/>
  <text x="220" y="317" text-anchor="middle" fill="#1d2021" font-size="9">Prod</text>
  <circle cx="280" cy="310" r="20" fill="#b16286"/>
  <text x="280" y="317" text-anchor="middle" fill="#1d2021" font-size="9">Build</text>

  <rect x="90" y="360" width="230" height="30" rx="8" fill="#3c3836"/>
  <text x="105" y="380" fill="#ebdbb2" font-size="12">「最高のチームだ！」</text>

  <!-- Arrow of time -->
  <text x="210" y="440" text-anchor="middle" fill="#928374" font-size="13">放っておくと…</text>
  <text x="210" y="465" text-anchor="middle" fill="#928374" font-size="24">↓</text>

  <!-- Panel 2 -->
  <rect x="410" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="430" y="82" fill="#928374" font-size="13">② 今</text>

  <rect x="440" y="100" width="310" height="140" rx="8" fill="#1d2021" stroke="#504945"/>
  <text x="455" y="122" fill="#fb4934" font-size="11" font-family="monospace">$ eis team (now)</text>
  <text x="455" y="152" fill="#fb4934" font-size="12" font-family="monospace">Character:     Irregular</text>
  <text x="455" y="174" fill="#fb4934" font-size="12" font-family="monospace">Complement:    33</text>
  <text x="455" y="196" fill="#fb4934" font-size="12" font-family="monospace">Avg Survival:  28</text>
  <text x="455" y="218" fill="#fb4934" font-size="12" font-family="monospace">Risk Ratio:    50%</text>

  <!-- Degraded team -->
  <circle cx="480" cy="310" r="20" fill="#928374"/>
  <text x="480" y="317" text-anchor="middle" fill="#1d2021" font-size="9">Former</text>
  <circle cx="540" cy="310" r="20" fill="#928374"/>
  <text x="540" y="317" text-anchor="middle" fill="#1d2021" font-size="9">Silent</text>
  <circle cx="600" cy="310" r="20" fill="#d79921"/>
  <text x="600" y="317" text-anchor="middle" fill="#1d2021" font-size="9">Prod</text>
  <circle cx="660" cy="310" r="20" fill="#d79921"/>
  <text x="660" y="317" text-anchor="middle" fill="#1d2021" font-size="9">Prod</text>

  <text x="570" y="355" text-anchor="middle" fill="#fb4934" font-size="11">Architect 退職、Anchor 異動</text>
  <text x="570" y="375" text-anchor="middle" fill="#fb4934" font-size="11">補充は全員 Producer</text>

  <!-- Insight -->
  <rect x="440" y="400" width="310" height="90" rx="8" fill="#3c3836"/>
  <text x="455" y="425" fill="#fabd2f" font-size="13">エントロピー増大の法則</text>
  <text x="455" y="448" fill="#ebdbb2" font-size="12">コードベースは放っておくと必ず崩壊する。</text>
  <text x="455" y="468" fill="#ebdbb2" font-size="12">秩序を保つには、意図的な観測が必要。</text>
  <text x="455" y="485" fill="#928374" font-size="11">望遠鏡がなければ、崩壊に気づけない。</text>

  <!-- Footer -->
  <text x="400" y="565" text-anchor="middle" fill="#fabd2f" font-size="14" font-weight="600">宇宙は必ず無秩序に向かう。抗うには観測せよ。</text>
  <text x="400" y="585" text-anchor="middle" fill="#504945" font-size="11">ace — the Git Telescope</text>
</svg>
