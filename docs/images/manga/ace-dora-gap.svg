<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Hiragino Kaku Gothic ProN', sans-serif">
  <rect width="800" height="600" fill="#1d2021"/>
  <text x="400" y="35" text-anchor="middle" fill="#fabd2f" font-size="18" font-weight="700">ace 2コマ — 「DORAでは見えないもの」</text>

  <!-- Panel 1 -->
  <rect x="30" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="50" y="82" fill="#928374" font-size="13">① DORA メトリクス: オールグリーン</text>

  <rect x="70" y="100" width="290" height="150" rx="8" fill="#1d2021" stroke="#504945"/>
  <text x="90" y="125" fill="#8ec07c" font-size="13">DORA Metrics — Q3</text>
  <text x="90" y="155" fill="#8ec07c" font-size="12">Deployment Frequency:  Daily    ✓</text>
  <text x="90" y="178" fill="#8ec07c" font-size="12">Lead Time:             2 days   ✓</text>
  <text x="90" y="201" fill="#8ec07c" font-size="12">Change Failure Rate:   5%       ✓</text>
  <text x="90" y="224" fill="#8ec07c" font-size="12">MTTR:                  30 min   ✓</text>

  <circle cx="200" cy="310" r="25" fill="#d79921"/>
  <text x="200" y="317" text-anchor="middle" fill="#1d2021" font-size="10">CTO</text>

  <rect x="80" y="350" width="270" height="40" rx="10" fill="#3c3836"/>
  <text x="95" y="375" fill="#ebdbb2" font-size="13">「DORAオールグリーン。最高の四半期！」</text>

  <rect x="80" y="410" width="270" height="50" rx="8" fill="#504945"/>
  <text x="95" y="432" fill="#a89984" font-size="11">（…なのに、なぜか主要メンバーが3人辞めた）</text>
  <text x="95" y="450" fill="#a89984" font-size="11">（…なのに、来期の見通しが暗い気がする）</text>

  <!-- Panel 2 -->
  <rect x="410" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="430" y="82" fill="#928374" font-size="13">② 望遠鏡で見ると</text>

  <rect x="440" y="100" width="310" height="180" rx="8" fill="#1d2021" stroke="#fb4934"/>
  <text x="455" y="122" fill="#fb4934" font-size="12" font-family="monospace">$ eis team</text>

  <text x="455" y="150" fill="#fb4934" font-size="12">Avg Survival:    18 (3Q連続低下)</text>
  <text x="455" y="172" fill="#fb4934" font-size="12">Architect:       0 (退職済み)</text>
  <text x="455" y="194" fill="#fb4934" font-size="12">Risk Ratio:      67%</text>
  <text x="455" y="216" fill="#fb4934" font-size="12">Character:       Collision</text>
  <text x="455" y="240" fill="#928374" font-size="11">デプロイは速い。でもコードが残らない。</text>
  <text x="455" y="258" fill="#928374" font-size="11">速度は出ている。でも構造が崩壊している。</text>

  <rect x="440" y="290" width="310" height="100" rx="8" fill="#3c3836"/>
  <text x="455" y="315" fill="#fabd2f" font-size="14">DORA は「速度」を測る。</text>
  <text x="455" y="340" fill="#fabd2f" font-size="14">ace は「構造」を測る。</text>
  <text x="455" y="368" fill="#ebdbb2" font-size="12">速度が出ていても構造が崩壊していれば、</text>
  <text x="455" y="386" fill="#ebdbb2" font-size="12">それは下り坂でスピードが出ているだけ。</text>

  <circle cx="500" cy="460" r="22" fill="#d79921"/>
  <text x="500" y="467" text-anchor="middle" fill="#1d2021" font-size="10">CTO</text>
  <rect x="535" y="440" width="210" height="45" rx="8" fill="#3c3836"/>
  <text x="550" y="460" fill="#ebdbb2" font-size="12">「速度じゃなくて</text>
  <text x="550" y="478" fill="#fabd2f" font-size="12">　構造を見るべきだった」</text>

  <!-- Footer -->
  <text x="400" y="565" text-anchor="middle" fill="#fabd2f" font-size="14" font-weight="600">速度は嘘をつく。構造は嘘をつかない。</text>
  <text x="400" y="585" text-anchor="middle" fill="#504945" font-size="11">ace — the Git Telescope</text>
</svg>
