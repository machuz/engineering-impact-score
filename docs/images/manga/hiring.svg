<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Hiragino Kaku Gothic ProN', sans-serif">
  <rect width="800" height="600" fill="#1d2021"/>
  <text x="400" y="35" text-anchor="middle" fill="#fabd2f" font-size="18" font-weight="700">ace 2コマ — 「何を採用すべきか」</text>

  <!-- Panel 1 -->
  <rect x="30" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="50" y="82" fill="#928374" font-size="13">① 採用会議</text>

  <circle cx="120" cy="150" r="22" fill="#458588"/>
  <text x="120" y="157" text-anchor="middle" fill="#1d2021" font-size="10">CTO</text>
  <circle cx="200" cy="150" r="22" fill="#d79921"/>
  <text x="200" y="157" text-anchor="middle" fill="#1d2021" font-size="10">EM</text>
  <circle cx="280" cy="150" r="22" fill="#689d6a"/>
  <text x="280" y="157" text-anchor="middle" fill="#1d2021" font-size="10">HR</text>

  <rect x="60" y="190" width="300" height="35" rx="8" fill="#3c3836"/>
  <text x="75" y="212" fill="#ebdbb2" font-size="13">「エンジニア採用したいんだけど…」</text>

  <rect x="60" y="240" width="300" height="35" rx="8" fill="#504945"/>
  <text x="75" y="262" fill="#a89984" font-size="13">「何を採用すればいいの？」</text>

  <rect x="60" y="290" width="300" height="35" rx="8" fill="#3c3836"/>
  <text x="75" y="312" fill="#ebdbb2" font-size="13">「Go経験3年以上…？」</text>

  <rect x="60" y="340" width="300" height="35" rx="8" fill="#504945"/>
  <text x="75" y="362" fill="#a89984" font-size="13">「それで強い人来るかな…？」</text>

  <text x="200" y="450" text-anchor="middle" fill="#665c54" font-size="40">🤷</text>
  <text x="200" y="500" text-anchor="middle" fill="#928374" font-size="11">（必要なRoleが定義できていない）</text>

  <!-- Panel 2 -->
  <rect x="410" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="430" y="82" fill="#928374" font-size="13">② 望遠鏡でチームを見る</text>

  <rect x="440" y="100" width="310" height="150" rx="8" fill="#1d2021" stroke="#504945"/>
  <text x="455" y="122" fill="#8ec07c" font-size="11" font-family="monospace">$ eis team --recursive ~/workspace</text>

  <text x="455" y="150" fill="#928374" font-size="11" font-family="monospace">Role Distribution:</text>
  <text x="455" y="172" fill="#ebdbb2" font-size="12" font-family="monospace">  Architect: 1  (machuz)</text>
  <text x="455" y="192" fill="#ebdbb2" font-size="12" font-family="monospace">  Anchor:    2  (R.S., P.)</text>
  <text x="455" y="212" fill="#fb4934" font-size="12" font-family="monospace">  Producer:  0  ← ここが空</text>
  <text x="455" y="232" fill="#928374" font-size="12" font-family="monospace">  Cleaner:   0</text>

  <!-- Warning -->
  <rect x="440" y="265" width="310" height="50" rx="8" fill="#1d2021" stroke="#fb4934"/>
  <text x="455" y="285" fill="#fb4934" font-size="12">⚠ Producer Vacuum</text>
  <text x="455" y="303" fill="#928374" font-size="11">構造の上で量を生産する層が空</text>

  <!-- Solution -->
  <rect x="440" y="330" width="310" height="100" rx="8" fill="#3c3836"/>
  <text x="455" y="355" fill="#fabd2f" font-size="14" font-weight="600">必要なのは「Go経験3年」じゃない。</text>
  <text x="455" y="380" fill="#8ec07c" font-size="13">「既存の構造の上で</text>
  <text x="455" y="400" fill="#8ec07c" font-size="13">　量を生産できるProducer」が必要。</text>
  <text x="455" y="420" fill="#928374" font-size="11">JDが構造から自動的に定義される</text>

  <!-- Happy team -->
  <circle cx="500" cy="480" r="18" fill="#458588"/>
  <text x="500" y="487" text-anchor="middle" fill="#1d2021" font-size="9">CTO</text>
  <rect x="530" y="465" width="200" height="30" rx="8" fill="#3c3836"/>
  <text x="540" y="485" fill="#ebdbb2" font-size="12">「これがJDになるじゃん」</text>

  <!-- Footer -->
  <text x="400" y="565" text-anchor="middle" fill="#fabd2f" font-size="14" font-weight="600">採用は勘じゃない。チームの構造が教えてくれる。</text>
  <text x="400" y="585" text-anchor="middle" fill="#504945" font-size="11">ace — the Git Telescope</text>
</svg>
