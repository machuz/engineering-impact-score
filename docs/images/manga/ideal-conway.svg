<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Hiragino Kaku Gothic ProN', sans-serif">
  <rect width="800" height="600" fill="#1d2021"/>
  <text x="400" y="35" text-anchor="middle" fill="#d3869b" font-size="18" font-weight="700">ideal 2コマ — 「コンウェイの法則」</text>

  <!-- Panel 1 -->
  <rect x="30" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="50" y="82" fill="#928374" font-size="13">① なぜかバグが多いモジュール</text>

  <!-- CTO -->
  <circle cx="200" cy="150" r="28" fill="#458588"/>
  <text x="200" y="157" text-anchor="middle" fill="#1d2021" font-size="12">CTO</text>

  <rect x="80" y="190" width="260" height="40" rx="10" fill="#3c3836"/>
  <polygon points="200,190 190,175 210,175" fill="#3c3836"/>
  <text x="95" y="215" fill="#ebdbb2" font-size="12">「決済モジュール、また障害だ…」</text>

  <!-- Module map -->
  <rect x="70" y="250" width="290" height="180" rx="8" fill="#1d2021" stroke="#504945"/>
  <text x="90" y="275" fill="#928374" font-size="12">モジュール × オーナー</text>

  <rect x="90" y="290" width="120" height="35" rx="4" fill="#fb4934" opacity="0.3" stroke="#fb4934"/>
  <text x="100" y="312" fill="#fb4934" font-size="11">決済</text>
  <text x="170" y="312" fill="#928374" font-size="10">owner: ???</text>

  <rect x="90" y="335" width="120" height="35" rx="4" fill="#8ec07c" opacity="0.2" stroke="#8ec07c"/>
  <text x="100" y="357" fill="#8ec07c" font-size="11">認証</text>
  <text x="170" y="357" fill="#928374" font-size="10">owner: P</text>

  <rect x="90" y="380" width="120" height="35" rx="4" fill="#8ec07c" opacity="0.2" stroke="#8ec07c"/>
  <text x="100" y="402" fill="#8ec07c" font-size="11">通知</text>
  <text x="170" y="402" fill="#928374" font-size="10">owner: Q</text>

  <text x="210" y="455" text-anchor="middle" fill="#fb4934" font-size="12">決済モジュール: Orphaned</text>
  <text x="210" y="475" text-anchor="middle" fill="#928374" font-size="11">3人が少しずつ触って、誰も持ってない</text>

  <!-- Panel 2 -->
  <rect x="410" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="430" y="82" fill="#928374" font-size="13">② Conway's Law 検証</text>

  <rect x="440" y="100" width="310" height="170" rx="8" fill="#1d2021" stroke="#d3869b"/>
  <text x="455" y="122" fill="#d3869b" font-size="12" font-weight="600">orbitlens ideal — Conway's Law 検証</text>

  <text x="455" y="150" fill="#928374" font-size="11" font-family="monospace">Module        Owner  Frag   Coupling</text>
  <text x="455" y="172" fill="#fb4934" font-size="11" font-family="monospace">payment       —      0.92   Hub</text>
  <text x="455" y="194" fill="#8ec07c" font-size="11" font-family="monospace">auth          P      0.15   Independent</text>
  <text x="455" y="216" fill="#8ec07c" font-size="11" font-family="monospace">notification  Q      0.22   Independent</text>

  <text x="455" y="250" fill="#fb4934" font-size="11">payment: Orphaned × Hub × Critical</text>
  <text x="455" y="268" fill="#928374" font-size="10">→ 所有者なし、暗黙結合の中心、変更圧高い。最大リスク。</text>

  <!-- Insight -->
  <rect x="440" y="290" width="310" height="100" rx="8" fill="#3c3836"/>
  <text x="455" y="315" fill="#d3869b" font-size="13">Conway's Law:</text>
  <text x="455" y="338" fill="#ebdbb2" font-size="12">組織構造がコード構造を決める。</text>
  <text x="455" y="358" fill="#ebdbb2" font-size="12">決済チームが存在しない → 決済モジュールが</text>
  <text x="455" y="378" fill="#fabd2f" font-size="12">Orphaned になるのは必然。</text>

  <!-- Recommendation -->
  <rect x="440" y="405" width="310" height="80" rx="8" fill="#1d2021" stroke="#d3869b"/>
  <text x="455" y="428" fill="#d3869b" font-size="12" font-weight="600">推奨アクション</text>
  <text x="455" y="450" fill="#ebdbb2" font-size="11">1. payment モジュールに明確なオーナーを配置</text>
  <text x="455" y="470" fill="#ebdbb2" font-size="11">2. 組織構造をモジュール境界に合わせる</text>
  <text x="455" y="485" fill="#8ec07c" font-size="10">予測: Orphaned 解消 → 障害率 60% 減</text>

  <!-- CTO -->
  <circle cx="590" cy="520" r="20" fill="#458588"/>
  <text x="590" y="527" text-anchor="middle" fill="#1d2021" font-size="10">CTO</text>
  <text x="630" y="520" fill="#d3869b" font-size="11">「コードの問題じゃなく組織の問題だった」</text>

  <!-- Footer -->
  <text x="400" y="565" text-anchor="middle" fill="#d3869b" font-size="14" font-weight="600">コードの形は、組織の形。望遠鏡はそれを映す。</text>
  <text x="400" y="585" text-anchor="middle" fill="#504945" font-size="11">orbitlens ideal — Navigate by gravity, not by noise.</text>
</svg>
