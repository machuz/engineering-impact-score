<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Hiragino Kaku Gothic ProN', sans-serif">
  <rect width="800" height="600" fill="#1d2021"/>
  <text x="400" y="35" text-anchor="middle" fill="#fabd2f" font-size="18" font-weight="700">ace 2コマ — 「量と質」</text>

  <!-- Panel 1 -->
  <rect x="30" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="50" y="82" fill="#928374" font-size="13">① PR数ランキング</text>

  <!-- Leaderboard -->
  <rect x="70" y="110" width="280" height="200" rx="8" fill="#1d2021" stroke="#504945"/>
  <text x="90" y="135" fill="#8ec07c" font-size="13">📊 今月のPR数</text>

  <text x="90" y="170" fill="#fabd2f" font-size="16" font-weight="700">🥇 A — 47 PRs</text>
  <text x="90" y="200" fill="#ebdbb2" font-size="14">🥈 B — 31 PRs</text>
  <text x="90" y="230" fill="#ebdbb2" font-size="14">🥉 C — 28 PRs</text>
  <text x="90" y="260" fill="#928374" font-size="14">　4. D — 12 PRs</text>
  <text x="90" y="290" fill="#928374" font-size="14">　5. E — 8 PRs</text>

  <!-- Manager celebrating A -->
  <circle cx="200" cy="400" r="25" fill="#d79921"/>
  <text x="200" y="407" text-anchor="middle" fill="#1d2021" font-size="12">A</text>

  <rect x="80" y="350" width="250" height="30" rx="8" fill="#3c3836"/>
  <text x="95" y="370" fill="#ebdbb2" font-size="13">「Aさんすごい！MVP！」🎉</text>

  <text x="200" y="470" text-anchor="middle" fill="#928374" font-size="11">（Eさんは地味だから目立たない…）</text>

  <!-- Panel 2 -->
  <rect x="410" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="430" y="82" fill="#928374" font-size="13">② 望遠鏡で見ると</text>

  <rect x="440" y="100" width="310" height="230" rx="8" fill="#1d2021" stroke="#504945"/>
  <text x="455" y="122" fill="#8ec07c" font-size="11" font-family="monospace">$ eis analyze</text>

  <text x="455" y="152" fill="#928374" font-size="10" font-family="monospace">Member  Prod  Qual  Surv  Debt  Impact  Style</text>

  <text x="455" y="178" fill="#fb4934" font-size="11" font-family="monospace">A        93    28     5     3   24.1  Churn</text>
  <text x="455" y="200" fill="#ebdbb2" font-size="11" font-family="monospace">B        72    65    40    45   48.2  Balanced</text>
  <text x="455" y="222" fill="#ebdbb2" font-size="11" font-family="monospace">C        64    71    55    52   52.8  Builder</text>
  <text x="455" y="244" fill="#ebdbb2" font-size="11" font-family="monospace">D        35    82    68    70   55.1  Anchor</text>
  <text x="455" y="266" fill="#8ec07c" font-size="11" font-family="monospace">E         8    95    82    88   51.3  Anchor</text>

  <text x="455" y="300" fill="#fb4934" font-size="11">↑ A: PRは多いがSurvival 5。コードが残らない</text>
  <text x="455" y="318" fill="#8ec07c" font-size="11">↑ E: PRは少ないが書いたコードが残り続ける</text>

  <!-- Revelation -->
  <rect x="440" y="350" width="310" height="80" rx="8" fill="#3c3836"/>
  <text x="455" y="375" fill="#fabd2f" font-size="14">PR数 ≠ 貢献</text>
  <text x="455" y="400" fill="#ebdbb2" font-size="13">「残るコードを書く人」が見えた。</text>
  <text x="455" y="420" fill="#928374" font-size="11">Eさんはチームのダークマター（見えない重力）</text>

  <!-- E smiling -->
  <circle cx="590" cy="490" r="25" fill="#83a598"/>
  <text x="590" y="497" text-anchor="middle" fill="#1d2021" font-size="13">E</text>
  <text x="630" y="490" fill="#8ec07c" font-size="20">✨</text>

  <!-- Footer -->
  <text x="400" y="565" text-anchor="middle" fill="#fabd2f" font-size="14" font-weight="600">量ではなく、残るかどうか。</text>
  <text x="400" y="585" text-anchor="middle" fill="#504945" font-size="11">ace — the Git Telescope</text>
</svg>
