<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Boundary Conditions — the OrbitLens Library inner cosmos under pressure from the outer cosmos of market, capital, labor, and chance.">
  <defs>
    <linearGradient id="outer-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b0d17"/>
      <stop offset="1" stop-color="#0f1824"/>
    </linearGradient>
    <linearGradient id="inner-bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#22163a"/>
      <stop offset="1" stop-color="#141628"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1b1c38"/>
      <stop offset="1" stop-color="#141628"/>
    </linearGradient>
    <marker id="pressure" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#a188ed"/>
    </marker>
    <marker id="noise" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#6b5a9a" opacity="0.7"/>
    </marker>
  </defs>

  <style>
    .inner-ttl { font: 700 14px 'Inter Tight','Inter','Zen Kaku Gothic New',sans-serif; fill:#f2e4c0 }
    .inner-ja  { font: 500 11px 'Zen Kaku Gothic New','Inter',sans-serif; fill:#a188ed; letter-spacing:0.5px }
    .inner-tag { font: 500 10px 'JetBrains Mono',monospace; fill:#7c5ce0; letter-spacing:2px; text-transform:uppercase }
    .outer-ttl { font: 600 13px 'Zen Kaku Gothic New','Inter',sans-serif; fill:#d0b8f0 }
    .outer-sub { font: 400 10px 'Inter',sans-serif; fill:#6b5a9a; font-style:italic }
    .coef-en   { font: 500 10px 'JetBrains Mono',monospace; fill:#a188ed; letter-spacing:1.5px }
    .coef-ja   { font: 500 10px 'Zen Kaku Gothic New','Inter',sans-serif; fill:#ebdbb2 }
    .cap       { font: 500 10px 'JetBrains Mono',monospace; fill:#7c5ce0; letter-spacing:2.5px; text-transform:uppercase }
    .label     { font: 500 10px 'JetBrains Mono',monospace; fill:#8e8775; letter-spacing:2px; text-transform:uppercase }
  </style>

  <!-- outer cosmos background -->
  <rect x="0" y="0" width="960" height="540" fill="url(#outer-bg)"/>

  <!-- outer cosmos header -->
  <text class="label" x="480" y="36" text-anchor="middle">Outer Cosmos  ·  外宇宙</text>

  <!-- outer cosmos corner labels -->
  <g>
    <text class="outer-ttl" x="70"  y="78">市場</text>
    <text class="outer-sub" x="70"  y="94">market · competition · regulation</text>
  </g>
  <g>
    <text class="outer-ttl" x="890" y="78" text-anchor="end">資本</text>
    <text class="outer-sub" x="890" y="94" text-anchor="end">capital · runway · burn rate</text>
  </g>
  <g>
    <text class="outer-ttl" x="70"  y="490">労働市場</text>
    <text class="outer-sub" x="70"  y="506">labor market · comp · exit fairness</text>
  </g>
  <g>
    <text class="outer-ttl" x="890" y="490" text-anchor="end">偶然</text>
    <text class="outer-sub" x="890" y="506" text-anchor="end">chance · discontinuity · noise</text>
  </g>

  <!-- boundary membrane (dashed ellipse) -->
  <ellipse cx="480" cy="270" rx="300" ry="165" fill="none" stroke="#7c5ce0" stroke-width="1.1" stroke-dasharray="3 5" opacity="0.55"/>

  <!-- inner cosmos capsule -->
  <rect x="245" y="150" width="470" height="240" rx="14" fill="url(#inner-bg)" stroke="#3c2d70" stroke-width="1.4"/>
  <text class="inner-tag" x="480" y="178" text-anchor="middle">Inner Cosmos  ·  内宇宙</text>

  <!-- 3 books -->
  <g transform="translate(265 198)">
    <rect width="430" height="48" rx="7" fill="url(#card-bg)" stroke="#3c2d70" stroke-width="1"/>
    <rect width="3" height="48" fill="#a188ed"/>
    <text class="inner-ttl" x="16" y="22">Psychological OS</text>
    <text class="inner-ja"  x="16" y="40">心理OS  ·  個人の作動原理</text>
    <text class="inner-tag" x="414" y="22" text-anchor="end">Book 1</text>
  </g>
  <g transform="translate(265 254)">
    <rect width="430" height="48" rx="7" fill="url(#card-bg)" stroke="#3c2d70" stroke-width="1"/>
    <rect width="3" height="48" fill="#a188ed"/>
    <text class="inner-ttl" x="16" y="22">Structure-Driven Organization</text>
    <text class="inner-ja"  x="16" y="40">構造駆動  ·  組織設計の物理</text>
    <text class="inner-tag" x="414" y="22" text-anchor="end">Book 2</text>
  </g>
  <g transform="translate(265 310)">
    <rect width="430" height="48" rx="7" fill="url(#card-bg)" stroke="#3c2d70" stroke-width="1"/>
    <rect width="3" height="48" fill="#a188ed"/>
    <text class="inner-ttl" x="16" y="22">Git Archaeology</text>
    <text class="inner-ja"  x="16" y="40">git考古学  ·  観測の実録</text>
    <text class="inner-tag" x="414" y="22" text-anchor="end">Book 3</text>
  </g>

  <!-- pressure arrows (coefficient vectors) -->
  <!-- top-right: capital → TIME_COMPRESSION -->
  <g>
    <line x1="820" y1="125" x2="700" y2="205" stroke="#a188ed" stroke-width="1.3" marker-end="url(#pressure)"/>
    <text class="coef-en" x="818" y="145" text-anchor="end">TIME_COMPRESSION</text>
    <text class="coef-ja" x="818" y="160" text-anchor="end">時間圧縮係数</text>
  </g>
  <!-- top-left: market → STRUCTURE_ADAPTATION -->
  <g>
    <line x1="140" y1="125" x2="260" y2="205" stroke="#a188ed" stroke-width="1.3" marker-end="url(#pressure)"/>
    <text class="coef-en" x="142" y="145">STRUCTURE_ADAPTATION</text>
    <text class="coef-ja" x="142" y="160">構造適応圧</text>
  </g>
  <!-- bottom-left: labor market → HEAT_RETENTION -->
  <g>
    <line x1="140" y1="440" x2="260" y2="355" stroke="#a188ed" stroke-width="1.3" marker-end="url(#pressure)"/>
    <text class="coef-en" x="142" y="425">HEAT_RETENTION</text>
    <text class="coef-ja" x="142" y="410">熱の保持係数</text>
  </g>
  <!-- bottom-right: chance → noise ε (dashed) -->
  <g>
    <line x1="820" y1="440" x2="700" y2="355" stroke="#6b5a9a" stroke-width="1.1" stroke-dasharray="3 3" marker-end="url(#noise)" opacity="0.8"/>
    <text class="coef-en" x="818" y="425" text-anchor="end" fill="#8e8775">RESIDUAL · ε</text>
    <text class="coef-ja" x="818" y="410" text-anchor="end" fill="#8e8775">不可観測ノイズ</text>
  </g>

  <!-- caption -->
  <text class="cap" x="480" y="518" text-anchor="middle">observe what can be observed  ·  treat the rest as pressure</text>
</svg>
