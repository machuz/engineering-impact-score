<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <clipPath id="lens3">
      <circle cx="256" cy="256" r="200"/>
    </clipPath>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fabd2f" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#d79921" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#282828" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#1d2021"/>

  <!-- Double ring aperture -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#504945" stroke-width="3" opacity="0.6"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#504945" stroke-width="5"/>
  <circle cx="256" cy="256" r="195" fill="none" stroke="#3c3836" stroke-width="1.5"/>

  <!-- Aperture blade hints (6 blades) -->
  <line x1="256" y1="56" x2="256" y2="36" stroke="#665c54" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="476" x2="256" y2="456" stroke="#665c54" stroke-width="2" opacity="0.4"/>
  <line x1="56" y1="256" x2="36" y2="256" stroke="#665c54" stroke-width="2" opacity="0.4"/>
  <line x1="476" y1="256" x2="456" y2="256" stroke="#665c54" stroke-width="2" opacity="0.4"/>
  <!-- Diagonal blades -->
  <line x1="115" y1="115" x2="101" y2="101" stroke="#665c54" stroke-width="2" opacity="0.4"/>
  <line x1="397" y1="397" x2="411" y2="411" stroke="#665c54" stroke-width="2" opacity="0.4"/>
  <line x1="397" y1="115" x2="411" y2="101" stroke="#665c54" stroke-width="2" opacity="0.4"/>
  <line x1="115" y1="397" x2="101" y2="411" stroke="#665c54" stroke-width="2" opacity="0.4"/>

  <g clip-path="url(#lens3)">
    <circle cx="256" cy="256" r="200" fill="#282828"/>
    <circle cx="256" cy="256" r="160" fill="url(#glow3)"/>

    <!-- Dense star field — ch9 Big Bang explosion pattern -->
    <!-- Expansion wavefronts -->
    <circle cx="256" cy="256" r="140" fill="none" stroke="#d79921" stroke-width="0.6" opacity="0.1"/>
    <circle cx="256" cy="256" r="105" fill="none" stroke="#d79921" stroke-width="0.7" opacity="0.15"/>
    <circle cx="256" cy="256" r="70" fill="none" stroke="#fabd2f" stroke-width="0.8" opacity="0.2"/>
    <circle cx="256" cy="256" r="38" fill="none" stroke="#fabd2f" stroke-width="1" opacity="0.35"/>

    <!-- Central bright core -->
    <circle cx="256" cy="256" r="20" fill="#fabd2f" opacity="0.06"/>
    <circle cx="256" cy="256" r="12" fill="#fabd2f" opacity="0.1"/>
    <circle cx="256" cy="256" r="5" fill="#ebdbb2" opacity="0.95"/>

    <!-- Stars bursting outward (radial pattern from center) -->
    <!-- Layer 1 — close -->
    <circle cx="230" cy="225" r="4" fill="#fabd2f" opacity="0.9"/>
    <circle cx="285" cy="235" r="3.5" fill="#b8bb26" opacity="0.85"/>
    <circle cx="270" cy="285" r="4" fill="#d3869b" opacity="0.9"/>
    <circle cx="238" cy="280" r="3.5" fill="#83a598" opacity="0.85"/>

    <!-- Layer 2 -->
    <circle cx="195" cy="185" r="4.5" fill="#8ec07c" opacity="0.75"/>
    <circle cx="325" cy="200" r="4" fill="#fabd2f" opacity="0.7"/>
    <circle cx="330" cy="300" r="4.5" fill="#b8bb26" opacity="0.75"/>
    <circle cx="180" cy="310" r="4" fill="#fb4934" opacity="0.55"/>
    <circle cx="300" cy="340" r="4" fill="#83a598" opacity="0.6"/>
    <circle cx="210" cy="340" r="3.5" fill="#d3869b" opacity="0.6"/>
    <circle cx="310" cy="185" r="3.5" fill="#fabd2f" opacity="0.6"/>
    <circle cx="195" cy="200" r="3" fill="#ebdbb2" opacity="0.5"/>

    <!-- Layer 3 — far -->
    <circle cx="145" cy="140" r="3.5" fill="#83a598" opacity="0.45"/>
    <circle cx="370" cy="145" r="4" fill="#d3869b" opacity="0.45"/>
    <circle cx="385" cy="260" r="3.5" fill="#b8bb26" opacity="0.4"/>
    <circle cx="130" cy="270" r="3.5" fill="#8ec07c" opacity="0.4"/>
    <circle cx="375" cy="370" r="3.5" fill="#fb4934" opacity="0.35"/>
    <circle cx="140" cy="375" r="4" fill="#fabd2f" opacity="0.4"/>
    <circle cx="370" cy="180" r="3" fill="#b8bb26" opacity="0.35"/>
    <circle cx="145" cy="185" r="3" fill="#d3869b" opacity="0.35"/>

    <!-- Expansion rays from center -->
    <line x1="260" y1="252" x2="325" y2="200" stroke="#fabd2f" stroke-width="0.5" opacity="0.12"/>
    <line x1="252" y1="252" x2="195" y2="185" stroke="#fabd2f" stroke-width="0.5" opacity="0.12"/>
    <line x1="260" y1="260" x2="330" y2="300" stroke="#fabd2f" stroke-width="0.5" opacity="0.12"/>
    <line x1="252" y1="260" x2="180" y2="310" stroke="#fabd2f" stroke-width="0.5" opacity="0.12"/>
    <line x1="256" y1="250" x2="256" y2="145" stroke="#fabd2f" stroke-width="0.5" opacity="0.1"/>
    <line x1="256" y1="262" x2="256" y2="370" stroke="#fabd2f" stroke-width="0.5" opacity="0.1"/>

    <!-- Constellation connections (architecture) -->
    <line x1="230" y1="225" x2="285" y2="235" stroke="#665c54" stroke-width="0.7" opacity="0.25"/>
    <line x1="285" y1="235" x2="270" y2="285" stroke="#665c54" stroke-width="0.7" opacity="0.25"/>
    <line x1="270" y1="285" x2="238" y2="280" stroke="#665c54" stroke-width="0.7" opacity="0.25"/>
    <line x1="238" y1="280" x2="230" y2="225" stroke="#665c54" stroke-width="0.7" opacity="0.25"/>
    <line x1="195" y1="185" x2="230" y2="225" stroke="#665c54" stroke-width="0.5" opacity="0.18"/>
    <line x1="325" y1="200" x2="285" y2="235" stroke="#665c54" stroke-width="0.5" opacity="0.18"/>
  </g>
</svg>
