<script>
(function() {
  const RAW = 'https://raw.githubusercontent.com/machuz/eis/main/docs/blog-ja-zenn-complete.md?t=' + Date.now();
  const content = document.getElementById('article-content');
  const progressBar = document.getElementById('progress-bar');

  const renderer = new marked.Renderer();
  marked.use({ renderer, gfm: true });

  fetch(RAW).then(r => r.text()).then(md => {
    const body = md.replace(/^---[\s\S]*?---\s*/, '');
    content.innerHTML = marked.parse(body);
    // Copy buttons
    content.querySelectorAll('pre').forEach(pre => {
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(pre.querySelector('code')?.textContent || pre.textContent);
          btn.textContent = '✓ Copied';
          setTimeout(() => btn.textContent = 'Copy', 1400);
        } catch {}
      });
      pre.appendChild(btn);
    });
  }).catch(() => {
    content.innerHTML = '<div class="chapter-loading">読み込みに失敗しました。</div>';
  });

  let raf = null;
  function upd() {
    if (raf) return;
    raf = requestAnimationFrame(() => {
      raf = null;
      const d = document.documentElement;
      const pct = (window.scrollY / (d.scrollHeight - d.clientHeight)) * 100;
      progressBar.style.width = Math.max(0, Math.min(100, pct)) + '%';
    });
  }
  window.addEventListener('scroll', upd, { passive: true });
})();
</script>
