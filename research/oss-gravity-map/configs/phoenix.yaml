# EIS config for phoenix
# Language: elixir
#
# Architecture patterns define which files represent structural decisions.
# Submit a PR to improve these patterns for fairer analysis.
# See: https://github.com/machuz/eis/tree/main/research/oss-gravity-map

sample_size: 500
blame_timeout: 120

exclude_file_patterns:
  - "package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"
  - "go.sum"
  - "*generated*"
  - "*.gen.*"
  - "*_test.go"
  - "*_test.rs"
  - "*_test.py"
  - "test_*.py"
  - "**/test/**"
  - "**/tests/**"
  - "**/testdata/**"
  - "**/fixtures/**"
  - "vendor/**"
  - "node_modules/**"
  - "*.pb.go"
  - "*.pb.cc"
  - "*.pb.h"

architecture_patterns:
  - "*/types/*"
  - "*/core/*"
  - "*/internal/*"
  - "*/router*.ex"
  - "*/endpoint*.ex"
  - "*/channel*.ex"
  - "*/socket*.ex"
  - "*/plug/*.ex"
  - "*/controller*.ex"
  - "*/live/*.ex"
  - "*/config/*.exs"
  - "mix.exs"
  - "lib/phoenix/router*.ex"
  - "lib/phoenix/endpoint*.ex"
  - "lib/phoenix/channel*.ex"
  - "lib/phoenix/socket*.ex"
  - "lib/phoenix/controller*.ex"

blame_extensions:
  - "*.ex"
  - "*.exs"

aliases:
  "chrismccord": "Chris McCord"
  "José Valim": "Jose Valim"
  "josevalim": "Jose Valim"

exclude_authors:
  - "github-actions[bot]"
  - "renovate[bot]"
  - "dependabot[bot]"
  - "web-flow"
  - "bors[bot]"
  - "rust-timer"
  - "rust-log-analyzer"

