# EIS config for rust
# Language: rust
#
# Architecture patterns define which files represent structural decisions.
# Submit a PR to improve these patterns for fairer analysis.
# See: https://github.com/machuz/eis/tree/main/research/oss-gravity-map

sample_size: 1500
blame_timeout: 300

exclude_file_patterns:
  - "package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"
  - "go.sum"
  - "*generated*"
  - "*.gen.*"
  - "*_test.go"
  - "*_test.rs"
  - "*_test.py"
  - "test_*.py"
  - "**/test/**"
  - "**/tests/**"
  - "**/testdata/**"
  - "**/fixtures/**"
  - "vendor/**"
  - "node_modules/**"
  - "*.pb.go"
  - "*.pb.cc"
  - "*.pb.h"
  - "**/tests/**"
  - "src/test/**"

architecture_patterns:
  - "*/types/*"
  - "*/core/*"
  - "*/internal/*"
  - "*/lib.rs"
  - "*/mod.rs"
  - "*/traits/*.rs"
  - "**/trait*.rs"
  - "*/compiler/*.rs"
  - "*/parser/*.rs"
  - "*/ast/*.rs"
  - "*/ir/*.rs"
  - "*/codegen/*.rs"
  - "*/typeck/*.rs"
  - "*/resolve/*.rs"
  - "*/hir/*.rs"
  - "*/mir/*.rs"
  - "compiler/rustc/src/*.rs"
  - "compiler/rustc_middle/src/**/*.rs"
  - "compiler/rustc_typeck/src/**/*.rs"
  - "compiler/rustc_resolve/src/**/*.rs"
  - "compiler/rustc_codegen_llvm/src/**/*.rs"
  - "library/core/src/**/*.rs"
  - "library/std/src/**/*.rs"

blame_extensions:
  - "*.rs"

aliases:
  "graydon": "Graydon Hoare"
  "nikomatsakis": "Niko Matsakis"
  "aturon": "Aaron Turon"
  "Felix S Klock II": "Felix Klock"
  "pnkfelix": "Felix Klock"
  "eddyb": "Eduard-Mihai Burtescu"
  "alexcrichton": "Alex Crichton"
  "Manishearth": "Manish Goregaokar"

exclude_authors:
  - "github-actions[bot]"
  - "renovate[bot]"
  - "dependabot[bot]"
  - "web-flow"
  - "bors[bot]"
  - "rust-timer"
  - "rust-log-analyzer"
  - "bors"
  - "rustbot"

