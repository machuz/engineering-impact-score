# EIS config for prettier
# Language: javascript
#
# Architecture patterns define which files represent structural decisions.
# Submit a PR to improve these patterns for fairer analysis.
# See: https://github.com/machuz/eis/tree/main/research/oss-gravity-map

sample_size: 500
blame_timeout: 120

exclude_file_patterns:
  - "package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"
  - "go.sum"
  - "*generated*"
  - "*.gen.*"
  - "*_test.go"
  - "*_test.rs"
  - "*_test.py"
  - "test_*.py"
  - "**/test/**"
  - "**/tests/**"
  - "**/testdata/**"
  - "**/fixtures/**"
  - "vendor/**"
  - "node_modules/**"
  - "*.pb.go"
  - "*.pb.cc"
  - "*.pb.h"

architecture_patterns:
  - "*/types/*"
  - "*/core/*"
  - "*/internal/*"
  - "*/router*.js"
  - "*/middleware/*.js"
  - "*/core/*.js"
  - "*/lib/*.js"
  - "*/plugin*.js"
  - "*/config*.js"
  - "*/index.js"
  - "*/application.js"
  - "src/language-*/index.js"
  - "src/language-*/parser*.js"
  - "src/language-*/printer*.js"
  - "src/main/*.js"
  - "src/common/*.js"

blame_extensions:
  - "*.js"
  - "*.mjs"
  - "*.cjs"

exclude_authors:
  - "github-actions[bot]"
  - "renovate[bot]"
  - "dependabot[bot]"
  - "web-flow"
  - "bors[bot]"
  - "rust-timer"
  - "rust-log-analyzer"

