# EIS config for react
# Language: javascript
#
# Architecture patterns define which files represent structural decisions.
# Submit a PR to improve these patterns for fairer analysis.
# See: https://github.com/machuz/engineering-impact-score/tree/main/research/oss-gravity-map

sample_size: 1000
blame_timeout: 600

exclude_file_patterns:
  - "package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"
  - "go.sum"
  - "*generated*"
  - "*.gen.*"
  - "*_test.go"
  - "*_test.rs"
  - "*_test.py"
  - "test_*.py"
  - "**/test/**"
  - "**/tests/**"
  - "**/testdata/**"
  - "**/fixtures/**"
  - "vendor/**"
  - "node_modules/**"
  - "*.pb.go"
  - "*.pb.cc"
  - "*.pb.h"
  - "*.test.js"
  - "*.test.ts"
  - "**/__tests__/**"

architecture_patterns:
  - "*/types/*"
  - "*/core/*"
  - "*/internal/*"
  - "*/router*.js"
  - "*/middleware/*.js"
  - "*/core/*.js"
  - "*/lib/*.js"
  - "*/plugin*.js"
  - "*/config*.js"
  - "*/index.js"
  - "*/application.js"
  - "packages/react/src/*.js"
  - "packages/react-dom/src/*.js"
  - "packages/react-reconciler/src/*.js"
  - "packages/scheduler/src/*.js"
  - "packages/shared/*.js"

blame_extensions:
  - "*.js"
  - "*.mjs"
  - "*.cjs"
  - "*.ts"
  - "*.tsx"

aliases:
  "dan": "Dan Abramov"
  "gaearon": "Dan Abramov"
  "sebmarkbage": "Sebastian Markbage"
  "acdlite": "Andrew Clark"
  "sophiebits": "Sophie Alpert"
  "Ben Alpert": "Sophie Alpert"
  "jordwalke": "Jordan Walke"

exclude_authors:
  - "github-actions[bot]"
  - "renovate[bot]"
  - "dependabot[bot]"
  - "web-flow"
  - "bors[bot]"
  - "rust-timer"
  - "rust-log-analyzer"

