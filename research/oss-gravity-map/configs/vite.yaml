# EIS config for vite
# Language: typescript
#
# Architecture patterns define which files represent structural decisions.
# Submit a PR to improve these patterns for fairer analysis.
# See: https://github.com/machuz/eis/tree/main/research/oss-gravity-map

sample_size: 500
blame_timeout: 120

exclude_file_patterns:
  - "package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"
  - "go.sum"
  - "*generated*"
  - "*.gen.*"
  - "*_test.go"
  - "*_test.rs"
  - "*_test.py"
  - "test_*.py"
  - "**/test/**"
  - "**/tests/**"
  - "**/testdata/**"
  - "**/fixtures/**"
  - "vendor/**"
  - "node_modules/**"
  - "*.pb.go"
  - "*.pb.cc"
  - "*.pb.h"
  - "*.spec.ts"

architecture_patterns:
  - "*/types/*"
  - "*/core/*"
  - "*/internal/*"
  - "*/router*.ts"
  - "*/middleware/*.ts"
  - "*/core/*.ts"
  - "*/decorators/*.ts"
  - "*/interfaces/*.ts"
  - "**/interface*.ts"
  - "*/plugin*.ts"
  - "*/config*.ts"
  - "*/factory*.ts"
  - "*/module*.ts"
  - "*/provider*.ts"
  - "packages/vite/src/node/**/*.ts"
  - "packages/vite/src/node/server/**/*.ts"
  - "packages/vite/src/node/plugins/**/*.ts"
  - "packages/vite/src/node/optimizer/**/*.ts"

blame_extensions:
  - "*.ts"
  - "*.tsx"

aliases:
  "yyx990803": "Evan You"

exclude_authors:
  - "github-actions[bot]"
  - "renovate[bot]"
  - "dependabot[bot]"
  - "web-flow"
  - "bors[bot]"
  - "rust-timer"
  - "rust-log-analyzer"

