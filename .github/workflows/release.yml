name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        if: success()
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN not set, skipping Homebrew tap update"
            exit 0
          fi
          git clone https://x-access-token:${TAP_TOKEN}@github.com/machuz/homebrew-tap.git /tmp/homebrew-tap
          cp dist/homebrew/eis.rb /tmp/homebrew-tap/eis.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add eis.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "update eis to ${GITHUB_REF_NAME}"
          git push
