name: Publish Blog Posts

on:
  push:
    branches: [main]
    paths:
      - 'docs/blog-*.md'

  # Manual trigger
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - init
          - publish-all
          - publish-file
        default: 'init'
      file:
        description: 'File path (only for publish-file, e.g. docs/blog-en-devto-ch8.md)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need HEAD~1 for diff

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Publish changed blog posts
        if: github.event_name == 'push'
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          HATENA_USER_ID: ${{ secrets.HATENA_USER_ID }}
          HATENA_BLOG_ID: ${{ secrets.HATENA_BLOG_ID }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
        run: python scripts/publish-blog.py --changed

      - name: Initialize mapping
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'init'
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          HATENA_USER_ID: ${{ secrets.HATENA_USER_ID }}
          HATENA_BLOG_ID: ${{ secrets.HATENA_BLOG_ID }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
        run: python scripts/publish-blog.py --init

      - name: Publish specific file
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'publish-file'
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          HATENA_USER_ID: ${{ secrets.HATENA_USER_ID }}
          HATENA_BLOG_ID: ${{ secrets.HATENA_BLOG_ID }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
        run: python scripts/publish-blog.py "${{ inputs.file }}"

      - name: Publish all blog posts
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'publish-all'
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          HATENA_USER_ID: ${{ secrets.HATENA_USER_ID }}
          HATENA_BLOG_ID: ${{ secrets.HATENA_BLOG_ID }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
        run: |
          for f in docs/blog-*.md; do
            python scripts/publish-blog.py "$f"
            # Space requests to stay under dev.to rate limits (HTTP 429).
            sleep 1
          done

      - name: Commit mapping updates
        run: |
          if git diff --quiet docs/.blog-mapping.json 2>/dev/null; then
            echo "No mapping changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/.blog-mapping.json
            git commit -m "chore: update blog mapping [skip ci]"
            git pull --rebase origin main
            git push
          fi
