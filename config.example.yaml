# Engineering Impact Score - Configuration
# Copy this file to eis.yaml and customize for your team.

# Git author aliases (map variant names to canonical name)
aliases:
  # "Git Name": "Canonical Name"
  # "John D.": "john-doe"
  # "john.doe@company.com": "john-doe"

# Authors to exclude from analysis
exclude_authors:
  - "github-actions[bot]"
  - "renovate[bot]"
  - "dependabot[bot]"

# Domain classification (overrides auto-detection from file extensions)
# Repos not listed here use auto-detection.
# Scores are normalized within each domain separately.
#
# Two formats supported:
#   Legacy (list of repo patterns):
#     backend: [api, worker]
#   Extended (object with repos and/or extensions):
#     mobile:
#       repos: [ios-app, android-app]
#       extensions: [.swift, .kt]
#
# Custom extensions override defaults (e.g. .ts defaults to Frontend,
# but you can reassign it to Backend with extensions: [.ts]).
domains:
  backend:
    - api
    - worker
    - auth-service
  frontend:
    - web-app
    - admin
  # Custom domain example:
  # mobile:
  #   repos:
  #     - ios-app
  #     - android-app
  #   extensions:
  #     - .swift
  #     - .kt
  # data:
  #   extensions:
  #     - .ipynb
  # infra:
  #   - terraform
  #   - deployment
  # firmware:
  #   - embedded-controller

# Repos to exclude from analysis
exclude_repos:
  - docs-only-repo
  - deprecated-service

# Architecture files for Design score (glob patterns, top-level)
architecture_patterns:
  - "*/repository/*interface*"
  - "*/domainservice/"
  - "*/router.go"
  - "*/middleware/"
  - "di/*.go"
  - "*/core/"
  - "*/stores/"
  - "*/hooks/"
  - "*/types/"

# File extensions to include in blame analysis (top-level)
blame_extensions:
  - "*.go"
  - "*.ts"
  - "*.tsx"
  - "*.py"
  - "*.rs"
  - "*.java"
  - "*.rb"
  - "*.c"
  - "*.h"
  - "*.cpp"
  - "*.hpp"
  - "*.cc"
  - "*.S"
  - "*.scala"
  - "*.hs"
  - "*.ml"
  - "*.mli"
  - "*.sql"

# Files to exclude from Production (lines changed) calculation
exclude_file_patterns:
  - "package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"
  - "go.sum"
  - "docs/swagger*"
  - "docs/doc.go"
  - "docs/openapi*"
  - "*generated*"
  - "mock_*"
  - "*.gen.*"

# Survival decay parameter
tau: 180  # days. weight = exp(-age / tau)

# Active days — how recently an author must have committed to be marked "active"
active_days: 30  # default 30 days (1 month)

# Breadth axis — how an author's reach is counted.
#   unit:
#     auto   — repo unit for multi-repo analysis, module unit for a single
#              repo (monorepo). The unit is decided once per analysis run,
#              so every author in one run is counted the same way. (default)
#     repo   — always count distinct repos.
#     module — always count distinct modules (convention-aware).
#   min_commits — minimum commits in a repo/module for it to count toward
#                 Breadth. Applies to both repo-unit and module-unit. (default 3)
breadth:
  unit: auto
  min_commits: 3

# Glob patterns used by module resolution. Each `*` matches a SINGLE path
# component (no `/`). When a file path matches a pattern, the module
# identifier is the substituted prefix.
#
# Examples:
#   "services/*"   services/ace/backend/foo.go -> services/ace
#   "apps/*/lib"   apps/api/lib/utils/foo.go   -> apps/api/lib
#
# Multiple matches resolve to the LONGEST module identifier (most specific
# wins); ties are broken by first-listed. Paths that match nothing fall
# back to the conservative 2-component default (e.g. "a/b/c/d.go" -> "a/b").
#
# When omitted, the built-in default list is used:
#   [services/*, packages/*, apps/*, modules/*, libs/*]
# module_patterns:
#   - "services/*"
#   - "packages/*"
#   - "apps/*/lib"
#   - "modules/*"
#   - "libs/*"

# Per-repo overrides: when a repo name appears here with a non-empty
# `module_patterns`, that list REPLACES the org-level patterns for THAT
# repo only. The key is the repo's identifier (CLI: filepath.Base of the
# path you analyze; SaaS: typically "owner/name").
# repo_overrides:
#   ace:
#     module_patterns:
#       - "services/*"
#       - "packages/*"
#   "waitinglisthq/api-monorepo":
#     module_patterns:
#       - "apps/*/lib"
#       - "apps/*"

# Production baseline: daily lines changed for 100% score
production_daily_ref: 1000

# Debt cleanup threshold
# Members with fewer than this many total debt events get neutral score (50)
debt_threshold: 10

# Scoring weights (must sum to 1.0)
weights:
  production: 0.15
  quality: 0.10
  survival: 0.25
  design: 0.20
  breadth: 0.10
  debt_cleanup: 0.15
  indispensability: 0.05

# Bus factor thresholds
bus_factor:
  critical: 0.80  # >= 80% ownership = CRITICAL
  high: 0.60      # >= 60% ownership = HIGH

# Teams: named groups for `eis team` command (optional)
# If omitted, each domain is treated as a single team.
# teams:
#   backend-core:
#     domain: Backend       # must match a domain name
#     members:
#       - alice
#       - bob
#       - charlie
#   frontend-app:
#     domain: Frontend
#     members:
#       - dave
#       - eve
