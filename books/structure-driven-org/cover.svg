<svg xmlns="http://www.w3.org/2000/svg" width="500" height="700" viewBox="0 0 500 700">
  <defs>
    <!-- Background: 宇宙紺 with subtle inner darkening -->
    <radialGradient id="bg-sdo" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#120a3a"/>
      <stop offset="60%" stop-color="#0c0830"/>
      <stop offset="100%" stop-color="#07061f"/>
    </radialGradient>

    <!-- Red glow for translator intersection points -->
    <radialGradient id="translator-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c03030" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#c03030" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0c0830" stop-opacity="0"/>
    </radialGradient>

    <!-- Layer band fills: 紺紫 graded by depth -->
    <linearGradient id="layer-principle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#101050" stop-opacity="0"/>
      <stop offset="40%" stop-color="#101050" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#101050" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#101050" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="layer-intermediate" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a6a" stop-opacity="0"/>
      <stop offset="40%" stop-color="#1a1a6a" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#1a1a6a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a1a6a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="layer-implementation" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#242480" stop-opacity="0"/>
      <stop offset="40%" stop-color="#242480" stop-opacity="0.65"/>
      <stop offset="60%" stop-color="#242480" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#242480" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background: 宇宙紺 -->
  <rect width="500" height="700" fill="url(#bg-sdo)"/>

  <!-- Corner crosshair marks -->
  <g stroke="#3c3480" stroke-width="1" opacity="0.8" fill="none">
    <path d="M 20 36 L 20 20 L 36 20"/>
    <path d="M 464 20 L 480 20 L 480 36"/>
    <path d="M 20 664 L 20 680 L 36 680"/>
    <path d="M 464 680 L 480 680 L 480 664"/>
  </g>

  <!-- Subtle star field -->
  <g fill="#ecc840">
    <circle cx="48"  cy="180" r="0.9" opacity="0.18"/>
    <circle cx="460" cy="160" r="1.1" opacity="0.22"/>
    <circle cx="90"  cy="620" r="0.8" opacity="0.15"/>
    <circle cx="420" cy="640" r="1.0" opacity="0.2"/>
    <circle cx="250" cy="58"  r="0.7" opacity="0.15"/>
    <circle cx="470" cy="380" r="0.8" opacity="0.16"/>
    <circle cx="38"  cy="420" r="0.7" opacity="0.14"/>
    <circle cx="380" cy="100" r="0.6" opacity="0.12"/>
    <circle cx="120" cy="90"  r="0.7" opacity="0.13"/>
    <circle cx="200" cy="640" r="0.6" opacity="0.12"/>
    <circle cx="60"  cy="260" r="0.5" opacity="0.1"/>
    <circle cx="445" cy="250" r="0.5" opacity="0.1"/>
  </g>

  <!-- ── Title block ── -->
  <g font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif">
    <text x="250" y="82" text-anchor="middle"
          font-size="10" font-weight="600" letter-spacing="3"
          fill="#ecc840" opacity="0.95">
      STRUCTURE-DRIVEN ENGINEERING ORGANIZATION THEORY
    </text>

    <text x="250" y="134" text-anchor="middle"
          font-size="32" font-weight="300" letter-spacing="2"
          fill="#ecc840">
      構造駆動
    </text>
    <text x="250" y="176" text-anchor="middle"
          font-size="32" font-weight="300" letter-spacing="2"
          fill="#ecc840">
      エンジニアリング組織論
    </text>

    <text x="250" y="208" text-anchor="middle"
          font-size="12" font-weight="400" letter-spacing="2"
          fill="#ecc840" opacity="0.65">
      観測・構造・レイヤーで組織を設計する
    </text>
  </g>

  <!-- ── Three-layer diagram ── -->

  <!-- Translator vertical lines -->
  <g stroke="#c03030" stroke-width="1.6" stroke-linecap="round" opacity="0.7">
    <line x1="150" y1="275" x2="150" y2="565" stroke-dasharray="4 6"/>
    <line x1="250" y1="275" x2="250" y2="565" stroke-dasharray="4 6"/>
    <line x1="350" y1="275" x2="350" y2="565" stroke-dasharray="4 6"/>
  </g>
  <g fill="url(#translator-glow)">
    <circle cx="150" cy="420" r="30"/>
    <circle cx="250" cy="420" r="36"/>
    <circle cx="350" cy="420" r="30"/>
  </g>

  <!-- Principle layer (top) -->
  <rect x="60" y="290" width="380" height="46" fill="url(#layer-principle)"/>
  <line x1="90" y1="290" x2="410" y2="290" stroke="#ecc840" stroke-width="0.7" opacity="0.55"/>
  <line x1="90" y1="336" x2="410" y2="336" stroke="#ecc840" stroke-width="0.7" opacity="0.55"/>
  <text x="250" y="319" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="18" font-weight="300" letter-spacing="6" fill="#ecc840">
    原理層
  </text>
  <text x="250" y="333" text-anchor="middle" font-family="Inter, sans-serif"
        font-size="8" font-weight="500" letter-spacing="3" fill="#ecc840" opacity="0.55">
    PRINCIPLE
  </text>

  <!-- Intermediate layer (middle) -->
  <rect x="60" y="380" width="380" height="60" fill="url(#layer-intermediate)"/>
  <line x1="90" y1="380" x2="410" y2="380" stroke="#ecc840" stroke-width="0.7" opacity="0.7"/>
  <line x1="90" y1="440" x2="410" y2="440" stroke="#ecc840" stroke-width="0.7" opacity="0.7"/>
  <text x="250" y="416" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="20" font-weight="400" letter-spacing="6" fill="#ecc840">
    中間層
  </text>
  <text x="250" y="432" text-anchor="middle" font-family="Inter, sans-serif"
        font-size="9" font-weight="600" letter-spacing="3" fill="#c03030" opacity="0.95">
    INTERMEDIATE
  </text>

  <!-- Implementation layer (bottom) -->
  <rect x="60" y="484" width="380" height="72" fill="url(#layer-implementation)"/>
  <line x1="90" y1="484" x2="410" y2="484" stroke="#ecc840" stroke-width="0.7" opacity="0.8"/>
  <line x1="90" y1="556" x2="410" y2="556" stroke="#ecc840" stroke-width="0.7" opacity="0.8"/>
  <text x="250" y="524" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif"
        font-size="22" font-weight="500" letter-spacing="6" fill="#ecc840">
    実装層
  </text>
  <text x="250" y="543" text-anchor="middle" font-family="Inter, sans-serif"
        font-size="10" font-weight="500" letter-spacing="3" fill="#ecc840" opacity="0.55">
    IMPLEMENTATION
  </text>

  <!-- Translator label on the right -->
  <g font-family="Inter, sans-serif">
    <line x1="388" y1="420" x2="405" y2="420" stroke="#c03030" stroke-width="1.2" opacity="0.85"/>
    <text x="410" y="416" font-size="8" font-weight="600" letter-spacing="2.5" fill="#c03030" opacity="0.95">
      TRANSLATORS
    </text>
    <text x="410" y="428" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif"
          font-size="8" font-weight="300" letter-spacing="2" fill="#ecc840" opacity="0.6">
      翻訳者
    </text>
  </g>

  <!-- ── Footer ── -->
  <g font-family="Inter, sans-serif">
    <!-- Small lens mark -->
    <g transform="translate(30 652)">
      <circle cx="0" cy="0" r="7" fill="none" stroke="#ecc840" stroke-width="0.9" opacity="0.7"/>
      <circle cx="0" cy="0" r="3" fill="none" stroke="#c03030" stroke-width="0.9"/>
      <circle cx="0" cy="0" r="1.2" fill="#ecc840"/>
    </g>
    <text x="48" y="655" font-size="9" font-weight="600" letter-spacing="1.5" fill="#ecc840" opacity="0.95">
      Published by OrbitLens
    </text>
    <text x="48" y="668" font-size="8" font-weight="300" letter-spacing="1.5" fill="#ecc840" opacity="0.5">
      Observation, not evaluation. Structure, not people.
    </text>
  </g>
</svg>
