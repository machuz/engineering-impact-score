<svg xmlns="http://www.w3.org/2000/svg" width="500" height="700" viewBox="0 0 500 700">
  <!-- Background: Eclipse Doctrine cream -->
  <rect width="500" height="700" fill="#f5f2ed"/>

  <!-- Corner crosshair marks (OrbitLens signature, restrained) -->
  <g stroke="#2a0e1e" stroke-width="1" opacity="0.3" fill="none">
    <path d="M 20 36 L 20 20 L 36 20"/>
    <path d="M 464 20 L 480 20 L 480 36"/>
    <path d="M 20 664 L 20 680 L 36 680"/>
    <path d="M 464 680 L 480 680 L 480 664"/>
  </g>

  <!-- ── Title block ── -->
  <g font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif">
    <text x="250" y="72" text-anchor="middle"
          font-size="10" font-weight="600" letter-spacing="3"
          fill="#2a0e1e" opacity="0.75">
      STRUCTURE-DRIVEN ENGINEERING ORGANIZATION THEORY
    </text>

    <text x="250" y="124" text-anchor="middle"
          font-size="32" font-weight="300" letter-spacing="2"
          fill="#2a0e1e">
      構造駆動
    </text>
    <text x="250" y="166" text-anchor="middle"
          font-size="32" font-weight="300" letter-spacing="2"
          fill="#2a0e1e">
      エンジニアリング組織論
    </text>

    <text x="250" y="198" text-anchor="middle"
          font-size="12" font-weight="400" letter-spacing="2"
          fill="#2a0e1e" opacity="0.6">
      観測・構造・レイヤーで組織を設計する
    </text>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Neo-plastic composition — Eclipse Doctrine   -->
  <!-- Canvas inside y=236 to y=636 (400 tall)      -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Color blocks — placed first, grid lines sit on top -->

  <!-- Deep wine: dominant top-right (plays the "red" role) -->
  <rect x="172" y="236" width="328" height="260" fill="#2a0e1e"/>

  <!-- Teal: medium bottom-left (plays the "blue" role) -->
  <rect x="0" y="500" width="168" height="136" fill="#1a6b6a"/>

  <!-- Ochre: tiny accent, bottom-right corner (plays the "yellow" role) -->
  <rect x="424" y="580" width="76" height="56" fill="#d4aa68"/>

  <!-- Grid lines: deep wine, thin Mondrian strokes -->
  <g fill="#2a0e1e">
    <!-- Top border of composition -->
    <rect x="0" y="234" width="500" height="3"/>
    <!-- Vertical main -->
    <rect x="168.5" y="234" width="3" height="402"/>
    <!-- Horizontal main, full width -->
    <rect x="0" y="497.5" width="500" height="3"/>
    <!-- Horizontal minor, right half only -->
    <rect x="168.5" y="579" width="331.5" height="3"/>
    <!-- Vertical minor, bottom-right only -->
    <rect x="421" y="579" width="3" height="57"/>
    <!-- Left column subdivider -->
    <rect x="0" y="378" width="168.5" height="3"/>
    <!-- Bottom border of composition -->
    <rect x="0" y="633" width="500" height="3"/>
  </g>

  <!-- ── Footer ── -->
  <g font-family="Inter, sans-serif">
    <g transform="translate(30 672)">
      <circle cx="0" cy="0" r="7" fill="none" stroke="#2a0e1e" stroke-width="0.9" opacity="0.75"/>
      <circle cx="0" cy="0" r="3" fill="none" stroke="#d4aa68" stroke-width="0.9"/>
      <circle cx="0" cy="0" r="1.2" fill="#2a0e1e"/>
    </g>
    <text x="48" y="670" font-size="9" font-weight="600" letter-spacing="1.5" fill="#2a0e1e" opacity="0.9">
      Published by OrbitLens
    </text>
    <text x="48" y="684" font-size="8" font-weight="300" letter-spacing="1.5" fill="#2a0e1e" opacity="0.55">
      Observation, not evaluation. Structure, not people.
    </text>
  </g>
</svg>
